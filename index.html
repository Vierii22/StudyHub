<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<link rel="manifest" href="/manifest.json" />
<link rel="icon" type="image/png" href="/assets/icon.png" />
<link rel="apple-touch-icon" href="/assets/logo-circle.png" />
<script>
  /* SW solo en producción. En localhost/127.0.0.1: desregistrar cualquier
     SW viejo que haya quedado instalado de sesiones anteriores (servía
     CSS/JS cacheado y tapaba los cambios reales del archivo). */
  var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if ('serviceWorker' in navigator) {
    if (isLocal) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    } else {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  }
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaPrompt = e;
  });
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>

/* ============================================================
   STUDYHUB · SISTEMA DE DISEÑO
   Un solo acento (violeta) · fondo profundo · cards casi invisibles
   ============================================================ */
:root{
  /* ══ PIEDRA & NARANJA QUEMADO — rediseño cálido 2026 ══ */
  /* — Superficies — */
  --bg:          #E6DFD3;   /* piedra (fondo) */
  --surface-1:   #FCFAF4;   /* card claro */
  --surface-2:   #F1EAD9;   /* campo / warm */
  --surface-3:   #EDE7DD;   /* hover / apagado */
  --line:        rgba(58,51,43,.10);
  --line-2:      rgba(58,51,43,.18);

  /* — Texto (marrón cálido, NUNCA negro frío) — */
  --tx-1:        #322A21;   /* principal */
  --tx-2:        #6b5f50;   /* secundario */
  --tx-3:        #9a8f7d;   /* terciario / meta */

  /* — Acento naranja quemado (nombre --violet heredado = ahora naranja) — */
  --violet:      #D9551F;
  --violet-2:    #F4A94E;
  --violet-hi:   #B8461A;
  --violet-soft: rgba(217,85,31,.12);
  --violet-line: rgba(217,85,31,.40);
  --grad:        linear-gradient(135deg, #F4A94E 0%, #D9551F 100%);

  /* — Alias semánticos para el código nuevo — */
  --stone:#E6DFD3; --card:#FCFAF4; --field:#F1EAD9; --off:#EDE7DD;
  --ink:#3A332B; --ink-2:#201B16; --org:#D9551F; --org-2:#F4A94E; --org-deep:#96360F;
  --green:#3B6D11; --green-bg:#E4EEDB; --mut:#9a8f7d; --soft:#6b5f50;

  /* — Fuente hero (sin serif itálica) — */
  --font-hero:   'Outfit';

  /* — fill conmutable (gradiente vs sólido) — */
  --fill:        var(--grad);
  --fill-soft:   var(--violet-soft);

  /* — Radios (más generosos, look 2026) — */
  --r-sm: 8px;
  --r:    12px;
  --r-lg: 16px;
  --r-xl: 22px;

  /* — Zoom global de UI (slider 1–100 lo maneja) — */
  --ui-zoom: 0.92;

  /* — Spacing — */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px;
  --s6:24px; --s7:32px; --s8:40px; --s9:48px; --s10:64px;

  /* — Card padding (compacto/minimalista) — */
  --card-pad: 18px;
  --grid-gap: 16px;

  /* — Tipografía (conmutable) — */
  --font-display:'Outfit';
  --font-body:   'Outfit';
  --font-mono:   'JetBrains Mono';

}

*{ box-sizing:border-box; margin:0; padding:0; }
html{
  height:100%;
  /* Evita que iOS amplíe el texto al rotar */
  -webkit-text-size-adjust:100%;
  /* Sin highlight azul en tap */
  -webkit-tap-highlight-color:transparent;
}
body{
  height:100%;
  background:var(--bg);
  color:var(--tx-1);
  font-family:var(--font-body), system-ui, sans-serif;
  font-size:13.5px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
  /* Sin rebote blanco en overscroll */
  overscroll-behavior:none;
}
/* El contenido de la app no se selecciona accidentalmente */
.app{ user-select:none; }
/* Pero sí en inputs y contenido editable */
input,textarea,[contenteditable]{ user-select:text; }
/* Evitar auto-zoom de iOS al enfocar inputs */
input,select,textarea{ font-size:16px; }
/* Áreas de toque mínimas en dispositivos táctiles */
@media(pointer:coarse){
  .btn,.nav-item,[role=button],.tab-bar button{ min-height:44px; }
}
/* Safe areas para el header en notch */
.header{ padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }
/* View Transitions — fade + slide sutil entre secciones */
@media(prefers-reduced-motion:no-preference){
  ::view-transition-old(root){ animation:vt-slide-out 200ms ease both; }
  ::view-transition-new(root){ animation:vt-slide-in  200ms ease both; }
  @keyframes vt-slide-out{ to{ opacity:0; transform:translateY(6px); } }
  @keyframes vt-slide-in { from{ opacity:0; transform:translateY(-6px); } }
}
@media(prefers-reduced-motion:reduce){
  ::view-transition-old(root),::view-transition-new(root){ animation:none; }
}
.tnum{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
#root{ height:100%; }
::selection{ background:rgba(217,85,31,.28); }

/* ===== ESCALA TIPOGRÁFICA ===== */
.display{ font-family:var(--font-display); font-weight:700; font-size:clamp(36px,4.4vw,54px); line-height:.98; letter-spacing:-.03em; }
.h1{ font-family:var(--font-display); font-weight:700; font-size:24px; line-height:1.08; letter-spacing:-.02em; }
.h2{ font-family:var(--font-display); font-weight:600; font-size:18px; line-height:1.18; letter-spacing:-.01em; }
.h3{ font-family:var(--font-display); font-weight:600; font-size:15px; line-height:1.28; }
.body{ font-size:13.5px; color:var(--tx-2); }
.small{ font-size:12px; color:var(--tx-2); }
.stat{ font-family:var(--font-display); font-weight:700; font-size:clamp(30px,3.4vw,42px); line-height:.94; letter-spacing:-.03em; font-feature-settings:"tnum"; }

/* etiqueta mono — el sello "terminal" */
.mono{
  font-family:var(--font-mono), monospace;
  font-size:10.5px; font-weight:500;
  letter-spacing:.15em; text-transform:uppercase;
  color:var(--tx-3);
}
.mono-accent{ color:var(--violet-hi); }

.tx-2{ color:var(--tx-2); } .tx-3{ color:var(--tx-3); } .tx-1{ color:var(--tx-1); }
.accent-tx{ color:var(--violet-hi); }

/* ===== CARD ===== */
.card{
  position:relative;
  background:var(--surface-1);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:var(--card-pad);
  transition:border-color .2s ease, background .2s ease, transform .2s ease;
}
.card.hoverable:hover{ border-color:var(--line-2); background:#16161c; }
.card-2{ background:var(--surface-2); }
.card-flush{ padding:0; }

/* card "hero": el ÚNICO momento de relleno fuerte */
.card-hero{
  background:var(--fill);
  border:none;
  color:#fff;
  overflow:hidden;
}
.card-hero .mono{ color:rgba(255,255,255,.7); }

/* ===== ESQUINAS TERMINAL (solo hero / modales) ===== */
.tcorners{ position:relative; }
.tc{ position:absolute; width:16px; height:16px; pointer-events:none; z-index:3; opacity:.85; }
.tc-tl{ top:12px; left:12px; border-top:1.5px solid var(--violet-line); border-left:1.5px solid var(--violet-line); }
.tc-tr{ top:12px; right:12px; border-top:1.5px solid var(--violet-line); border-right:1.5px solid var(--violet-line); }
.tc-bl{ bottom:12px; left:12px; border-bottom:1.5px solid var(--violet-line); border-left:1.5px solid var(--violet-line); }
.tc-br{ bottom:12px; right:12px; border-bottom:1.5px solid var(--violet-line); border-right:1.5px solid var(--violet-line); }
.card-hero .tc{ border-color:rgba(255,255,255,.5); }

/* ===== BOTONES ===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  font-family:var(--font-body); font-size:13px; font-weight:600;
  padding:9px 14px; border-radius:var(--r); border:1px solid transparent;
  cursor:pointer; transition:all .16s ease; white-space:nowrap; line-height:1;
}
.btn svg{ width:15px; height:15px; }
.btn-primary{ background:var(--grad); color:#fff; box-shadow:0 3px 0 var(--org-deep); }
.btn-secondary{ background:var(--card); color:var(--ink); border-color:var(--line); box-shadow:0 2px 0 #e0d5c3; }
.btn-secondary:hover{ background:var(--field); }
.btn-ghost{ background:transparent; color:var(--tx-2); padding:9px 11px; }
.btn-ghost:hover{ background:var(--surface-2); color:var(--tx-1); }
.btn-sm{ padding:7px 11px; font-size:12px; }

/* ===== INPUT ===== */
.input{
  width:100%; background:var(--surface-2); border:1px solid var(--line);
  border-radius:var(--r); padding:10px 13px; color:var(--tx-1);
  font-family:var(--font-body); font-size:13.5px; transition:border-color .16s ease, background .16s ease;
}
.input::placeholder{ color:var(--tx-3); }
.input:focus{ outline:none; border-color:var(--violet-line); background:var(--surface-3); }

/* ===== RANGE SLIDER (año, etc.) ===== */
.range-slider{
  -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:99px;
  background:var(--surface-2); border:1px solid var(--line); cursor:pointer; margin:8px 0 2px;
}
.range-slider::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--org); border:3px solid var(--card); box-shadow:0 2px 0 var(--org-deep), 0 1px 4px rgba(58,51,43,.35);
  cursor:pointer; transition:transform .12s ease;
}
.range-slider::-webkit-slider-thumb:hover{ transform:scale(1.08); }
.range-slider::-webkit-slider-thumb:active{ transform:scale(.96); }
.range-slider::-moz-range-thumb{
  width:20px; height:20px; border-radius:50%; background:var(--org); border:3px solid var(--card);
  box-shadow:0 2px 0 var(--org-deep), 0 1px 4px rgba(58,51,43,.35); cursor:pointer;
}
.range-slider::-moz-range-track{ height:6px; border-radius:99px; background:var(--surface-2); border:1px solid var(--line); }

/* ===== STAR RATING PICKER ===== */
.star-pick{ display:flex; align-items:center; flex-wrap:wrap; row-gap:6px; gap:2px; cursor:pointer; }
.star-pick .star-wrap{ position:relative; width:19px; height:19px; display:inline-block; transition:transform .1s ease; }
.star-pick .star-wrap svg{ position:absolute; top:0; left:0; }
.star-pick .star-wrap:hover{ transform:scale(1.15); }

/* ===== CHIP / BADGE ===== */
.chip{
  display:inline-flex; align-items:center; gap:7px;
  font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:5px 10px; border-radius:999px; border:1px solid var(--line-2);
  color:var(--tx-2); background:var(--surface-2); white-space:nowrap;
}
.chip-accent{ color:var(--violet-hi); border-color:var(--violet-line); background:var(--violet-soft); }
.chip-dot::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ===== TOP NAV (barra de arriba — reemplaza el sidebar) ===== */
.topbar{ display:flex; align-items:center; gap:16px; padding:13px 26px; background:var(--stone);
  border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50; }
.tb-brand{ display:flex; align-items:center; gap:9px; cursor:pointer; flex:0 0 auto; }
.tb-logo{ width:28px; height:28px; border-radius:9px; display:block; }
.tb-word{ font-family:var(--font-display); font-size:18px; letter-spacing:-.4px; font-weight:800; }
.tb-word .w1{ color:#8a7f6d; font-weight:500; } .tb-word .w2{ color:var(--ink); } .tb-word .w3{ color:var(--org); }
.tb-nav{ display:flex; align-items:center; gap:3px; }
.tb-item{ font-size:14px; font-weight:500; color:var(--tx-3); padding:7px 13px; border-radius:11px; cursor:pointer; transition:background .15s, color .15s; white-space:nowrap; }
.tb-item:hover{ background:var(--surface-2); color:var(--tx-1); }
.tb-item.active{ background:var(--ink); color:#F3ECDF; }
.tb-right{ margin-left:auto; display:flex; align-items:center; gap:9px; }
.tb-search{ display:flex; align-items:center; gap:8px; background:var(--surface-1); border:1px solid var(--line);
  border-radius:11px; padding:8px 11px; color:var(--tx-3); cursor:pointer; }
.tb-avatar{ width:34px; height:34px; border-radius:50%; background:var(--org); color:#fff; display:flex;
  align-items:center; justify-content:center; font-weight:700; font-size:14px; cursor:pointer; flex:0 0 auto; }
@media(max-width:760px){ .tb-nav{ display:none; } .topbar{ padding:11px 16px; } }

/* ===== MATERIAS (grid editorial) ===== */
.subj-ed{ background:var(--surface-1); border:1px solid var(--line); border-radius:16px; padding:18px 20px;
  cursor:pointer; box-shadow:0 2px 0 #e0d5c3, 0 6px 14px rgba(58,51,43,.06);
  transition:transform .15s ease, box-shadow .15s ease; }
.subj-ed:hover{ transform:translateY(-2px); box-shadow:0 4px 0 #e0d5c3, 0 12px 22px rgba(58,51,43,.10); }
.subj-new{ border:1.5px dashed #cbbfa9; border-radius:16px; min-height:158px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:9px; color:var(--tx-2); cursor:pointer; transition:border-color .15s ease; }
.subj-new:hover{ border-color:var(--org); color:var(--org-deep); }
.subj-ed-done{ background:var(--off); opacity:.72; }
.subj-ed-done:hover{ opacity:1; }

/* ===== BOTÓN "CREAR" ESTILO C — claro + chip naranja ===== */
.btnC-crear{ background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:12px;
  padding:9px 16px 9px 9px; font-family:var(--font-body); font-weight:700; font-size:13.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:10px; box-shadow:0 2px 0 #e0d5c3;
  transition:transform .14s cubic-bezier(.2,.8,.3,1.3), box-shadow .14s ease, background .14s ease; }
.btnC-crear:hover{ background:var(--field); transform:translateY(-2px); box-shadow:0 4px 0 #e0d5c3; }
.btnC-crear:active{ transform:translateY(1px); box-shadow:0 1px 0 #e0d5c3; }
.btnC-chip{ width:26px; height:26px; border-radius:8px; background:var(--org); color:#fff; display:grid; place-items:center; flex:0 0 auto; }

/* ===== CALENDARIO (Semana/Mes/Año) ===== */
.cal-scroll{ overflow-x:auto; }
.cal-year-grid{ grid-template-columns:repeat(4,1fr); }
@media(max-width:768px){
  .cal-scroll{ margin:0 -14px; padding:0 14px; }
  .cal-week-grid{ min-width:640px; }
  .cal-month-grid{ min-width:520px; }
  .cal-year-grid{ grid-template-columns:repeat(2,1fr); }
}
.cal-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
.cal-title{ position:relative; display:inline-block; font-family:var(--font-display); font-weight:800; font-size:26px; color:var(--ink); letter-spacing:-.02em; }
.cal-title-bar{ display:block; width:34px; height:4px; border-radius:99px; background:var(--org); margin-top:7px; }
.cal-period{ margin-top:9px; font-size:13.5px; color:var(--tx-2); text-transform:capitalize; }

.cal-ev-card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
  cursor:pointer; box-shadow:0 2px 0 #e0d5c3; transition:transform .12s ease, box-shadow .12s ease; }
.cal-ev-card:hover{ transform:translateY(-1px); box-shadow:0 3px 0 #e0d5c3; }
.cal-ev-flag{ display:inline-flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:.06em; color:#fff; background:var(--org-deep); padding:2px 7px; border-radius:6px; margin-bottom:6px; }
.cal-ev-chip{ display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:6px; background:var(--field); color:var(--ink); }

.cal-month-cell{ min-height:88px; padding:8px; border-radius:12px; background:var(--card); border:1px solid var(--line); cursor:pointer; transition:background .14s ease; }
.cal-month-cell:hover{ background:var(--field); }
.cal-month-daynum{ width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-family:var(--font-mono); font-size:11.5px; font-weight:700; color:var(--tx-1); }
.cal-month-chip{ display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:700; letter-spacing:.02em; color:#fff;
  padding:2px 6px; border-radius:6px; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.cal-month-chip.parcial{ background:var(--org); }
.cal-month-chip.entrega{ background:var(--ink); }

.cal-year-card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; cursor:pointer;
  box-shadow:0 2px 0 #e0d5c3; transition:transform .12s ease, box-shadow .12s ease; }
.cal-year-card:hover{ transform:translateY(-2px); box-shadow:0 4px 0 #e0d5c3; }

/* arrastre de eventos en la vista semana */
.cal-day-drop{ transition:background .15s ease, box-shadow .15s ease; }
.cal-day-drop.over{ background:rgba(217,85,31,.07); box-shadow:inset 0 0 0 1.5px var(--org); }
.cal-drop-line{ position:absolute; top:-5px; left:0; right:0; height:3px; border-radius:99px; background:var(--org); box-shadow:0 0 0 3px rgba(217,85,31,.18); animation:dropline-in .16s ease both; z-index:60; }
@keyframes dropline-in{ from{ opacity:0; transform:scaleX(.6); } to{ opacity:1; transform:none; } }
@media(prefers-reduced-motion:reduce){ .cal-drop-line{ animation:none; } }

/* ===== INTERIOR DE MATERIA (temario, botones) ===== */
.ms{ font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; border:1px solid #d3c7b3; color:#a99e8c; background:transparent; cursor:pointer; user-select:none; transition:transform .1s ease, all .12s ease; }
.ms:hover{ transform:translateY(-1px); }
.ms:active{ transform:scale(.93); }
.rep{ display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:20px; font-family:var(--font-mono); font-weight:700; font-size:12px; background:#EDE7DD; color:#a99e8c; user-select:none; }
.rep b{ font-family:var(--font-body); font-size:15px; cursor:pointer; padding:0 2px; line-height:1; transition:transform .1s ease; display:inline-block; }
.rep b:hover{ transform:scale(1.25); color:var(--org-deep); }
.rep b:active{ transform:scale(.85); }
.btnB-aula{ background:var(--ink); color:#F4EDE0; border:none; border-radius:12px; padding:9px 15px; font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; box-shadow:0 3px 0 #1f1b15; text-decoration:none; transition:transform .14s cubic-bezier(.2,.8,.3,1.3), box-shadow .14s ease; }
.btnB-aula svg{ color:var(--org); }
.btnB-aula:hover{ transform:translateY(-2px); box-shadow:0 5px 0 #1f1b15; }
.btnB-aula:active{ transform:translateY(1px); box-shadow:0 1px 0 #1f1b15; }
.btn-soft{ background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:11px; padding:8px 13px; font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; box-shadow:0 2px 0 #e0d5c3; }
.btn-soft:hover{ background:var(--field); }

/* ===== TEMARIO · UNIDADES ===== */
.unidad-block{ animation:uni-in .3s cubic-bezier(.2,.8,.3,1) both; }
@keyframes uni-in{ from{ opacity:0; transform:translateY(7px); } to{ opacity:1; transform:none; } }
.unidad-body{ display:grid; grid-template-rows:1fr; transition:grid-template-rows .26s ease, opacity .18s ease; opacity:1; }
.unidad-body.collapsed{ grid-template-rows:0fr; opacity:0; }
.unidad-body > div{ overflow:hidden; min-height:0; }
.unidad-block .tema-row{ animation:tema-in .28s ease both; }
@keyframes tema-in{ from{ opacity:0; transform:translateX(-7px); } to{ opacity:1; transform:none; } }
.add-unidad{ transition:color .14s ease; }
.add-unidad:hover{ color:var(--org-deep); }
.add-unidad:active{ transform:scale(.98); }
@media(prefers-reduced-motion:reduce){ .unidad-block, .unidad-block .tema-row{ animation:none; } .unidad-body{ transition:none; } }

/* ===== TAREAS (vista general) ===== */
.tsk-group{ animation:uni-in .32s cubic-bezier(.2,.8,.3,1) both; }
.tsk-line{ transition:background .12s ease; }
.tsk-line:hover{ background:var(--field); }
.tsk-line .tsk-del{ opacity:0; transition:opacity .14s ease; }
.tsk-line:hover .tsk-del{ opacity:1; }
@media(pointer:coarse){ .tsk-line .tsk-del{ opacity:1; } }
@media(prefers-reduced-motion:reduce){ .tsk-group{ animation:none; } }

/* ===== SIDEBAR (rail expandible) ===== */
.sidebar{
  flex:0 0 auto;
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  height:100%; overflow:hidden;
  width:74px;
  background:
    linear-gradient(180deg, rgba(139,109,255,.08), transparent 240px),
    rgba(15,15,20,.78);
  transition:width .28s cubic-bezier(.4,.1,.2,1);
}
.sidebar.expanded{ width:226px; }
.sidebar-brand{
  display:flex; align-items:center; gap:12px;
  padding:15px 17px 13px; min-height:66px;
}
.sidebar-brand img{ width:40px; height:40px; flex:0 0 40px; border-radius:12px; box-shadow:0 6px 18px -8px rgba(139,109,255,.6); }
.sidebar-brand .wordmark{ opacity:0; transform:translateX(-6px); transition:opacity .18s ease, transform .22s ease; overflow:hidden; }
.sidebar.expanded .sidebar-brand .wordmark{ opacity:1; transform:none; }
.sidebar:not(.expanded) .sidebar-brand .wordmark{ display:none; }
.sidebar-nav{
  flex:1; display:flex; flex-direction:column; gap:3px;
  padding:8px 12px; overflow-y:auto; overflow-x:hidden;
  scrollbar-width:none;
}
.sidebar-nav::-webkit-scrollbar{ width:0; height:0; }
.nav-item{
  display:flex; align-items:center; gap:13px;
  height:44px; padding:0 12px; border-radius:11px; cursor:pointer;
  color:var(--tx-2); font-size:13.5px; font-weight:600;
  position:relative; transition:background .14s ease, color .14s ease; white-space:nowrap;
}
.nav-item svg{ width:21px; height:21px; flex:0 0 21px; stroke-width:1.8; }
.nav-item .nav-label{ transition:opacity .16s ease; }
.sidebar:not(.expanded) .nav-item .nav-label{ display:none; }
.nav-item:hover{ color:var(--tx-1); background:var(--surface-2); }
.nav-item.active{ color:var(--violet-hi); background:var(--violet-soft); }
.nav-item.active::before{
  content:""; position:absolute; left:-12px; top:50%; transform:translateY(-50%);
  width:3px; height:22px; border-radius:0 3px 3px 0; background:var(--fill);
}
.sidebar:not(.expanded) .nav-item{ justify-content:center; padding:0; gap:0; }
.sidebar:not(.expanded) .nav-item.active::before{ left:0; }
.sidebar-foot{ padding:8px 12px 14px; display:flex; flex-direction:column; gap:3px; }
.nav-sep{ height:1px; background:var(--line); margin:7px 6px; }
/* ítems del subgrupo Vida: indentados y más chicos */
.nav-sub{ height:38px; font-size:12.5px; padding-left:22px; }
.sidebar:not(.expanded) .nav-sub{ padding-left:0; justify-content:center; }
.collapse-btn{
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:9px; cursor:pointer; margin:0 0 5px auto;
  color:var(--tx-3); border:1px solid var(--line); background:transparent;
  transition:all .14s ease;
}
.collapse-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); background:var(--surface-2); }
.collapse-btn svg{ width:17px; height:17px; }
.sidebar:not(.expanded) .collapse-btn{ margin:0 auto 5px; }

/* ===== HEADER (slim) ===== */
.header{
  display:flex; align-items:center; gap:14px;
  padding:11px 22px; border-bottom:1px solid var(--line); min-height:58px;
}
.searchbar{
  flex:1; max-width:420px; display:flex; align-items:center; gap:10px;
  background:var(--surface-1); border:1px solid var(--line); border-radius:99px;
  padding:8px 14px; color:var(--tx-3);
}
.searchbar input{ flex:1; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:13px; }
.searchbar input::placeholder{ color:var(--tx-3); }
.kbd{ font-family:var(--font-mono); font-size:10px; color:var(--tx-3); border:1px solid var(--line-2); border-radius:5px; padding:2px 5px; }
.icon-btn{
  width:36px; height:36px; border-radius:var(--r); border:1px solid var(--line);
  background:var(--surface-1); color:var(--tx-2); display:grid; place-items:center;
  cursor:pointer; transition:all .15s ease; flex:0 0 auto;
}
.icon-btn:hover{ color:var(--tx-1); border-color:var(--line-2); background:var(--surface-2); }
.icon-btn svg{ width:17px; height:17px; }

/* avatar */
.avatar{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; font-weight:700; color:#fff; background:var(--grad); font-family:var(--font-display); flex:0 0 auto; }

/* ===== PROGRESS RING ===== */
.ring-track{ stroke:rgba(255,255,255,.10); }
.ring-fill{ stroke:var(--violet); }
.card-hero .ring-track{ stroke:rgba(255,255,255,.25); }
.card-hero .ring-fill{ stroke:#fff; }

/* ===== layout helpers ===== */
.app{ position:relative; z-index:1; display:flex; height:100%; }
.main{ flex:1; display:flex; flex-direction:column; min-width:0; height:100%; }
.scroll{ flex:1; overflow-y:auto; }
.scroll-zoom{ zoom:var(--ui-zoom); }
.page{ width:100%; max-width:1560px; margin:0 auto; padding:22px clamp(20px,3vw,44px) 70px; }
.page-wide{ max-width:none; }
.page-cozy{ max-width:1280px; }
.row{ display:flex; align-items:center; }
.between{ justify-content:space-between; }
.wrap-gap{ display:flex; gap:10px; flex-wrap:wrap; }
.grid{ display:grid; gap:var(--grid-gap); }
.divider{ height:1px; background:var(--line); }

/* toolbar slim de sección (reemplaza el page-head grande) */
.toolbar{ display:flex; align-items:baseline; gap:6px 14px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
.toolbar .t-title{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:-.02em; white-space:nowrap; flex:0 0 auto; }
.toolbar .t-meta{ font-size:12.5px; color:var(--tx-3); letter-spacing:0; text-transform:none; white-space:nowrap; }
@media (max-width:760px){ .toolbar .t-meta{ white-space:normal; flex-basis:100%; } }
.page-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:24px; }

/* scrollbar */
.scroll::-webkit-scrollbar, .sidebar::-webkit-scrollbar{ width:10px; }
.scroll::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:10px; border:3px solid var(--bg); }

/* progress bar */
.bar{ height:6px; border-radius:99px; background:var(--surface-3); overflow:hidden; }
.bar > i{ display:block; height:100%; border-radius:99px; background:var(--fill); }

/* segmented control — pastillas táctiles cálidas (activo = marrón) */
.seg{ display:inline-flex; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px; gap:3px; box-shadow:0 2px 0 #e0d5c3; }
.seg button{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-body); font-size:13px; font-weight:600; color:var(--tx-2);
  background:none; border:none; padding:8px 15px; border-radius:9px; cursor:pointer; transition:all .14s ease;
}
.seg button svg{ width:14px; height:14px; opacity:.85; }
.seg button:hover{ color:var(--ink); background:var(--field); }
.seg button.on{ background:var(--ink); color:#F4EDE0; font-weight:700; box-shadow:0 2px 0 var(--ink-2); }
.seg button.on:hover{ background:var(--ink); color:#F4EDE0; }
.seg button.on svg{ opacity:1; }

/* popover */
.pop{
  position:absolute; top:54px; right:0; z-index:50; width:330px;
  background:#15151b; border:1px solid var(--line-2); border-radius:var(--r-lg);
  padding:20px; box-shadow:0 30px 60px -20px rgba(0,0,0,.7);
}

/* modal */
.overlay{ position:fixed; inset:0; z-index:100; background:rgba(58,51,43,.42); backdrop-filter:blur(4px); display:grid; place-items:center; padding:24px; }
.modal{ width:min(720px,100%); background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl); padding:32px; position:relative; box-shadow:0 3px 0 #e0d5c3, 0 40px 80px -30px rgba(58,51,43,.4); }

/* ===== BRAND BANNER ===== */
.brand-banner{
  position:relative; overflow:hidden;
  border-radius:var(--r-xl); border:1px solid var(--line-2);
  background:
    radial-gradient(420px 220px at 88% -30%, rgba(139,109,255,.30), transparent 70%),
    radial-gradient(360px 200px at 8% 130%, rgba(194,100,232,.22), transparent 70%),
    linear-gradient(180deg, #16131f, #101015);
  display:flex; align-items:center; gap:24px; padding:30px 34px;
}
.brand-banner img{ width:84px; height:84px; flex:0 0 84px; border-radius:20px; box-shadow:0 16px 40px -14px rgba(139,109,255,.85); }
.brand-wm{ font-family:var(--font-display); font-weight:800; letter-spacing:-.03em; line-height:1; font-size:clamp(30px,4vw,46px); }
.brand-wm .grad{ background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.brand-tag{ font-family:var(--font-mono); font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:var(--tx-2); margin-top:12px; }
.brand-banner.lg{ padding:46px 44px; gap:30px; }
.brand-banner.lg img{ width:108px; height:108px; flex:0 0 108px; border-radius:26px; }

/* materia swatch */
.subject-icon{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:20px; color:#fff; }

.fade-in{ animation:fade .4s ease; }
@keyframes fade{ from{ transform:translateY(10px); } to{ transform:none; } }

a{ color:inherit; text-decoration:none; }
.link{ color:var(--violet-hi); cursor:pointer; font-weight:600; }
.link:hover{ text-decoration:underline; }

/* ============================================================
   PIZARRÓN ESTILO CANVA
   ============================================================ */
.board-wrap{ position:relative; border:1px solid var(--line); border-radius:var(--r-lg); background:var(--surface-1); overflow:hidden; }

/* touch-action: none — permite drag en mobile (pointer events) */
.board-item, .board-item.editing, .postit, .postit.editing,
.resize, .ed-bar, .board-viewport { touch-action: none; }

/* barra superior en fullscreen */
.board-fs-bar {
  position:absolute; top:0; left:0; right:0; height:48px;
  display:flex; align-items:center; padding:0 16px; gap:12px;
  background:rgba(13,13,18,.92); border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px); z-index:10;
}
.board-dots{
  position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,.13) 1.4px, transparent 1.4px);
  background-size:26px 26px; background-position:-1px -1px;
  pointer-events:none;
}
.board-canvas{ position:relative; width:100%; min-height:640px; }
.board-item{
  position:absolute; border-radius:var(--r); background:var(--surface-1);
  border:1px solid var(--line-2); overflow:hidden;
  box-shadow:0 10px 30px -16px rgba(0,0,0,.6);
}
.board-item.editing{ cursor:move; }
.board-item.editing:hover{ border-color:var(--violet-line); }
.board-item .ed-bar{
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:rgba(20,20,26,.9); border-bottom:1px solid var(--line);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx-2);
}
.board-item .ed-bar .handle{ cursor:move; color:var(--tx-3); letter-spacing:0; }
.board-item .resize{
  position:absolute; right:0; bottom:0; width:18px; height:18px; cursor:nwse-resize;
  background:linear-gradient(135deg,transparent 45%,var(--violet-line) 45%,var(--violet-line) 60%,transparent 60%,transparent 72%,var(--violet-line) 72%,var(--violet-line) 87%,transparent 87%);
  z-index:5;
}
.board-body{ padding:16px 18px; height:100%; overflow:auto; }
.board-body::-webkit-scrollbar{ width:7px; }
.board-body::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:7px; }

/* barra de herramientas del pizarrón */
.board-tools{
  position:absolute; bottom:14px; right:14px; z-index:20;
  display:flex; align-items:center; gap:10px;
}
.board-tools .bt-hint{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; color:var(--tx-3);
  background:rgba(18,18,23,.82); border:1px solid var(--line); border-radius:99px;
  padding:6px 12px; backdrop-filter:blur(8px);
}
@media (max-width:760px){ .board-tools .bt-hint{ display:none; } }
.board-tools .bt-group{
  display:flex; align-items:center; gap:2px;
  background:rgba(18,18,23,.9); border:1px solid var(--line-2); border-radius:11px;
  padding:3px; backdrop-filter:blur(8px);
}
.board-tools .bt-btn{
  width:34px; height:34px; border-radius:9px; border:1px solid var(--line-2);
  background:rgba(18,18,23,.9); color:var(--tx-2); display:grid; place-items:center; cursor:pointer;
  transition:all .14s ease; backdrop-filter:blur(8px);
}
.board-tools .bt-group .bt-btn{ border:none; background:transparent; }
.board-tools .bt-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.board-tools .bt-zoom{
  min-width:54px; height:34px; border:none; background:transparent; cursor:pointer;
  font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--tx-1);
}
.board-tools .bt-zoom:hover{ color:var(--violet-hi); }

/* post-it */
.postit{
  position:absolute; min-width:170px; min-height:150px; padding:16px;
  border-radius:4px; box-shadow:0 14px 30px -12px rgba(0,0,0,.55);
  font-family:var(--font-body); color:#2a2410; transform:rotate(-1.4deg);
  transition:transform .15s ease;
}
.postit textarea{ width:100%; height:100%; min-height:90px; background:none; border:none; outline:none; resize:none; color:inherit; font-family:var(--font-body); font-size:14px; line-height:1.45; }
.postit textarea::placeholder{ color:rgba(0,0,0,.35); }

/* floating drawer (edición) */
.drawer{
  position:fixed; z-index:120; width:300px; background:#15151b;
  border:1px solid var(--line-2); border-radius:var(--r-lg);
  box-shadow:0 30px 70px -20px rgba(0,0,0,.8); overflow:hidden;
}
.drawer-head{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); cursor:move; background:var(--surface-2); }
.drawer-body{ padding:16px; max-height:62vh; overflow-y:auto; }
.drawer-body::-webkit-scrollbar{ width:8px; } .drawer-body::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.chiprow{ display:flex; flex-wrap:wrap; gap:8px; }
.addbtn{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:11px 13px; border-radius:10px; border:1px solid var(--line);
  background:var(--surface-2); color:var(--tx-1); font-size:13.5px; font-weight:500; cursor:pointer; font-family:var(--font-body);
  transition:all .14s ease;
}
.addbtn:hover{ border-color:var(--violet-line); background:var(--violet-soft); }
.addbtn svg{ color:var(--violet-hi); }
.addmini{
  display:flex; align-items:center; gap:8px; padding:9px 10px;
  border-radius:9px; border:1px solid var(--line); background:var(--surface-2);
  color:var(--tx-1); font-size:12.5px; font-weight:500; cursor:pointer; font-family:var(--font-body);
  transition:all .14s ease; white-space:nowrap; overflow:hidden;
}
.addmini:hover{ border-color:var(--violet-line); background:var(--violet-soft); }
.addmini svg{ color:var(--violet-hi); flex:0 0 auto; }

/* ===== SMART LIST ===== */
.sl-pill{
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.04em;
  padding:3px 8px; border-radius:99px; border:1px solid var(--line-2);
  white-space:nowrap; cursor:default;
}
.sl-tabs{ display:inline-flex; gap:2px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:2px; }
.sl-tabs button{ width:26px; height:24px; border:none; background:none; border-radius:6px; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; transition:all .12s ease; }
.sl-tabs button:hover{ color:var(--tx-1); }
.sl-tabs button.on{ background:var(--surface-3); }
.sl-row{ display:flex; align-items:center; gap:11px; padding:9px 6px; border-radius:8px; cursor:pointer; transition:background .12s ease; }
.sl-row:hover{ background:var(--surface-2); }
.sl-kanban{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; padding-top:4px; }
.sl-col{ background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px; min-height:90px; }
.sl-card{ background:var(--surface-1); border:1px solid var(--line); border-radius:8px; padding:9px 10px; margin-bottom:7px; cursor:pointer; transition:border-color .12s ease; }
.sl-card:hover{ border-color:var(--line-2); }
.sl-table{ width:100%; border-collapse:collapse; font-size:13px; }
.sl-table th{ text-align:left; font-family:var(--font-mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line); }
.sl-table td{ padding:9px 8px; border-bottom:1px solid var(--line); }
.sl-table tbody tr{ cursor:pointer; transition:background .12s ease; }
.sl-table tbody tr:hover{ background:var(--surface-2); }

/* side peek */
.sp-scrim{ position:fixed; inset:0; z-index:210; background:rgba(7,7,10,.5); backdrop-filter:blur(3px); display:flex; justify-content:flex-end; animation:fade .2s ease; }
.sp-panel{
  position:fixed; right:0; top:0; bottom:0; z-index:211;
  width:min(390px,100%); padding:26px 26px 22px; overflow-y:auto;
  background:#121217; border-left:1px solid var(--line-2);
  box-shadow:-30px 0 60px -25px rgba(0,0,0,.7); animation:fbSlide .3s cubic-bezier(.4,.1,.2,1);
}
.sp-panel::-webkit-scrollbar{ width:8px; } .sp-panel::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.sp-title{ width:100%; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-display); font-weight:700; font-size:24px; letter-spacing:-.02em; margin-bottom:18px; }
.sp-row{ display:flex; align-items:center; gap:14px; padding:11px 0; border-bottom:1px solid var(--line); }
.sp-key{ display:flex; align-items:center; gap:8px; width:120px; flex:0 0 120px; font-size:12.5px; color:var(--tx-2); }
.sp-key svg{ color:var(--tx-3); }
.sl-pick{ font-family:var(--font-body); font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:99px; border:1px solid; cursor:pointer; transition:all .12s ease; }

/* ===== MI ESPACIO ===== */
.space-rail{
  flex:0 0 218px; width:218px; border-right:1px solid var(--line);
  padding:18px 12px; overflow-y:auto; background:rgba(16,16,21,.4);
  display:flex; flex-direction:column; gap:3px;
}
.space-rail::-webkit-scrollbar{ width:0; }
.space-pageitem{
  display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:9px;
  cursor:pointer; color:var(--tx-2); font-size:13.5px; font-weight:500;
  transition:background .12s ease, color .12s ease;
}
.space-pageitem:hover{ background:var(--surface-2); color:var(--tx-1); }
.space-pageitem.on{ background:var(--violet-soft); color:var(--violet-hi); }
.space-del{ opacity:0; cursor:pointer; color:var(--tx-3); transition:opacity .12s ease; display:inline-flex; }
.space-pageitem:hover .space-del{ opacity:1; }
.space-focus{ position:fixed; inset:0; z-index:150; background:var(--bg); overflow-y:auto; }
.habits{ border-collapse:collapse; }
.habits th{ padding:4px 5px; text-align:center; }
.habits td{ padding:4px 5px; text-align:center; }
.habit-cell{ width:24px; height:24px; border-radius:7px; border:1px solid var(--line); display:grid; place-items:center; cursor:pointer; margin:0 auto; transition:transform .1s ease; }
.habit-cell:hover{ transform:scale(1.12); }

/* documento por bloques (Mi Espacio) */
.doc{ max-width:760px; }
.doc-block{ display:flex; align-items:flex-start; gap:4px; position:relative; padding:3px 0; }
.doc-block > div:nth-child(3){ padding:2px 0; }
.doc-handle{ opacity:0; cursor:grab; color:var(--tx-3); font-size:12px; line-height:1.8; width:16px; text-align:center; flex:0 0 16px; user-select:none; transition:opacity .12s ease; }
.doc-plus{ opacity:0; cursor:pointer; color:var(--tx-3); width:20px; height:24px; display:grid; place-items:center; border-radius:6px; flex:0 0 20px; transition:opacity .12s ease, background .12s ease; }
.doc-plus:hover{ background:var(--surface-2); color:var(--violet-hi); }
.doc-del{ opacity:0; cursor:pointer; color:var(--tx-3); padding:4px; transition:opacity .12s ease; flex:0 0 auto; }
.doc-del:hover{ color:#e8639b; }
.doc-block:hover .doc-handle, .doc-block:hover .doc-plus, .doc-block:hover .doc-del{ opacity:1; }
.doc-slash{ position:absolute; top:100%; left:0; z-index:60; margin-top:4px; width:220px; background:#15151b; border:1px solid var(--line-2); border-radius:var(--r-lg); padding:6px; box-shadow:0 24px 50px -18px rgba(0,0,0,.7); }
.doc-slash button{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:8px 11px; border-radius:8px; border:none; background:none; color:var(--tx-1); font-size:13.5px; font-family:var(--font-body); cursor:pointer; }
.doc-slash button:hover{ background:var(--violet-soft); color:var(--violet-hi); }
.doc-slash button svg{ color:var(--violet-hi); }
.doc-addbtn{ display:flex; align-items:center; gap:8px; margin-top:8px; padding:8px 10px; border-radius:8px; border:none; background:none; color:var(--tx-3); font-size:13px; font-family:var(--font-body); cursor:pointer; transition:color .12s ease; }
.doc-addbtn:hover{ color:var(--violet-hi); }

/* ===== TABLA EDITABLE (bloque /tabla, estilo Notion/Airtable) ===== */
.tbl-wrap{ border:1px solid var(--line); border-radius:var(--r); background:var(--surface-1); overflow:hidden; margin:6px 0; }
.tbl-bar{ display:flex; align-items:center; gap:8px; padding:7px 12px; border-bottom:1px solid var(--line); background:var(--surface-2); }
.tbl-bar-btn{ display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:7px; border:1px solid var(--line); background:var(--surface-1); color:var(--tx-2); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .12s ease; }
.tbl-bar-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.tbl-scroll{ overflow-x:auto; }
.tbl-scroll::-webkit-scrollbar{ height:8px; } .tbl-scroll::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.tbl{ width:100%; border-collapse:separate; border-spacing:0; font-size:13px; font-variant-numeric:tabular-nums; }
.tbl thead th{ position:relative; background:var(--surface-2); border-bottom:1px solid var(--line-2); border-right:1px solid var(--line); padding:0; min-width:140px; text-align:left; vertical-align:bottom; }
.tbl thead th:last-child{ border-right:none; }
.tbl-th{ display:flex; align-items:center; gap:6px; padding:9px 11px 8px; }
.tbl-th-name{ flex:1; min-width:0; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:0; }
.tbl-th-name::placeholder{ color:var(--tx-3); }
.tbl-th-type{ font-family:var(--font-body); font-size:10px; color:var(--tx-3); letter-spacing:0; text-transform:none; font-weight:500; }
.tbl-th-menu{ width:22px; height:22px; border-radius:5px; border:none; background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; opacity:0; transition:all .12s ease; }
.tbl thead th:hover .tbl-th-menu{ opacity:1; }
.tbl-th-menu:hover{ background:var(--surface-3); color:var(--tx-1); }
.tbl-add-col{ min-width:42px !important; width:42px; }
.tbl-add-col button{ width:32px; height:32px; border-radius:7px; border:1px dashed var(--line-2); background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; margin:4px auto; transition:all .12s ease; }
.tbl-add-col button:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.tbl tbody td{ border-bottom:1px solid var(--line); border-right:1px solid var(--line); padding:9px 11px; color:var(--tx-1); cursor:cell; vertical-align:middle; min-height:36px; }
.tbl tbody td:last-child{ border-right:none; }
.tbl tbody td.edit{ padding:0; background:var(--surface-2); box-shadow:inset 0 0 0 1.5px var(--violet-line); }
.tbl tbody td.edit:has(input), .tbl tbody td.edit:has(select){ padding:0; }
.tbl tbody tr:hover td{ background:rgba(255,255,255,.015); }
.tbl tbody tr:hover td.edit{ background:var(--surface-2); }
.tbl-edit-in, .tbl-edit-sel{ width:100%; height:100%; min-height:36px; background:transparent; border:none; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:13px; padding:9px 11px; font-variant-numeric:tabular-nums; }
.mono-num{ font-family:var(--font-mono); }
.tbl-edit-sel{ appearance:none; cursor:pointer; }
.tbl-empty{ color:var(--tx-3); }
.tbl-row-actions{ width:32px; text-align:center; padding:0 !important; }
.tbl-row-actions button{ width:22px; height:22px; border-radius:5px; border:none; background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; margin:0 auto; opacity:0; transition:all .12s ease; }
.tbl tbody tr:hover .tbl-row-actions button{ opacity:1; }
.tbl-row-actions button:hover{ color:#e8639b; background:var(--surface-2); }
.tbl-add-row td{ padding:0 !important; border-right:none !important; }
.tbl-add-row button{ display:flex; align-items:center; gap:7px; width:100%; padding:8px 11px; border:none; background:transparent; color:var(--tx-3); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .12s ease; }
.tbl-add-row button:hover{ color:var(--violet-hi); background:var(--violet-soft); }
.tbl tfoot td{ background:var(--surface-2); border-top:1px solid var(--line-2); border-right:1px solid var(--line); padding:7px 11px; font-size:11px; color:var(--tx-3); }
.tbl tfoot td:last-child{ border-right:none; }
.tbl-total-inner{ display:flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:11px; font-variant-numeric:tabular-nums; }
.tbl-total-inner .mono{ font-size:10px; }
.tbl-menu{ position:absolute; top:100%; left:0; z-index:60; width:230px; margin-top:2px; background:#15151b; border:1px solid var(--line-2); border-radius:var(--r); padding:6px; box-shadow:0 24px 50px -18px rgba(0,0,0,.8); }
.tbl-menu-label{ font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3); padding:6px 10px 4px; }
.tbl-menu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; padding:7px 10px; border-radius:6px; border:none; background:none; color:var(--tx-1); font-family:var(--font-body); font-size:12.5px; font-weight:500; cursor:pointer; }
.tbl-menu button:hover{ background:var(--violet-soft); color:var(--violet-hi); }
.tbl-menu button.on{ color:var(--violet-hi); background:var(--violet-soft); }
.tbl-menu button.danger:hover{ background:rgba(232,99,155,.13); color:#e8639b; }
.tbl-menu button[disabled]{ opacity:.4; cursor:not-allowed; }
.tbl-menu-sep{ height:1px; background:var(--line); margin:5px 4px; }
.tbl-menu-opt{ display:flex; align-items:center; gap:8px; padding:5px 10px; }
.tbl-opt-dot{ width:10px; height:10px; border-radius:50%; flex:0 0 10px; cursor:pointer; }
.tbl-menu-opt input{ flex:1; min-width:0; background:var(--surface-2); border:1px solid var(--line); border-radius:6px; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:12.5px; padding:5px 8px; }
.tbl-menu-opt input:focus{ border-color:var(--violet-line); }
.tbl-menu-opt button{ width:22px; height:22px; padding:0; flex:0 0 22px; justify-content:center; color:var(--tx-3); }
.tbl-menu-addopt{ display:flex; align-items:center; gap:7px; padding:6px 10px; border-radius:6px; border:1px dashed var(--line-2); background:transparent; color:var(--tx-3); font-family:var(--font-body); font-size:12px; cursor:pointer; margin:4px; width:calc(100% - 8px); justify-content:flex-start; }
.tbl-menu-addopt:hover{ color:var(--violet-hi); border-color:var(--violet-line); }

/* control de tamaño de widget en dashboard */
.dash-resize{ position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); z-index:6; display:flex; gap:2px; background:#15151b; border:1px solid var(--line-2); border-radius:99px; padding:3px; box-shadow:0 8px 20px -8px rgba(0,0,0,.6); }
.dash-resize button{ min-width:26px; height:22px; border:none; background:none; border-radius:99px; color:var(--tx-3); font-family:var(--font-mono); font-size:11px; font-weight:600; cursor:pointer; transition:all .12s ease; }
.dash-resize button:hover{ color:var(--tx-1); }
.dash-resize button.on{ background:var(--violet); color:#fff; }

/* swatch picker */
.swatches{ display:flex; flex-wrap:wrap; gap:9px; }
.swatch{ width:30px; height:30px; border-radius:9px; cursor:pointer; border:2px solid transparent; transition:transform .12s ease; }
.swatch:hover{ transform:scale(1.12); }
.swatch.sel{ border-color:#fff; box-shadow:0 0 0 2px var(--bg),0 0 0 4px rgba(255,255,255,.5); }

/* toast */
.toast-wrap{ position:fixed; top:22px; right:22px; z-index:300; display:flex; flex-direction:column; gap:10px; }
.toast{
  display:flex; align-items:center; gap:11px; padding:13px 17px;
  background:var(--ink); border:none; border-left:3px solid var(--org);
  border-radius:var(--r); box-shadow:0 3px 0 var(--ink-2), 0 16px 40px -14px rgba(58,51,43,.5);
  font-size:14px; font-weight:500; color:#F4EDE0; animation:toastIn .25s ease;
}
.toast .ok{ color:var(--org-2); }
@keyframes toastIn{ from{ opacity:0; transform:translateX(30px); } to{ opacity:1; transform:none; } }

/* ===== HUBBY CHAT FAB (abajo a la izquierda) ===== */
.hubby-fab{
  position:fixed; left:22px; bottom:26px; z-index:200;
  width:60px; height:60px; border-radius:50%; border:1px solid var(--line);
  background:var(--card); cursor:pointer; padding:0;
  display:grid; place-items:center;
  box-shadow:0 3px 0 #e0d5c3, 0 14px 34px -12px rgba(58,51,43,.5);
  transition:transform .18s cubic-bezier(.2,.9,.2,1.2), box-shadow .18s ease;
}
.hubby-fab:hover{ transform:translateY(-2px); box-shadow:0 5px 0 #e0d5c3, 0 16px 36px -12px rgba(58,51,43,.55); }
.hubby-fab:active{ transform:translateY(1px); box-shadow:0 1px 0 #e0d5c3; }
.hubby-fab img{ width:44px; height:44px; }
@media(max-width:768px){
  .hubby-fab{ bottom:calc(64px + env(safe-area-inset-bottom) + 14px); left:16px; width:52px; height:52px; }
  .hubby-fab img{ width:38px; height:38px; }
}

/* ===== FEEDBACK WIDGET ===== */
.fb-fab{
  position:fixed; right:26px; bottom:26px; z-index:200;
  width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
  background:var(--ink); color:#F4EDE0; display:grid; place-items:center;
  box-shadow:0 3px 0 var(--ink-2), 0 14px 34px -10px rgba(58,51,43,.5);
  transition:transform .18s cubic-bezier(.2,.9,.2,1.2), filter .18s ease;
}
.fb-fab svg{ color:var(--org); }
.fb-fab:hover{ transform:translateY(-2px); }
.fb-fab:active{ transform:translateY(1px); }
.fb-scrim{ position:fixed; inset:0; z-index:201; background:rgba(58,51,43,.42); backdrop-filter:blur(3px); animation:fade .2s ease; display:flex; justify-content:flex-end; }
.fb-panel{
  width:min(420px,100%); height:100%; padding:30px 30px 26px;
  background:var(--card); border-left:1px solid var(--line);
  box-shadow:-30px 0 60px -25px rgba(58,51,43,.4);
  overflow-y:auto; animation:fbSlide .3s cubic-bezier(.4,.1,.2,1);
}
@keyframes fbSlide{ from{ transform:translateX(100%); } to{ transform:none; } }
.fb-panel::-webkit-scrollbar{ width:8px; } .fb-panel::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.fb-type{
  display:flex; flex-direction:column; align-items:center; gap:9px;
  padding:16px 6px; border-radius:var(--r-lg); border:1px solid var(--line-2);
  cursor:pointer; transition:all .15s ease; font-family:var(--font-body);
}
.fb-type:hover{ filter:brightness(1.12); }

/* checkbox / check item */
.cbox{ width:21px; height:21px; border-radius:6px; border:1.5px solid var(--line-2); display:grid; place-items:center; cursor:pointer; flex:0 0 auto; transition:all .14s ease; }
.cbox.on{ background:var(--violet); border-color:var(--violet); }
.check-row{ display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
.check-row:last-child{ border-bottom:none; }

/* inline add input */
.addline{ display:flex; gap:10px; align-items:center; margin-top:14px; }
.addline .input{ flex:1; padding:11px 14px; font-size:14px; }

/* tabs */
.tabs{ display:flex; gap:6px; flex-wrap:wrap; }
.tab{ font-family:var(--font-body); font-size:13.5px; font-weight:600; color:var(--tx-2); background:var(--surface-2); border:1px solid var(--line); padding:9px 16px; border-radius:99px; cursor:pointer; transition:all .14s ease; display:inline-flex; gap:7px; align-items:center; }
.tab:hover{ color:var(--tx-1); border-color:var(--line-2); }
.tab.on{ color:#fff; background:var(--violet-soft); border-color:var(--violet-line); color:var(--violet-hi); }

/* badge prioridad */
.prio{ font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 9px; border-radius:6px; }

/* select */
.sel-input{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r); color:var(--tx-1); padding:11px 14px; font-family:var(--font-body); font-size:14px; cursor:pointer; }
.sel-input:focus{ outline:none; border-color:var(--violet-line); }

/* chat bubbles */
.bubble{ max-width:74%; padding:13px 16px; border-radius:16px; font-size:14.5px; line-height:1.5; }
.bubble.me{ background:var(--violet-soft); border:1px solid var(--violet-line); border-bottom-right-radius:5px; align-self:flex-end; }
.bubble.ai{ background:var(--surface-2); border:1px solid var(--line); border-bottom-left-radius:5px; align-self:flex-start; }
.typing span{ width:6px; height:6px; border-radius:50%; background:var(--tx-3); display:inline-block; animation:blink 1.2s infinite; }
.typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
@keyframes blink{ 0%,60%,100%{ opacity:.25; } 30%{ opacity:1; } }

/* onboarding */
.ob-step-dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-family:var(--font-mono); font-weight:600; font-size:13px; border:1.5px solid var(--line-2); color:var(--tx-3); }
.ob-step-dot.on{ background:var(--violet); border-color:var(--violet); color:#fff; }
.ob-step-dot.done{ border-color:var(--violet); color:var(--violet-hi); }
.pickcard{ border:1px solid var(--line-2); border-radius:var(--r-lg); padding:24px; cursor:pointer; transition:all .15s ease; background:var(--surface-1); }
.pickcard:hover{ border-color:var(--violet-line); background:var(--surface-2); }
.pickcard.sel{ border-color:var(--violet); background:var(--violet-soft); }

/* generic empty */
.empty{ display:grid; place-items:center; padding:34px 18px; text-align:center; color:var(--tx-3); }
.empty .h3{ text-wrap:balance; }
.empty .small{ text-wrap:pretty; }

/* ===== CARD DE MATERIA (neutra, acento contenido) ===== */
.subj-card{ position:relative; cursor:pointer; padding:0; overflow:hidden; }
.subj-accent{ position:absolute; left:0; top:0; bottom:0; width:3px; }
.subj-body{ padding:18px 18px 16px 21px; }
.subj-mono{
  width:46px; height:46px; border-radius:13px; flex:0 0 auto;
  display:grid; place-items:center;
  font-family:var(--font-display); font-weight:700; font-size:19px;
  border:1px solid var(--line-2); background-size:cover; background-position:center;
}

/* color strip materia card */
.strip{ height:74px; padding:16px 18px; display:flex; flex-direction:column; justify-content:flex-end; color:#fff; position:relative; }

/* btn disabled */
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }

/* ============================================================
   MOBILE RESPONSIVE (≤ 768px)
   ============================================================ */

/* Hamburger — hidden on desktop, shown on mobile */
.header-hamburger {
  display: none;
  align-items: center; justify-content: center;
  width: 40px; height: 40px;
  border-radius: var(--r); cursor: pointer;
  color: var(--tx-2); flex: 0 0 auto;
  transition: background .15s;
}
.header-hamburger:hover { background: var(--surface-2); color: var(--tx-1); }

/* Backdrop overlay */
.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.sidebar-backdrop.visible { display: block; }

@media (max-width: 768px) {
  /* — Sidebar: off-screen por defecto, overlay cuando abierto — */
  .sidebar {
    position: fixed !important;
    left: 0; top: 0; bottom: 0;
    z-index: 200;
    width: 240px !important;
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,.1,.2,1);
    border-right: 1px solid var(--line-2);
  }
  .sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: 8px 0 40px rgba(0,0,0,.6);
  }
  /* Siempre mostrar labels en móvil (sidebar expanded) */
  .sidebar .nav-label { display: block !important; }
  .sidebar .nav-item  { justify-content: flex-start !important; padding: 0 16px !important; gap: 12px !important; }
  .sidebar-brand .wordmark { opacity: 1 !important; transform: none !important; display: block !important; }
  .sidebar .collapse-btn { display: none !important; }

  /* — Header — */
  .header-hamburger { display: flex; }
  .searchbar { display: none; }
  .header { padding: 0 14px; gap: 10px; }

  /* — Layout principal: ancho completo — */
  .app { flex-direction: column; }
  .main { width: 100%; height: 100%; }

  /* — Páginas: menos padding — */
  .page { padding: 14px 14px 90px; }
  .page-cozy { padding: 14px 14px 90px; }

  /* — Grids: 1 columna en móvil — EXCEPTO las que arman su propio
     responsive (calendario con scroll horizontal, año de correlatividades) — */
  .grid:not(.cal-week-grid):not(.cal-month-grid):not(.cal-year-grid):not(.planner-grid) { grid-template-columns: 1fr !important; }
  .subj-row { grid-template-columns: 1fr !important; }
  .tema-row { flex-wrap: wrap; }
  .tema-row > span:nth-child(3) { flex: 1 1 100% !important; order: -1; margin-bottom: 4px; }

  /* — Dashboard grid — */
  .dash-grid { grid-template-columns: 1fr !important; }

  /* — Modales: ancho completo — */
  .overlay-box { width: 95vw !important; max-width: 95vw !important; margin: 0 10px; }

  /* — Toolbar — */
  .toolbar { flex-wrap: wrap; gap: 8px; padding: 14px 14px 10px; }
  .t-meta { display: none; }

  /* — Cards: menos padding — */
  .card { padding: 16px; }

  /* — Chat: burbujas más anchas — */
  .bubble { max-width: 90% !important; }

  /* — Pomodoro: timer más chico — */
  .display { font-size: clamp(52px, 15vw, 100px) !important; }

  /* — Dashboard: evitar que span N cree columnas implícitas — */
  .grid > * { grid-column: auto !important; }

  /* — Calendario: celdas más compactas — */
  .cal-month-cell { min-height: 56px !important; padding: 5px !important; }
  .cal-ev-card { padding: 7px 9px !important; }

  /* — Misiones: header de card hace wrap — */
  .mission-head { flex-wrap: wrap; gap: 10px !important; }
}

@media (max-width: 480px) {
  /* Extra small: ajustes adicionales */
  .page { padding: 10px 10px 90px; }
  .card { padding: 12px; }
  .h1 { font-size: 22px; }
  .btn { padding: 10px 16px; font-size: 13px; }
}

/* ============================================================
   TAB BAR — solo visible en mobile (montado condicionalmente)
   ============================================================ */
.tab-bar{
  /* El JS ya lo monta solo en mobile — pero aseguramos que no aparezca en desktop */
  display:none;
}
@media(max-width:768px){
  .tab-bar{ display:flex !important; }
  /* Ocultar hamburguesa del header cuando hay tab bar */
  .app-mobile .header-hamburger{ display:none !important; }
  /* El sidebar no se monta en mobile — el espacio es todo del main */
  .app-mobile .main{ padding-bottom:0; }
}

/* ============================================================
   HOY v2 — dashboard rediseñado (hero editorial + captura + coach)
   ============================================================ */

/* — Hero — */
.hoy-hero{ padding:10px 0 6px; }
.hoy-fecha{
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  letter-spacing:.16em; text-transform:uppercase; color:var(--violet-hi);
  margin-bottom:10px;
}
.hoy-saludo{
  font-family:var(--font-display); font-style:normal; font-weight:700;
  font-size:clamp(30px,4.2vw,48px); line-height:1.04; letter-spacing:-.03em;
  color:var(--tx-1);
}
.hoy-saludo em{ font-style:normal; color:var(--org); font-weight:700; }
.hoy-sub{ margin-top:10px; color:var(--tx-2); font-size:13.5px; }
.hoy-dayline{
  margin-top:16px; height:4px; border-radius:99px; background:var(--surface-2);
  overflow:hidden; max-width:520px;
}
.hoy-dayline > div{ height:100%; border-radius:99px; background:var(--grad); transition:width 1s ease; }

/* — Captura universal — */
.capture-bar{
  display:flex; align-items:center; gap:13px;
  background:var(--surface-1); border:1px solid var(--line-2);
  border-radius:18px; padding:15px 20px;
  box-shadow:0 24px 60px -32px rgba(0,0,0,.85);
  transition:border-color .2s ease, box-shadow .2s ease;
}
.capture-bar:focus-within{
  border-color:var(--violet-line);
  box-shadow:0 24px 60px -28px rgba(0,0,0,.9), 0 0 0 3px var(--violet-soft);
}
.capture-bar input{
  flex:1; background:none; border:none; outline:none;
  font-size:15.5px; color:var(--tx-1); font-family:var(--font-body);
  min-width:0;
}
.capture-bar input::placeholder{ color:var(--tx-3); }
.capture-chip{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
  padding:4px 10px; border-radius:99px; white-space:nowrap; flex:0 0 auto;
  animation:fade-up .18s ease;
}
@keyframes fade-up{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:none;} }

/* — Menú de íconos táctiles (Hoy · Calendario · Facultad · Notas · Pelis) — */
.hoy-menu{ display:flex; gap:12px; flex-wrap:wrap; }
.hoy-menu-btn{
  display:flex; flex-direction:column; align-items:center; gap:9px;
  min-width:88px; padding:16px 20px 13px;
  background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg);
  box-shadow:0 3px 0 #e0d5c3;
  font-size:12.5px; font-weight:600; color:var(--tx-2);
  cursor:pointer; user-select:none;
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.hoy-menu-btn:hover{ transform:translateY(-2px); box-shadow:0 5px 0 #e0d5c3; }
.hoy-menu-btn:active{ transform:translateY(1px); box-shadow:0 1px 0 #e0d5c3; }
.hoy-menu-icon{
  width:44px; height:44px; border-radius:12px; background:var(--field);
  color:var(--ink); display:grid; place-items:center; position:relative;
}
.hoy-menu-btn.active{ background:var(--ink); color:#F4EDE0; box-shadow:0 3px 0 var(--ink-2); }
.hoy-menu-btn.active:hover{ box-shadow:0 5px 0 var(--ink-2); }
.hoy-menu-btn.active:active{ box-shadow:0 1px 0 var(--ink-2); }
.hoy-menu-btn.active .hoy-menu-icon{ background:rgba(244,237,224,.14); color:#F4EDE0; }
.hoy-menu-btn.active .hoy-menu-icon::after{
  content:""; position:absolute; bottom:-2px; right:-2px;
  width:9px; height:9px; border-radius:99px; background:var(--org);
  box-shadow:0 0 0 2px var(--ink);
}

/* — Hubby (mascota) — */
.hubby{ user-select:none; -webkit-user-drag:none; display:block; }
@keyframes hubby-float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
.hubby-float{ animation:hubby-float 3.2s ease-in-out infinite; }
@media(prefers-reduced-motion:reduce){ .hubby-float{ animation:none; } }

/* — Coach "¿Y ahora qué?" — */
.coach-card{
  position:relative; overflow:hidden;
  border-radius:var(--r-xl); padding:22px 24px;
  background:var(--surface-1);
  border:1px solid var(--line);
}
.coach-hubby{ position:absolute; top:14px; right:14px; z-index:1; opacity:.96; }
.coach-card .coach-title, .coach-card .coach-reason, .coach-card .coach-label{ position:relative; z-index:2; padding-right:64px; }
.coach-label{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; color:var(--org-deep);
  display:flex; align-items:center; gap:7px; margin-bottom:10px;
}
.coach-title{
  font-size:19px; font-weight:700; line-height:1.3; letter-spacing:-.01em;
}
.coach-reason{ margin-top:7px; font-size:13px; color:var(--tx-2); line-height:1.55; }

/* — Timeline de hoy — */
.tl-item{
  display:flex; align-items:flex-start; gap:13px;
  padding:11px 2px; border-bottom:1px solid var(--line);
}
.tl-item:last-child{ border-bottom:none; }
.tl-dot{ width:9px; height:9px; border-radius:99px; margin-top:5px; flex:0 0 auto; }
.tl-done{ opacity:.45; }
.tl-done .tl-text{ text-decoration:line-through; }

/* — Stats strip — */
.stat-strip{
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
}
.stat-mini{
  background:var(--surface-1); border:1px solid var(--line);
  border-radius:var(--r-lg); padding:14px 16px;
}
.stat-mini .v{
  font-family:var(--font-hero),serif; font-style:italic;
  font-size:30px; line-height:1; color:var(--tx-1);
}
.stat-mini .l{
  margin-top:6px; font-family:var(--font-mono); font-size:9.5px; font-weight:600;
  letter-spacing:.12em; text-transform:uppercase; color:var(--tx-3);
}
@media (max-width:768px){
  .stat-strip{ grid-template-columns:repeat(2,1fr); }
  .hoy-saludo{ font-size:32px; }
}

/* ============================================================
   NOTAS — festejo al aprobar / promocionar (DESIGN.md punto 8)
   ============================================================ */
.cele-overlay{
  position:fixed; inset:0; z-index:200; background:rgba(58,51,43,.45);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  animation:cele-fade .15s ease;
}
@keyframes cele-fade{ from{ opacity:0; } to{ opacity:1; } }
.cele-card{
  position:relative; z-index:2; background:var(--card); border-radius:var(--r-xl);
  padding:32px 36px; text-align:center; max-width:min(360px,86vw);
  box-shadow:0 3px 0 #e0d5c3, 0 30px 70px -20px rgba(0,0,0,.5);
  animation:cele-pop .35s cubic-bezier(.2,.8,.3,1.3);
}
@keyframes cele-pop{ from{ opacity:0; transform:scale(.85) translateY(10px);} to{ opacity:1; transform:none; } }
.cele-hubby{ width:76px; height:76px; object-fit:contain; margin:0 auto 10px; display:block; animation:cele-bounce 1.1s ease-in-out infinite; }
@keyframes cele-bounce{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-10px);} }
.cele-stamp{
  font-family:var(--font-display); font-weight:800; font-size:20px; letter-spacing:.02em;
  color:var(--org-deep); border:3px solid var(--org-deep); border-radius:12px;
  padding:10px 16px; display:inline-block; transform:rotate(-4deg);
  animation:cele-stamp .4s cubic-bezier(.2,.8,.3,1.4) .1s both;
}
.cele-stamp span{ display:block; font-family:var(--font-mono); font-weight:600; font-size:11px; letter-spacing:.06em; margin-top:4px; text-transform:uppercase; }
@keyframes cele-stamp{ from{ opacity:0; transform:rotate(-4deg) scale(1.6);} to{ opacity:1; transform:rotate(-4deg) scale(1); } }
.cele-title{ font-weight:700; font-size:17px; color:var(--tx-1); margin-top:4px; }
.cele-check{ width:64px; height:64px; margin:0 auto; }
.cele-check circle{ stroke-dasharray:145; stroke-dashoffset:145; animation:cele-check-circle .5s ease forwards; }
.cele-check path{ stroke-dasharray:40; stroke-dashoffset:40; animation:cele-check-path .3s ease .4s forwards; }
@keyframes cele-check-circle{ to{ stroke-dashoffset:0; } }
@keyframes cele-check-path{ to{ stroke-dashoffset:0; } }
.cele-confetti{
  position:absolute; top:-20px; border-radius:2px; z-index:1;
  animation-name:cele-confetti-fall; animation-timing-function:ease-in; animation-fill-mode:forwards;
}
@keyframes cele-confetti-fall{
  0%{ transform:translateY(0) rotate(0deg); opacity:1; }
  100%{ transform:translateY(100vh) rotate(360deg); opacity:0; }
}

/* ============================================================
   PRESS FEEDBACK UNIVERSAL
   .pressable + componentes clave heredan el feedback
   ============================================================ */
.pressable,
.btn,
.icon-btn,
.cbox,
.tab-item,
.swatch,
.nav-item,
.addbtn,
.addmini,
.seg button,
.cfg-tab{
  transition:transform .1s ease, opacity .1s ease;
  cursor:pointer;
}
.pressable:active,
.btn:active,
.icon-btn:active,
.cbox:active,
.tab-item:active,
.swatch:active,
.nav-item:active,
.addbtn:active,
.addmini:active,
.seg button:active,
.cfg-tab:active{
  transform:scale(.96);
  opacity:.82;
}

/* — Botones táctiles con relieve: se levantan al pasar el mouse,
   se hunden al apretar (pisa el scale genérico de arriba) — */
.btn-primary,
.btn-secondary,
.icon-btn{
  transition:transform .14s cubic-bezier(.2,.8,.3,1.3), box-shadow .14s ease, filter .14s ease, background .14s ease;
}
.btn-primary:hover{ transform:translateY(-2px); filter:brightness(1.05); box-shadow:0 5px 0 var(--org-deep); }
.btn-primary:active{ transform:translateY(1px); opacity:1; box-shadow:0 1px 0 var(--org-deep); filter:none; }
.btn-secondary:hover{ transform:translateY(-2px); box-shadow:0 4px 0 #e0d5c3; }
.btn-secondary:active{ transform:translateY(1px); opacity:1; box-shadow:0 1px 0 #e0d5c3; }
.icon-btn:hover{ transform:translateY(-1px); }
.icon-btn:active{ transform:translateY(0) scale(.94); opacity:1; }
.btn:disabled, .btn:disabled:hover, .btn:disabled:active{ transform:none; opacity:.5; cursor:not-allowed; filter:none; }

/* — Aparición de tarjetas: fade + leve subida, escalonada en grids — */
@keyframes card-in{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
.card, .subj-ed, .cal-ev-card, .cal-year-card, .cal-month-cell{
  animation:card-in .35s cubic-bezier(.2,.8,.2,1) both;
}
.grid > .card:nth-child(1), .grid > .subj-ed:nth-child(1){ animation-delay:.02s; }
.grid > .card:nth-child(2), .grid > .subj-ed:nth-child(2){ animation-delay:.06s; }
.grid > .card:nth-child(3), .grid > .subj-ed:nth-child(3){ animation-delay:.10s; }
.grid > .card:nth-child(4), .grid > .subj-ed:nth-child(4){ animation-delay:.14s; }
.grid > .card:nth-child(n+5), .grid > .subj-ed:nth-child(n+5){ animation-delay:.16s; }
@media(prefers-reduced-motion:reduce){ .card, .subj-ed, .cal-ev-card, .cal-year-card, .cal-month-cell{ animation:none; } }

/* — Check de tarea: "pop" al marcar — */
@keyframes cbox-pop{ 0%{ transform:scale(.7); } 55%{ transform:scale(1.18); } 100%{ transform:scale(1); } }
.cbox.on{ animation:cbox-pop .32s cubic-bezier(.3,1.4,.4,1); }
@media(prefers-reduced-motion:reduce){ .cbox.on{ animation:none; } }

/* ============================================================
   TAREAS — task-row (vista tabla mobile-first)
   ============================================================ */
.task-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 22px;
  border-bottom: 1px solid var(--line);
  transition: background .12s ease;
}
.task-row:hover { background: var(--surface-2); }
.task-row:last-of-type { border-bottom: none; }
.cbox {
  width: 20px; height: 20px; flex: 0 0 20px;
  border: 1.5px solid var(--line-2); border-radius: 6px;
  display: grid; place-items: center; cursor: pointer;
  transition: background .12s ease, border-color .12s ease;
}
.cbox:hover { border-color: var(--violet); }

/* ============================================================
   MI ESPACIO — rail mobile overlay
   ============================================================ */
/* Rail desktop — visible por defecto */
.space-rail-desktop { display: flex; }

/* Rail mobile — overlay lateral, oculto por defecto en desktop */
.space-rail-mobile {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 200;
  width: 260px;
  transform: translateX(-100%);
  transition: transform .28s cubic-bezier(.4,.1,.2,1);
  background: var(--bg);
  border-right: 1px solid var(--line-2);
  overflow-y: auto;
  display: none;
  flex-direction: column;
}
.space-rail-mobile.open {
  transform: translateX(0);
  box-shadow: 8px 0 40px rgba(0,0,0,.6);
}
.space-rail-backdrop { cursor: pointer; }

/* Header mobile con botón para abrir rail */
.space-mobile-header {
  display: none;
  padding: 10px 14px 4px;
  align-items: center;
}

/* ============================================================
   LANDING PAGE
   ============================================================ */
.landing-root {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.landing-blobs {
  position: absolute; inset: 0; pointer-events: none;
}
.landing-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  will-change: transform;
  animation: blob-idle 8s ease-in-out infinite alternate;
}
@keyframes blob-idle {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(6px, -10px) scale(1.04); }
  100% { transform: translate(-6px, 8px) scale(0.97); }
}
@media (prefers-reduced-motion: reduce) { .landing-blob { animation: none; } }

.landing-center {
  position: relative; z-index: 1;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 0;
  padding: 24px;
  animation: landing-in .7s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes landing-in {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: none; }
}
.landing-logo-wrap {
  position: relative; width: 84px; height: 84px; margin-bottom: 26px;
}
.landing-logo{
  width: 84px; height: 84px; display: block;
  filter: drop-shadow(0 5px 0 var(--ink-2)) drop-shadow(0 20px 40px rgba(58,51,43,.35));
  position: relative; z-index: 1;
}
.landing-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(38px, 7vw, 60px);
  letter-spacing: -.03em; line-height: 1;
  color: var(--soft); margin: 0 0 16px;
}
.landing-accent {
  font-weight: 800; color: var(--ink);
}
.landing-dot{ color: var(--org); }
.landing-sub {
  font-family: var(--font-body); font-size: clamp(14px, 2.5vw, 16.5px);
  color: var(--tx-2); line-height: 1.65;
  margin: 0 0 34px; max-width: 380px;
}
.landing-btn {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--ink); color: #F4EDE0; border: none; border-radius: 14px;
  padding: 15px 28px; font-size: 15.5px; font-weight: 700;
  font-family: var(--font-body); cursor: pointer;
  box-shadow: 0 4px 0 var(--ink-2);
  transition: transform .15s, box-shadow .15s;
  margin-bottom: 18px;
}
.landing-btn svg{ color: var(--org); }
.landing-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--ink-2); }
.landing-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 var(--ink-2); }
.landing-hint {
  font-family: var(--font-body); font-size: 12.5px;
  color: var(--tx-3); margin: 0;
}

/* ===== LOGIN / ONBOARDING / CONFIRM EMAIL (Fase 7) ===== */
.auth-root{
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg);
  overflow: hidden;
}
.auth-orbs{ position: absolute; inset: 0; pointer-events: none; }
.auth-orb{
  position: absolute; border-radius: 50%; filter: blur(85px);
  will-change: transform; animation: blob-idle 9s ease-in-out infinite alternate;
}
.auth-card{
  position: relative;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  box-shadow: 0 3px 0 #e0d5c3, 0 40px 80px -30px rgba(58,51,43,.35);
  transition: transform .15s ease;
  will-change: transform;
}
.auth-logo{
  width: 64px; height: 64px; display: block; margin: 0 auto 18px;
  filter: drop-shadow(0 4px 0 var(--ink-2));
}
.auth-wordmark{
  font-family: var(--font-display); font-size: 24px; line-height: 1;
}
.auth-wordmark .w1{ color: var(--soft); font-weight: 500; }
.auth-wordmark .w2{ color: var(--ink); font-weight: 800; }
.auth-wordmark .w3{ color: var(--org); font-weight: 800; }

/* ── CONFIGURACIÓN NAV ───────────────────────────────────── */
.cfg-nav { display: grid; gap: 3px; position: sticky; top: 0; }
.cfg-sep { display: block; }

@media (max-width: 768px) {
  /* Config nav horizontal en mobile */
  .cfg-nav { display: flex; flex-direction: row; overflow-x: auto; gap: 4px; padding-bottom: 8px; position: static; }
  .cfg-nav::-webkit-scrollbar { height: 3px; }
  .cfg-nav::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; }
  .cfg-sep { display: none; }
  .cfg-tab { flex: 0 0 auto; }

  /* Tareas */
  .task-row { padding: 12px 14px; }

  /* Mi Espacio */
  .space-rail-desktop { display: none !important; }
  .space-rail-mobile  { display: flex; }
  .space-mobile-header { display: flex; }
}

/* ============================================================
   SISTEMA DE ANIMACIONES — motion.css integrado
   Respeta prefers-reduced-motion y el toggle data-anim="off"
   ============================================================ */

/* --- Entrada en cascada para widgets y cards --- */
@media(prefers-reduced-motion:no-preference){
  [data-anim="on"] .stagger-in > *,
  [data-anim="on"] .card,
  [data-anim="on"] .task-row{
    animation:fadeSlideUp 220ms cubic-bezier(.2,.8,.2,1) both;
  }
  [data-anim="on"] .stagger-in > *:nth-child(1){ animation-delay:  0ms; }
  [data-anim="on"] .stagger-in > *:nth-child(2){ animation-delay: 40ms; }
  [data-anim="on"] .stagger-in > *:nth-child(3){ animation-delay: 80ms; }
  [data-anim="on"] .stagger-in > *:nth-child(4){ animation-delay:120ms; }
  [data-anim="on"] .stagger-in > *:nth-child(5){ animation-delay:160ms; }
  [data-anim="on"] .stagger-in > *:nth-child(n+6){ animation-delay:200ms; }
}
@keyframes fadeSlideUp{
  from{ opacity:0; transform:translateY(10px); }
  to  { opacity:1; transform:none; }
}

/* --- Barras de progreso — crecen al montar --- */
@media(prefers-reduced-motion:no-preference){
  [data-anim="on"] .bar i{
    animation:barGrow 600ms cubic-bezier(.2,.8,.2,1) both;
    transform-origin:left center;
  }
}
@keyframes barGrow{ from{ transform:scaleX(0); } to{ transform:scaleX(1); } }

/* --- Completar tarea — check se dibuja + fila se desvanece --- */
.task-done-anim{
  animation:taskFade 500ms cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes taskFade{
  0%  { opacity:1; max-height:60px; }
  60% { opacity:.3; }
  100%{ opacity:0; max-height:0; padding-top:0; padding-bottom:0; border:none; overflow:hidden; }
}

/* --- Checkbox SVG check animado --- */
.cbox-check-path{
  stroke-dasharray:18;
  stroke-dashoffset:18;
  transition:stroke-dashoffset .25s cubic-bezier(.2,.8,.2,1);
}
.cbox.done .cbox-check-path{ stroke-dashoffset:0; }

/* --- Número contando (hook JS useCountUp lo activa) --- */
.count-up{ font-variant-numeric:tabular-nums; }

/* --- Hover con vida en desktop (cards) --- */
@media(hover:hover) and (prefers-reduced-motion:no-preference){
  [data-anim="on"] .card.hoverable:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 32px -12px rgba(0,0,0,.5);
  }
  [data-anim="on"] .nav-item:hover svg{
    transform:scale(1.1);
    transition:transform .15s ease;
  }
}

/* --- Pomodoro: el countdown late cuando está corriendo --- */
@media(prefers-reduced-motion:no-preference){
  .pomo-running .pomo-display{
    animation:pomoBeat 2s ease-in-out infinite;
  }
}
@keyframes pomoBeat{
  0%,100%{ transform:scale(1); }
  50%     { transform:scale(1.012); }
}

/* --- Skeleton shimmer (mientras carga datos) --- */
.skeleton{
  background:linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size:200% 100%;
  border-radius:6px;
}
@media(prefers-reduced-motion:no-preference){
  .skeleton{ animation:shimmer 1.4s infinite; }
}
@keyframes shimmer{ to{ background-position:-200% 0; } }

/* --- Level up confetti overlay (activado por JS con clase) --- */
.levelup-anim{
  position:fixed; inset:0; pointer-events:none; z-index:9999;
  animation:levelupFade 2.2s ease forwards;
}
@keyframes levelupFade{ 0%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;} }
</style>
</head>

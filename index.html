<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<meta name="apple-mobile-web-app-title" content="StudyHub"/>

<title>StudyHub</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/assets/logo-circle.png"/>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaPrompt = e;
  });
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
<style>
/* ============================================================
   StudyHub v3 — Floating cards, deep charcoal, violet gradients
   ============================================================ */

:root {
  /* Surfaces */
  --bg:           #18181d;
  --card:         #26262d;
  --card-2:       #2d2d35;
  --card-3:       #353540;
  --inner:        #1f1f25;
  --inner-2:      #232329;

  /* Text */
  --text:         #f5f5f7;
  --text-2:       #b4b4c0;
  --text-3:       #7e7e8c;
  --text-4:       #5a5a68;

  /* Lines */
  --line:         rgba(255, 255, 255, 0.05);
  --line-2:       rgba(255, 255, 255, 0.09);

  /* Accent (violet) */
  --violet:       #8b5cf6;
  --violet-2:     #a78bfa;
  --violet-deep:  #6366f1;
  --magenta:      #d946ef;
  --pink:         #ec4899;

  --grad-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 60%, #a78bfa 100%);
  --grad-2: linear-gradient(135deg, #a855f7 0%, #c026d3 50%, #d946ef 100%);
  --grad-3: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);

  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 16px rgba(0,0,0,0.18);
  --shadow-soft: 0 2px 10px rgba(0,0,0,0.15);

  /* Type */
  --font-display: "Outfit", ui-sans-serif, system-ui, sans-serif;
  --font-sans:    "Outfit", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, monospace;

  /* Motion */
  --ease:   cubic-bezier(0.22, 1, 0.36, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --d-fast: 160ms;
  --d-base: 280ms;
  --d-slow: 520ms;

  /* Radii */
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

* , *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-weight: 400;
  overflow-x: hidden;
}

button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
::selection { background: rgba(139, 92, 246, 0.35); color: #fff; }

/* Subtle decorative violet glow at top */
.bg-deco {
  position: fixed;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 220px;
  background: radial-gradient(ellipse at center top, rgba(139, 92, 246, 0.10), transparent 70%);
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
  filter: blur(4px);
}
.bg-deco-2 {
  position: fixed;
  bottom: -80px;
  left: 12%;
  width: 380px;
  height: 200px;
  background: radial-gradient(ellipse at center top, rgba(139, 92, 246, 0.07), transparent 65%);
  pointer-events: none;
  z-index: 0;
  filter: blur(14px);
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--card-3); border-radius: 999px; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================
   Page shell
   ============================================================ */
.page {
  position: relative;
  z-index: 1;
  height: 100vh;
  height: 100dvh;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow: hidden;
}
@media (max-width: 768px) {
  .page {
    padding: 0;
    gap: 0;
    height: 100dvh;
    overflow: visible;
  }
}

/* ============================================================
   Floating header
   ============================================================ */
.header {
  background: var(--card);
  border-radius: var(--r-lg);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  box-shadow: var(--shadow-card);
  position: relative;
  z-index: 2;
}
.header__title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 22px;
  letter-spacing: 0.32em;
  margin: 0;
  white-space: nowrap;
}
.header__title b { font-weight: 600; letter-spacing: 0.32em; }
.header__dash {
  flex: 1;
  border-top: 1px dashed rgba(255,255,255,0.18);
  margin: 0 4px;
}
.header__tabs {
  display: flex;
  align-items: center;
  gap: 22px;
  font-size: 13px;
  letter-spacing: 0.24em;
  font-weight: 500;
}
.header__tab {
  color: var(--text-3);
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color var(--d-fast) var(--ease), background var(--d-fast) var(--ease);
}
.header__tab:hover { color: var(--text); }
.header__tab--active { color: var(--text); }
.header__tab--dot { color: var(--text-4); letter-spacing: 0.4em; }

/* ============================================================
   Body shell (the big rounded container)
   ============================================================ */
.shell {
  background: var(--card);
  border-radius: var(--r-xl);
  padding: 22px;
  display: grid;
  grid-template-columns: 200px 1fr 280px;
  gap: 18px;
  box-shadow: var(--shadow-card);
  position: relative;
  z-index: 1;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ============================================================
   Left navigation rail
   ============================================================ */
.rail {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 0;
  overflow-y: auto;
  overflow-x: hidden;
  height: 100%;
  scrollbar-width: none;
}
.rail::-webkit-scrollbar { display: none; }

.r-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 16px;
  border-radius: var(--r-sm);
  color: var(--text-2);
  font-size: 14px;
  font-weight: 500;
  position: relative;
  cursor: pointer;
  transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease);
  white-space: nowrap;
}
.r-item:hover { background: var(--inner-2); color: var(--text); }
.r-item__icon { width: 18px; height: 18px; display: grid; place-items: center; color: var(--text-3); flex-shrink: 0; transition: color var(--d-fast) var(--ease); }
.r-item:hover .r-item__icon { color: var(--violet-2); }
.r-item--active {
  background: var(--inner-2);
  color: var(--text);
}
.r-item--active .r-item__icon { color: var(--violet-2); }
.r-item--active::before {
  content: "";
  position: absolute;
  left: -22px;
  top: 12px; bottom: 12px;
  width: 3px;
  background: var(--violet);
  border-radius: 0 3px 3px 0;

}
.r-item--logout { color: var(--violet); }
.r-item--logout:hover { color: var(--violet-2); background: rgba(139, 92, 246, 0.08); }
.r-item--logout .r-item__icon { color: var(--violet); }

.rail__sep {
  height: 1px;
  background: var(--line-2);
  margin: 14px 16px;
  border: 0;
}

/* ============================================================
   Center column
   ============================================================ */
.center {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-width: 0;
  overflow-y: auto;
  padding-right: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}

/* Widget grid (the dashboard composition) */
.widget-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 18px;
}
.widget { min-width: 0; }
.widget--s4 { grid-column: span 4; }
.widget--s5 { grid-column: span 5; }
.widget--s6 { grid-column: span 6; }
.widget--s7 { grid-column: span 7; }
.widget--s8 { grid-column: span 8; }
.widget--s12 { grid-column: span 12; }
@media (max-width: 1100px) {
  .widget--s4, .widget--s5, .widget--s6, .widget--s7, .widget--s8 { grid-column: span 12; }
}

/* Page heading (per-route) */
.route-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 4px;
}
.route-head__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 26px;
  letter-spacing: -0.02em;
  margin: 0;
}
.route-head__sub {
  font-size: 13px;
  color: var(--text-3);
  margin: 2px 0 0;
}
.route-head__actions { display: flex; gap: 10px; align-items: center; }

/* ===== STUDYHUB BANNER ===== */
.banner {
  width: 100%;
  height: 120px;
  background: linear-gradient(135deg, #0d0d12 0%, #150d26 55%, #0d0d12 100%);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 20px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.banner::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.09) 0%, transparent 65%);
  top: -150px;
  left: -100px;
  pointer-events: none;
}
.banner-logo {
  width: 88px;
  height: 88px;
  flex-shrink: 0;
}
.banner-title {
  font-family: 'Outfit', sans-serif;
  font-size: 42px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1;
  margin: 0;
}
.banner-title span {
  background: linear-gradient(90deg, #8b5cf6 0%, #d946ef 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.banner-tagline {
  font-family: 'DM Sans', 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 8px 0 0 0;
}

/* Generic per-route panel */
.r-panel {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 22px 24px;
}

/* Mini stat card (used by stat widgets that aren't gradient) */
.mini-stat {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 140px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--d-base) var(--ease), background var(--d-fast) var(--ease);
}
.mini-stat:hover { background: var(--inner-2); transform: none; }
.mini-stat__label { font-size: 12px; color: var(--text-3); margin: 0; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
.mini-stat__value { font-family: var(--font-display); font-size: 38px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; margin: 4px 0 0; }
.mini-stat__value em { font-style: italic; color: var(--violet-2); }
.mini-stat__sub { font-size: 12px; color: var(--text-2); margin-top: auto; }
.mini-stat__icon {
  position: absolute;
  top: 18px; right: 18px;
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(139, 92, 246, 0.12);
  color: var(--violet-2);
  display: grid; place-items: center;
}

/* Calendar mini-grid */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--inner-2);
  display: flex;
  flex-direction: column;
  padding: 6px 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--d-fast) var(--ease);
  position: relative;
}
.cal-cell:hover { background: var(--card-2); color: var(--text); }
.cal-cell--out { opacity: 0.3; }
.cal-cell--today { background: var(--violet); color: white; }
.cal-cell--has::after { display: none; }
.cal-cell--today.cal-cell--has::after { display: none; }
.cal-cell .ev-chip { display:block; font-size:9px; font-weight:600; padding:2px 4px; border-radius:4px; background:rgba(139,92,246,0.25); color:var(--violet-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; line-height:1.3; }
.cal-cell--today .ev-chip { background:rgba(255,255,255,0.25); color:white; }
.cal-head {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Mission cards */
.mission {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 18px;
  transition: transform var(--d-base) var(--ease), background var(--d-fast) var(--ease);
  cursor: pointer;
}
.mission:hover { background: var(--inner-2); }
.mission__ring {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--grad-1);
  display: grid; place-items: center;
  color: white;
  font-weight: 600;
  flex-shrink: 0;
  position: relative;
}
.mission__ring--alt { background: var(--grad-2); }
.mission__main { flex: 1; min-width: 0; }
.mission__title { font-family: var(--font-display); font-weight: 600; font-size: 15px; margin: 0; }
.mission__desc { font-size: 12px; color: var(--text-3); margin: 4px 0 8px; line-height: 1.4; }
.mission__bar { height: 4px; background: var(--inner-2); border-radius: 999px; overflow: hidden; }
.mission__bar-fill { height: 100%; background: var(--grad-1); animation: grow 300ms var(--ease) both; transform-origin: left; }
@keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.mission__xp {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--violet-2);
  padding: 6px 10px;
  background: rgba(139, 92, 246, 0.12);
  border-radius: 8px;
  flex-shrink: 0;
}

/* Chat panel */
.chat-msg {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.chat-msg:last-child { border-bottom: 0; }
.chat-msg__av {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
}
.chat-msg__body {
  flex: 1; min-width: 0;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
}
.chat-msg__from { font-weight: 600; font-size: 12px; color: var(--text); margin-bottom: 2px; }
.chat-msg__from small { color: var(--text-3); font-weight: 400; margin-left: 6px; }
.chat-msg--me .chat-msg__av { background: var(--grad-1); }
.chat-msg--ai .chat-msg__av { background: var(--grad-2); }

.chat-input {
  display: flex;
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  margin-top: 8px;
}
.chat-input input {
  flex: 1;
  background: var(--inner-2);
  border: 1px solid var(--line-2);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  outline: 0;
  transition: all var(--d-fast) var(--ease);
}
.chat-input input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }
.chat-input button {
  background: var(--violet);
  color: white;
  width: 44px; height: 44px;
  border-radius: 12px;
  display: grid; place-items: center;
  transition: all var(--d-fast) var(--ease);
}
.chat-input button:hover { background: var(--violet-deep); }

/* Diary entry */
.diary-textarea {
  width: 100%;
  min-height: 240px;
  background: var(--inner-2);
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  padding: 16px 18px;
  font: 14px/1.6 var(--font-sans);
  color: var(--text);
  outline: 0;
  resize: vertical;
  transition: all var(--d-fast) var(--ease);
}
.diary-textarea:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }

/* Subject cards (Facultad) */
.subject {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: pointer;
  transition: transform var(--d-base) var(--ease), background var(--d-fast) var(--ease);
  position: relative;
  overflow: hidden;
}
.subject:hover { background: var(--inner-2); }
.subject__head { display: flex; align-items: center; gap: 12px; }
.subject__badge {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: rgba(139, 92, 246, 0.15);
  color: var(--violet-2);
  font-weight: 600;
  font-size: 13px;
}
.subject__name { font-family: var(--font-display); font-weight: 600; font-size: 16px; margin: 0; }
.subject__meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.subject__bar { height: 6px; background: var(--inner-2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
.subject__bar-fill { height: 100%; background: var(--grad-1); animation: grow 300ms var(--ease) both; transform-origin: left; }
.subject__foot { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-top: 4px; }

/* Cocina list */
.kitchen-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--inner);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all var(--d-fast) var(--ease);
}
.kitchen-item:hover { background: var(--inner-2); }
.kitchen-item__icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(139, 92, 246, 0.12);
  color: var(--violet-2);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.kitchen-item__main { flex: 1; min-width: 0; }
.kitchen-item__title { font-weight: 500; font-size: 14px; }
.kitchen-item__sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.kitchen-item__tag {
  font-size: 11px;
  color: var(--text-3);
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--inner-2);
  font-family: var(--font-mono);
}
.kitchen-item__tag--warn { background: rgba(239, 68, 68, 0.12); color: #fb7185; }

/* Dashboard editor (in settings modal) */
.dash-editor { display: flex; flex-direction: column; gap: 16px; }
.dash-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--inner);
  border-radius: 10px;
  transition: background var(--d-fast) var(--ease);
}
.dash-row:hover { background: var(--inner-2); }
.dash-row__handle {
  color: var(--text-4);
  cursor: grab;
  padding: 0 2px;
}
.dash-row__icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(139, 92, 246, 0.12);
  color: var(--violet-2);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.dash-row__main { flex: 1; min-width: 0; }
.dash-row__title { font-size: 13px; font-weight: 500; }
.dash-row__desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.dash-row__btns { display: flex; gap: 4px; }
.dash-mini-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: grid; place-items: center;
  color: var(--text-3);
  background: transparent;
  transition: all var(--d-fast) var(--ease);
}
.dash-mini-btn:hover { background: var(--card-2); color: var(--text); }
.dash-mini-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.dash-mini-btn--danger:hover { background: rgba(248,113,113,0.12); color: #f87171; }

.dash-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.dash-divider::after { content: ''; flex: 1; height: 1px; background: var(--line-2); }

.dash-add-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  background: transparent;
  border: 1px dashed var(--line-2);
  transition: all var(--d-fast) var(--ease);
  cursor: pointer;
}
.dash-add-row:hover { border-color: var(--violet); background: rgba(139,92,246,0.05); }
.dash-add-row__add {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--violet);
  color: white;
  display: grid; place-items: center;
}


/* Search row */
.top-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.search {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  background: var(--inner-2);
  border-radius: var(--r-md);
  transition: background var(--d-fast) var(--ease), box-shadow var(--d-base) var(--ease);
}
.search:focus-within { background: var(--card-2); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25); }
.search input {
  flex: 1; min-width: 0;
  border: 0; outline: 0; background: transparent;
  font-size: 14px;
}
.search input::placeholder { color: var(--text-3); }
.search__icon { color: var(--text-3); display: flex; }

.icon-btn {
  width: 50px; height: 50px;
  border-radius: var(--r-md);
  background: var(--inner-2);
  display: grid;
  place-items: center;
  color: var(--text-2);
  position: relative;
  transition: background var(--d-fast) var(--ease), transform var(--d-fast) var(--ease);
}
.icon-btn:hover { background: var(--card-2); }
.icon-btn:active { opacity: 0.8; }
.icon-btn__badge {
  position: absolute;
  top: 8px; right: 8px;
  min-width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--violet);
  color: white;
  font-size: 10px;
  font-weight: 600;
  display: grid; place-items: center;
  padding: 0 5px;
  box-shadow: 0 0 0 3px var(--card);
}
.icon-btn__badge--pink { background: var(--pink); }

/* Stat gradient cards */
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.stat {
  position: relative;
  border-radius: var(--r-md);
  padding: 24px 28px;
  color: white;
  overflow: hidden;
  min-height: 140px;
  cursor: pointer;
  transition: transform var(--d-base) var(--ease), box-shadow var(--d-base) var(--ease);
  isolation: isolate;
}
.stat:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.18); }
.stat--violet { background: var(--grad-1); }
.stat--magenta { background: var(--grad-2); }
.stat::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 110%, rgba(255,255,255,0.18), transparent 50%),
    radial-gradient(circle at 100% -20%, rgba(255,255,255,0.12), transparent 50%);
  pointer-events: none;
  z-index: -1;
}
.stat__label {
  font-size: 13px;
  font-weight: 400;
  opacity: 0.85;
  margin: 0 0 6px;
}
.stat__value {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1.05;
}
.stat__donut {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  width: 78px; height: 78px;
}
.stat__donut-text {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 600;
  color: white;
}

/* Middle row: chart + ring */
.mid-row {
  display: grid;
  grid-template-columns: 1.45fr 1fr;
  gap: 18px;
}
.panel {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 22px 24px;
  position: relative;
}
.panel__head {
  display: flex;
  align-items: center;
  margin-bottom: 14px;
}
.panel__title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  margin: 0;
  flex: 1;
  text-align: center;
}
.panel__title--left { text-align: left; }
.panel__more {
  width: 26px; height: 26px;
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--text-3);
  transition: background var(--d-fast) var(--ease);
}
.panel__more:hover { background: var(--card-2); color: var(--text); }

.chart-wrap {
  width: 100%;
  height: 200px;
  position: relative;
}
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 6px;
  padding-left: 28px;
}
.weekday--active { color: var(--violet-2); font-weight: 600; }

/* Donut ring panel */
.ring-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.ring-wrap { width: 150px; height: 150px; position: relative; margin: 10px 0; }
.ring-wrap__text {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 600;
  white-space: nowrap;
}
.legend {
  display: flex;
  gap: 24px;
  width: 100%;
  justify-content: center;
}
.legend__item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
.legend__dot {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500;
}
.legend__dot::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
}
.legend__dot--ok::before { background: var(--violet); }
.legend__dot--wait::before { background: var(--magenta); }
.legend__sub { font-size: 10px; color: var(--text-3); max-width: 110px; line-height: 1.3; }

/* Bottom row */
.bot-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 18px;
}

.upgrade {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: center;
  align-items: center;
  cursor: pointer;
  transition: transform var(--d-base) var(--ease), background var(--d-fast) var(--ease);
}
.upgrade:hover { background: var(--inner-2); }
.upgrade__planet {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--grad-2);
  display: grid; place-items: center;
  position: relative;
  margin-bottom: 6px;
  box-shadow: 0 0 0 2px rgba(217, 70, 239, 0.08), 0 4px 12px rgba(168, 85, 247, 0.18);
}
.upgrade__planet svg { color: white; }
.upgrade__planet::after {
  content: "";
  position: absolute;
  inset: -14px;
  border: 1.5px solid rgba(217, 70, 239, 0.45);
  border-radius: 50%;
  transform: rotate(-25deg);
  border-top-color: transparent;
  border-right-color: transparent;
}
.upgrade__title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 14px;
  margin: 0;
}
.upgrade__desc {
  font-size: 11px;
  color: var(--text-3);
  margin: 0;
  line-height: 1.45;
}
.upgrade__desc b { color: var(--violet-2); font-weight: 600; }

/* Projects table */
.table-panel {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
}
.table-panel__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.table-panel__title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  margin: 0;
}
.table-panel__more {
  font-size: 12px;
  color: var(--violet-2);
  font-weight: 500;
}

.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  font-weight: 500;
  font-size: 12px;
  color: var(--text-3);
  padding: 6px 8px;
}
.tbl td {
  padding: 10px 8px;
  border-top: 1px solid var(--line);
  color: var(--text);
}
.tbl tr { transition: background var(--d-fast) var(--ease); }
.tbl tbody tr:hover { background: rgba(255,255,255,0.02); }

.t-name { display: flex; align-items: center; gap: 10px; font-weight: 500; }
.t-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--card-3);
  display: grid; place-items: center;
  font-size: 12px; font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}
.t-avatar--v1 { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
.t-avatar--v2 { background: linear-gradient(135deg, #d946ef, #a855f7); }
.t-avatar--v3 { background: linear-gradient(135deg, #ec4899, #d946ef); }
.t-avatar--v4 { background: linear-gradient(135deg, #6366f1, #3b82f6); }

.t-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-2);
}
.t-status::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--violet);
}
.t-status--blue::before { background: #60a5fa; }
.t-status--pink::before { background: var(--pink); }
.t-status--ok::before { background: #4ade80; }

.t-dots {
  font-size: 16px;
  color: var(--text-3);
  cursor: pointer;
  padding: 0 8px;
}

/* ============================================================
   Right column (profile + actions + about)
   ============================================================ */
.right {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.profile {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.profile__avatar {
  width: 78px; height: 78px;
  border-radius: 50%;
  background: var(--grad-1);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 600;
  color: white;
  position: relative;
  margin-bottom: 6px;
  box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
}
.profile__avatar::after {
  content: "";
  position: absolute;
  right: 4px; bottom: 4px;
  width: 12px; height: 12px;
  background: #4ade80;
  border-radius: 50%;
  box-shadow: 0 0 0 3px var(--inner);
}
.profile__name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  margin: 0;
}
.profile__role {
  font-size: 12px;
  color: var(--text-3);
  margin: 0;
}
.profile__actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  width: 100%;
}
.profile__btn {
  flex: 1;
  height: 44px;
  border-radius: 12px;
  background: rgba(139, 92, 246, 0.14);
  color: var(--violet-2);
  display: grid; place-items: center;
  transition: background var(--d-fast) var(--ease), transform var(--d-fast) var(--ease);
}
.profile__btn:hover { background: rgba(139, 92, 246, 0.22); }
.profile__btn:active { opacity: 0.8; }

/* About + people list */
.about {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.about__title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 500;
  margin: 0;
}
.about__desc {
  font-size: 12px;
  color: var(--text-3);
  margin: 0;
  line-height: 1.55;
}

.p-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
  cursor: pointer;
  transition: opacity var(--d-fast) var(--ease);
}
.p-row:hover { opacity: 0.8; }
.p-row__av {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
}
.p-row__name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.2;
}
.p-row__role {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}

/* Send money / streak panel */
.send {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}
.send__left { display: flex; flex-direction: column; gap: 2px; }
.send__label { font-size: 12px; color: var(--text-2); margin: 0; }
.send__sub { font-size: 10px; color: var(--text-3); margin: 0; }
.send__value {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.01em;
}

/* ============================================================
   Animations
   ============================================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes drawIn {
  from { stroke-dashoffset: 1000; }
  to   { stroke-dashoffset: 0; }
}
@keyframes ringIn {
  from { stroke-dashoffset: var(--ring-circ); }
  to   { stroke-dashoffset: var(--ring-offset); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.35); opacity: 0; }
}
.fade-up { animation: fadeUp var(--d-slow) var(--ease) both; }
.stagger > * { animation: fadeUp 200ms var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 30ms; }
.stagger > *:nth-child(3) { animation-delay: 60ms; }
.stagger > *:nth-child(4) { animation-delay: 90ms; }
.stagger > *:nth-child(5) { animation-delay: 120ms; }
.stagger > *:nth-child(6) { animation-delay: 150ms; }
.stagger > *:nth-child(7) { animation-delay: 180ms; }
.stagger > *:nth-child(8) { animation-delay: 210ms; }

.draw-line {
  stroke-dasharray: 1000;
  animation: drawIn 0.8s var(--ease) both;
}
.ring-anim {
  stroke-dasharray: var(--ring-circ);
  animation: ringIn 1.2s var(--ease) both 0.2s;
}

/* Page enter */
/* .page-enter — animation defined in GLOBAL POLISH section below */

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1180px) {
  .shell { grid-template-columns: 180px 1fr 260px; }
}
@media (max-width: 960px) {
  .shell { grid-template-columns: 180px 1fr; }
  .right { display: none; }
}

/* ============================================================
   MOBILE — bottom tab bar layout
   ============================================================ */
.mobile-nav {
  display: none;
}

@media (max-width: 768px) {
  /* Root layout */
  body { padding-bottom: 0 !important; }

  .shell {
    display: flex !important;
    flex-direction: column !important;
    border-radius: 0 !important;
    padding: 0 !important;
    gap: 0 !important;
    min-height: 100dvh;
    padding-bottom: 64px !important;
  }

  /* Hide desktop sidebar */
  .rail { display: none !important; }

  /* Hide right panel */
  .right { display: none !important; }

  /* Center content takes full width */
  .center {
    padding: 12px 14px 0 !important;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  /* Top row — compact */
  .top-row { gap: 8px; margin-bottom: 8px; }
  .search { font-size: 13px; }
  .search-cmd-hint { display: none; }

  /* Banner — más pequeño */
  .banner { height: 80px !important; padding: 0 16px !important; gap: 12px !important; border-radius: 12px !important; }
  .banner-logo { width: 56px !important; height: 56px !important; }
  .banner-title { font-size: 28px !important; letter-spacing: -1.5px !important; }
  .banner-tagline { font-size: 9px !important; letter-spacing: 3px !important; margin-top: 4px !important; }

  /* Widget grid — una columna */
  .widget-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
  .widget { grid-column: span 1 !important; }

  /* Stats */
  .stat { padding: 16px 18px; min-height: 100px; }
  .stat__value { font-size: 26px; }
  .stat__donut { width: 60px; height: 60px; right: 14px; }

  /* Topbar summary — scroll horizontal */
  .topbar-summary { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Cards y secciones */
  .page { padding: 0; gap: 12px; }
  .r-panel { padding: 14px; border-radius: 14px; }
  .route-head { padding: 0 0 12px 0; }
  .route-head__title { font-size: 18px; }

  /* Modales full-screen en mobile */
  .modal__box {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    border-radius: 20px 20px 0 0 !important;
    position: fixed !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    max-height: 90dvh !important;
    overflow-y: auto !important;
  }
  .modal__wrap {
    align-items: flex-end !important;
    padding: 0 !important;
  }

  /* Bottom nav */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    background: var(--card);
    border-top: 1px solid var(--line);
    z-index: 200;
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .mobile-nav__item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--text-3);
    transition: color 150ms;
    border: none;
    background: none;
    font-family: inherit;
    padding: 8px 4px;
    border-radius: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-nav__item:active { background: var(--inner); }
  .mobile-nav__item--active { color: var(--violet-2); }
  .mobile-nav__item--active svg { color: var(--violet-2); }
  .mobile-nav__label { font-size: 10px; font-weight: 500; }

  /* Pomodoro fullscreen fix */
  .pomodoro-focus-portal { padding-bottom: 64px !important; }

  /* Tables → scroll horizontal */
  .tasks-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Misiones, Finanzas, Casa — cards más compactas */
  .r-panel { padding: 12px 14px !important; }
  .route-head { flex-wrap: wrap; gap: 8px; }
  .route-head__actions { flex-wrap: wrap; }

  /* Login card full width en mobile */
  .login-card { width: 100% !important; margin: 16px !important; border-radius: 16px !important; }

  /* Dropdown menus */
  .dropdown { right: 0; left: auto; min-width: 260px; }

  /* Ocultar topbar summary en mobile si hay poco espacio */
  .topbar-summary { font-size: 12px; }
  .tbs-item__num { font-size: 15px; }

  /* Tabla de tareas — scroll horizontal */
  .table-panel { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl { min-width: 500px; }

  /* Chat */
  .chat-msg__av { width: 28px !important; height: 28px !important; font-size: 11px !important; flex-shrink: 0; }

  /* Formularios en onboarding/login full width */
  input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="time"] {
    font-size: 16px !important; /* previene zoom en iOS al enfocar */
  }
}

/* ============================================================
   Rail bottom (Settings button area)
   ============================================================ */
.rail__spacer { flex: 1; min-height: 12px; }

.rail__bottom {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--line);
}

.r-item__chev {
  margin-left: auto;
  color: var(--text-4);
  transition: transform var(--d-fast) var(--ease);
}
.r-item:hover .r-item__chev { color: var(--text-2); transform: translateX(2px); }

.quick-toggle {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
}
.quick-toggle__btn {
  flex: 1;
  height: 32px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: var(--inner);
  color: var(--text-3);
  transition: all var(--d-fast) var(--ease);
}
.quick-toggle__btn:hover { background: var(--inner-2); color: var(--text); }
.quick-toggle__btn[data-on="true"] { background: rgba(139, 92, 246, 0.18); color: var(--violet-2); }

/* ============================================================
   Settings modal
   ============================================================ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid;
  place-items: center;
  z-index: 100;
  animation: backdropIn var(--d-base) var(--ease) both;
  padding: 24px;
}
@keyframes backdropIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes modalSlideUp {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal {
  background: var(--card);
  border-radius: var(--r-lg);
  width: min(640px, 100%);
  max-height: calc(100vh - 48px);
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
  animation: modalIn var(--d-base) var(--spring) both;
  overflow: hidden;
}

.modal__head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--line);
}
.modal__head svg { color: var(--violet-2); }
.modal__title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.01em;
}
.modal__sub {
  font-size: 12px;
  color: var(--text-3);
  margin: 2px 0 0;
}
.modal__close {
  margin-left: auto;
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--text-3);
  transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease);
}
.modal__close:hover { background: var(--inner-2); color: var(--text); }

.modal__body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 24px 20px;
}

.cfg-tabs {
  display: flex;
  gap: 4px;
  padding: 14px 0 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 18px;
}
.cfg-tab {
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all var(--d-fast) var(--ease);
}
.cfg-tab:hover { color: var(--text); background: var(--inner); }
.cfg-tab--active { color: var(--text); background: var(--inner-2); }
.cfg-tab--active svg { color: var(--violet-2); }

.cfg-section {
  margin-bottom: 28px;
}
.cfg-section__title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin: 0 0 12px;
}

.cfg-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.cfg-row:last-child { border-bottom: 0; }
.cfg-row__main { flex: 1; min-width: 0; }
.cfg-row__label { font-size: 14px; font-weight: 500; color: var(--text); }
.cfg-row__desc  { font-size: 12px; color: var(--text-3); margin-top: 2px; line-height: 1.4; }

/* Segment control */
.seg {
  display: flex;
  background: var(--inner);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.seg button {
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-3);
  transition: all var(--d-fast) var(--ease);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.seg button:hover { color: var(--text); }
.seg button[data-on="true"] {
  background: var(--card-2);
  color: var(--text);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05);
}

/* Toggle switch */
.switch {
  width: 40px;
  height: 22px;
  background: var(--inner-2);
  border-radius: 999px;
  position: relative;
  transition: background var(--d-base) var(--ease);
  flex-shrink: 0;
}
.switch::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  background: var(--text-2);
  border-radius: 50%;
  transition: all var(--d-base) var(--spring);
}
.switch[data-on="true"] { background: var(--violet); }
.switch[data-on="true"]::after { left: 20px; background: white; }

/* Color swatches grid */
.swatch-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.swatch {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: transform var(--d-fast) var(--spring), box-shadow var(--d-fast) var(--ease);
  border: 2px solid transparent;
}
.swatch:hover { transform: translateY(-2px) scale(1.05); }
.swatch[data-on="true"] {
  box-shadow: 0 0 0 2px var(--violet), 0 8px 20px rgba(0,0,0,0.3);
}

/* Input field */
.cfg-input {
  background: var(--inner);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  outline: 0;
  min-width: 0;
  width: 180px;
  transition: border-color var(--d-fast) var(--ease), box-shadow var(--d-fast) var(--ease);
}
.cfg-input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }

/* Slider */
.cfg-slider {
  width: 180px;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
}
.cfg-slider::-webkit-slider-runnable-track {
  height: 4px; background: var(--inner-2); border-radius: 999px;
}
.cfg-slider::-moz-range-track {
  height: 4px; background: var(--inner-2); border-radius: 999px;
}
.cfg-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--violet); margin-top: -6px;
  box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
  transition: transform var(--d-fast) var(--spring);
}
.cfg-slider::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--violet); border: 0;
  box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
}
.cfg-slider:hover::-webkit-slider-thumb { transform: scale(1.15); }

.modal__foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--inner);
  border-top: 1px solid var(--line);
}
.btn-danger {
  font-size: 12px;
  color: #f87171;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background var(--d-fast) var(--ease);
}
.btn-danger:hover { background: rgba(248, 113, 113, 0.1); }
.btn-primary {
  background: var(--violet);
  color: white;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--d-fast) var(--ease);
}
.btn-primary:hover { background: var(--violet-deep); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(139,92,246,0.25); }
.btn-secondary {
  background: transparent;
  color: var(--violet-2);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1.5px solid rgba(139,92,246,0.35);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--d-fast) var(--ease);
}
.btn-secondary:hover { background: rgba(139,92,246,0.08); border-color: var(--violet); }

/* ============================================================
   Dropdowns (notifications, chat)
   ============================================================ */
.dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--card);
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  width: 320px;
  z-index: 50;
  animation: modalIn var(--d-base) var(--spring) both;
  overflow: hidden;
}
.dropdown__head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dropdown__title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
.dropdown__action {
  font-size: 11px;
  color: var(--violet-2);
  font-weight: 500;
}
.dropdown__action:hover { color: var(--violet); }
.dropdown__body { max-height: 320px; overflow-y: auto; }
.dropdown__row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  transition: background var(--d-fast) var(--ease);
  cursor: pointer;
}
.dropdown__row:last-child { border-bottom: 0; }
.dropdown__row:hover { background: var(--inner); }
.dropdown__row[data-unread="true"] {
  background: rgba(139, 92, 246, 0.05);
  border-left: 2px solid var(--violet);
  padding-left: 16px;
}
.dropdown__dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.dropdown__dot--v1 { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; }
.dropdown__dot--v2 { background: linear-gradient(135deg, #d946ef, #a855f7); color: white; }
.dropdown__dot--v3 { background: linear-gradient(135deg, #ec4899, #d946ef); color: white; }
.dropdown__text {
  flex: 1; min-width: 0;
  font-size: 12px;
  color: var(--text);
  line-height: 1.45;
}
.dropdown__text b { font-weight: 600; }
.dropdown__time {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
  font-family: var(--font-mono);
}
.dropdown__empty {
  padding: 32px 18px;
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
}

.top-row__icon-wrap { position: relative; }

/* ============================================================
   Task editor (in table panel)
   ============================================================ */
.task-add {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 8px;
  border-top: 1px solid var(--line);
}
.task-add input {
  flex: 1; min-width: 0;
  background: var(--inner-2);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  outline: 0;
  transition: all var(--d-fast) var(--ease);
}
.task-add input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }
.task-add input::placeholder { color: var(--text-3); }
.task-add__btn {
  background: var(--violet);
  color: white;
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid; place-items: center;
  transition: all var(--d-fast) var(--ease);
}
.task-add__btn:hover { background: var(--violet-deep); transform: rotate(90deg); }

.tbl__check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--line-2);
  display: grid; place-items: center;
  cursor: pointer;
  transition: all var(--d-fast) var(--ease);
  flex-shrink: 0;
}
.tbl__check:hover { border-color: var(--violet); }
.tbl__check[data-done="true"] {
  background: var(--violet);
  border-color: var(--violet);
  color: white;
}
.tbl__row--done .t-name,
.tbl__row--done td:nth-child(2),
.tbl__row--done td:nth-child(3) {
  text-decoration: line-through;
  text-decoration-color: var(--text-4);
  color: var(--text-3);
}

.t-del {
  color: var(--text-3);
  width: 28px; height: 28px;
  border-radius: 6px;
  display: grid; place-items: center;
  transition: all var(--d-fast) var(--ease);
  opacity: 0;
}
.tbl tr:hover .t-del { opacity: 1; }
.t-del:hover { background: rgba(248, 113, 113, 0.12); color: #f87171; }

/* Empty state for filtered tasks */
.tbl-empty {
  padding: 32px 12px;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  animation: toastIn var(--d-base) var(--spring) both;
  z-index: 80;
}
.toast svg { color: var(--violet-2); }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 12px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* Reduced motion */
:root[data-motion="reduced"] *,
:root[data-motion="reduced"] *::before,
:root[data-motion="reduced"] *::after {
  animation-duration: 0.01ms !important;
  animation-iteration-count: 1 !important;
  transition-duration: 0.01ms !important;
}

/* Sidebar collapsed */
:root[data-sidebar="collapsed"] .shell { grid-template-columns: 64px 1fr 280px; }
:root[data-sidebar="collapsed"] .r-item { justify-content: center; padding: 11px 0; }
:root[data-sidebar="collapsed"] .r-item > span:not(.r-item__icon),
:root[data-sidebar="collapsed"] .r-item__chev { display: none; }
:root[data-sidebar="collapsed"] .r-item--active::before { left: -12px; }
:root[data-sidebar="collapsed"] .quick-toggle { flex-direction: column; padding: 6px 4px; }

@media (max-width: 1180px) {
  :root[data-sidebar="collapsed"] .shell { grid-template-columns: 64px 1fr 260px; }
}

/* ============================================================
   DASHBOARD VISUAL EDITOR
   ============================================================ */

/* Editor toolbar (sticky top of dashboard) */
.editor-toolbar {
  position: sticky;
  top: 0;
  background: var(--card);
  border-radius: var(--r-md);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 30;
  margin-bottom: 4px;
  border: 1px solid rgba(139, 92, 246, 0.4);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  animation: fadeUp 280ms var(--ease) both;
}
.editor-toolbar__pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--violet);
  position: relative;
  flex-shrink: 0;
}
.editor-toolbar__pulse::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: var(--violet);
  opacity: 0.4;
  animation: pulseRing 1.8s infinite var(--ease);
}
@keyframes pulseRing {
  0% { transform: scale(1); opacity: 0.3; }
  100% { transform: scale(2.2); opacity: 0; }
}
.editor-toolbar__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  margin: 0;
}
.editor-toolbar__hint {
  font-size: 12px;
  color: var(--text-3);
  flex: 1;
  margin-left: 8px;
}
.editor-toolbar__btn {
  font-size: 12px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 8px;
  background: var(--inner-2);
  color: var(--text);
  transition: all 140ms var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.editor-toolbar__btn:hover { background: var(--card-2); }
.editor-toolbar__btn--primary {
  background: var(--violet);
  color: white;
}
.editor-toolbar__btn--primary:hover { background: var(--violet-deep); transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow, rgba(139,92,246,0.4)); }

/* Editable widget wrapper */
.widget.editable {
  position: relative;
  cursor: grab;
  outline: 1.5px dashed rgba(139, 92, 246, 0.35);
  outline-offset: -4px;
  border-radius: var(--r-md);
  transition: outline-color 160ms, transform 160ms, opacity 160ms;
}
.widget.editable:hover { outline-color: var(--violet); }
.widget.editable:active { cursor: grabbing; }
.widget.editable.dragging {
  opacity: 0.35;
  outline: 2px solid var(--violet);
}
.widget.editable.drag-over { transform: scale(1.02); outline-color: var(--violet); }
.widget.editable.drag-over::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: var(--r-md);
  background: rgba(139, 92, 246, 0.15);
  pointer-events: none;
  z-index: 0;
}

/* Disable inner interactivity in edit mode (only edit bar is clickable) */
.widget.editable > *:not(.widget__edit-bar) { pointer-events: none; }

/* Edit bar overlay */
.widget__edit-bar {
  position: absolute;
  top: 8px; left: 8px; right: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px 5px 8px;
  background: rgba(15, 15, 20, 0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 8px;
  z-index: 5;
  border: 1px solid rgba(255,255,255,0.08);
  pointer-events: auto;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 160ms var(--ease), transform 160ms var(--ease);
}
.widget.editable:hover .widget__edit-bar,
.widget.editable.dragging .widget__edit-bar { opacity: 1; transform: translateY(0); }

.widget__edit-handle {
  color: var(--text-3);
  cursor: grab;
  padding: 0 4px;
  font-size: 12px;
  line-height: 1;
  letter-spacing: -2px;
  user-select: none;
  font-weight: 700;
}
.widget__edit-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100px;
}
.widget__edit-sizes {
  display: flex;
  gap: 1px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  padding: 2px;
  margin-left: auto;
}
.widget__edit-sizes button {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-mono);
  padding: 3px 7px;
  border-radius: 4px;
  color: var(--text-3);
  transition: all 140ms;
  min-width: 22px;
}
.widget__edit-sizes button[data-on="true"] {
  background: var(--violet);
  color: white;
}
.widget__edit-sizes button:hover:not([data-on="true"]) {
  color: var(--text);
  background: rgba(255,255,255,0.06);
}
.widget__edit-remove {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  color: var(--text-3);
  display: grid; place-items: center;
  transition: all 140ms;
}
.widget__edit-remove:hover { background: rgba(248, 113, 113, 0.20); color: #fca5a5; }

/* Corner resize handle */
.widget__resize-handle {
  position: absolute;
  right: 0; bottom: 0;
  width: 22px; height: 22px;
  cursor: nwse-resize;
  z-index: 6;
  display: grid; place-items: end end;
  padding: 0 4px 4px 0;
  color: rgba(255,255,255,0.35);
  opacity: 0;
  transition: opacity 160ms var(--ease), color 160ms var(--ease);
  pointer-events: auto;
  touch-action: none;
}
.widget__resize-handle svg { width: 12px; height: 12px; pointer-events: none; }
.widget.editable:hover .widget__resize-handle { opacity: 1; }
.widget.editable.resizing .widget__resize-handle { opacity: 1; color: var(--violet); }
.widget.editable.resizing {
  outline: 2px solid var(--violet);
  outline-offset: -3px;
  box-shadow: 0 0 0 4px rgba(139,92,246,0.18);
}

/* Live size badge during resize */
.widget__size-badge {
  position: absolute;
  bottom: 8px; right: 28px;
  background: var(--violet);
  color: white;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 6px;
  pointer-events: none;
  z-index: 7;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(139,92,246,0.4);
  animation: badgePop 160ms var(--spring) both;
}
@keyframes badgePop {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}

/* Disable text selection while resizing anywhere on page */
body.is-resizing {
  cursor: nwse-resize !important;
  user-select: none;
}
body.is-resizing * { cursor: nwse-resize !important; }

/* Drop target placeholder when dropping at end of grid */
.widget--drop-end {
  grid-column: span 12;
  height: 80px;
  border-radius: var(--r-md);
  border: 1.5px dashed rgba(139, 92, 246, 0.5);
  display: grid;
  place-items: center;
  color: var(--violet-2);
  font-size: 12px;
  font-weight: 500;
  background: rgba(139, 92, 246, 0.04);
}

/* Floating side drawer */
.edit-drawer {
  position: fixed;
  right: 28px;
  top: 28px;
  bottom: 28px;
  width: 308px;
  background: var(--card);
  border-radius: var(--r-lg);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  z-index: 60;
  animation: drawerIn 320ms var(--ease) both;
  overflow: hidden;
}
@keyframes drawerIn {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
.edit-drawer__head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.edit-drawer__head-main { flex: 1; min-width: 0; }
.edit-drawer__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  margin: 0;
}
.edit-drawer__sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
.edit-drawer__close {
  width: 28px; height: 28px;
  border-radius: 7px;
  color: var(--text-3);
  display: grid; place-items: center;
  transition: all 140ms;
}
.edit-drawer__close:hover { background: var(--inner-2); color: var(--text); }

.edit-drawer__body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 14px 16px;
}
.edit-drawer__group {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text-3);
  text-transform: uppercase;
  padding: 14px 6px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.edit-drawer__group::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}

.edit-drawer__row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--inner);
  border-radius: 10px;
  cursor: pointer;
  transition: all 140ms;
  margin-bottom: 6px;
}
.edit-drawer__row:hover { background: var(--inner-2); }
.edit-drawer__icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(139, 92, 246, 0.14);
  color: var(--violet-2);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.edit-drawer__main { flex: 1; min-width: 0; }
.edit-drawer__name { font-size: 13px; font-weight: 500; }
.edit-drawer__desc { font-size: 11px; color: var(--text-3); margin-top: 2px; line-height: 1.35; }
.edit-drawer__btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--violet);
  color: white;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: transform 140ms var(--spring);
}
.edit-drawer__row:hover .edit-drawer__btn { transform: rotate(90deg); }
.edit-drawer__empty {
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
  padding: 24px 12px;
  font-style: italic;
}

.edit-drawer__foot {
  padding: 14px 18px;
  background: var(--inner);
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.edit-drawer__count {
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  font-family: var(--font-mono);
}
.edit-drawer__reset {
  font-size: 12px;
  color: var(--text-3);
  padding: 8px;
  border-radius: 7px;
  text-align: center;
  transition: all 140ms;
}
.edit-drawer__reset:hover { background: var(--inner-2); color: var(--text); }

/* Sin panel derecho (secciones fuera del dashboard) */
.shell--no-right { grid-template-columns: 200px 1fr; }
:root[data-sidebar="collapsed"] .shell--no-right { grid-template-columns: 64px 1fr; }

/* Edit mode: hide right column */
.shell--editing { grid-template-columns: 200px 1fr 0; }
.shell--editing .right { display: none; }
:root[data-sidebar="collapsed"] .shell--editing { grid-template-columns: 64px 1fr 0; }
@media (max-width: 1180px) {
  :root[data-sidebar="collapsed"] .shell--editing { grid-template-columns: 64px 1fr 0; }
}

/* Pulse hint on Editar button */
.btn-edit-pulse {
  position: relative;
  background: rgba(139, 92, 246, 0.14);
  color: var(--violet-2);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 9px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 160ms var(--ease);
}
.btn-edit-pulse:hover { background: var(--violet); color: white; }

@media (max-width: 1180px) {
  .edit-drawer { right: 14px; top: 14px; bottom: 14px; width: 280px; }
}
@media (max-width: 960px) {
  .edit-drawer {
    right: 0; top: auto; left: 0;
    bottom: 0;
    width: auto;
    max-height: 50vh;
    border-radius: var(--r-lg) var(--r-lg) 0 0;
  }
  .shell--editing { grid-template-columns: 1fr; }
}


/* Priority badges */
.priority-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.priority-dot--high   { background:#f87171; }
.priority-dot--medium { background:#fbbf24; }
.priority-dot--low    { background:#34d399; }
.priority-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:0.06em; }
.priority-badge--high   { background:rgba(248,113,113,0.15); color:#f87171; }
.priority-badge--medium { background:rgba(251,191,36,0.15);  color:#fbbf24; }
.priority-badge--low    { background:rgba(52,211,153,0.15);  color:#34d399; }

/* Draggable widget grid */
.widget-grid--editable .widget { cursor:grab; user-select:none; }
.widget-grid--editable .widget:active { cursor:grabbing; }
.widget-drag-over { outline:2px dashed var(--violet); outline-offset:3px; }
.widget-resize-handle { position:absolute; bottom:4px; right:4px; width:16px; height:16px; cursor:se-resize; opacity:0; transition:opacity 160ms; display:grid; place-items:center; }
.widget:hover .widget-resize-handle, .widget-grid--editable .widget-resize-handle { opacity:1; }

/* Floatable widget drawer */
.widget-drawer { position:fixed; top:120px; right:24px; width:260px; background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.5); z-index:200; }
.widget-drawer__header { padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; cursor:grab; }
.widget-drawer__header:active { cursor:grabbing; }

/* Kitchen storage sections */
.storage-section { margin-bottom:20px; }
.storage-section__title { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--line); }

/* Profile photo */
.profile__avatar--photo { overflow:hidden; padding:0; }
.profile__avatar--photo img { width:100%; height:100%; object-fit:cover; }

/* Calendar overflow fix */
.cal-grid { overflow:hidden; }
.panel { overflow:hidden; }

/* Tareas grid layout for editing */
.tareas-grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
.tarea-card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; cursor:pointer; transition:all 160ms; }
.tarea-card:hover { border-color:var(--violet); }
.tarea-card--done { opacity:0.55; }
.tarea-card__title { font-size:13px; font-weight:600; margin-bottom:4px; }
.tarea-card__desc  { font-size:11px; color:var(--text-3); line-height:1.5; margin-bottom:8px; }

/* Subject dashboard */
.subj-header { display:flex; align-items:center; gap:16px; padding:20px 0 24px; }
.subj-header__badge { width:56px; height:56px; border-radius:14px; display:grid; place-items:center; font-size:11px; font-weight:800; letter-spacing:0.06em; color:white; flex-shrink:0; }
.subj-header__name { font-size:22px; font-weight:700; line-height:1.2; }
.subj-header__meta { font-size:13px; color:var(--text-3); margin-top:4px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
.subj-header__link { color:var(--violet-2); text-decoration:none; font-size:12px; }
.subj-header__link:hover { text-decoration:underline; }
.subj-prog { display:flex; align-items:center; gap:12px; }
.subj-prog__bar { flex:1; height:8px; background:var(--inner-2); border-radius:999px; overflow:hidden; }
.subj-prog__fill { height:100%; border-radius:999px; background: linear-gradient(90deg, var(--violet), #ec4899); transition:width 400ms var(--ease); }
/* Subject color dynamic vars */
.t-avatar--v5 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color:#1a1a1a; }
.t-avatar--v6 { background: linear-gradient(135deg, #f87171, #ef4444); }
.t-avatar--v7 { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
.t-avatar--v8 { background: linear-gradient(135deg, #fb923c, #f97316); }
/* Draggable items in cocina */
.kitchen-item { cursor:grab; }
.kitchen-item:active { cursor:grabbing; opacity:0.7; }
.kitchen-item.drag-over { outline:2px dashed var(--violet); border-radius:10px; }
/* Search highlight */
.search-hit { background:rgba(139,92,246,0.25); border-radius:3px; padding:0 2px; }
/* Mission priority groups */
.mission-group { margin-bottom:24px; }
.mission-group__title { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px; padding:6px 12px; border-radius:8px; display:flex; align-items:center; gap:8px; }
.mission-group__title--high   { background:rgba(248,113,113,0.12); color:#f87171; }
.mission-group__title--medium { background:rgba(251,191,36,0.12);  color:#fbbf24; }
.mission-group__title--low    { background:rgba(52,211,153,0.12);  color:#34d399; }
/* Subj widget grid same as main */
.subj-widget-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:14px; margin-top:16px; }

/* ============================================================
   Command Palette (Ctrl+K)
   ============================================================ */
.cmd-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 800;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 14vh;
  animation: backdropIn 140ms var(--ease) both;
}
.cmd-box {
  width: min(580px, calc(100vw - 32px));
  background: var(--card);
  border: 1px solid var(--line-2);
  border-radius: var(--r-lg);
  box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.05) inset;
  overflow: hidden;
  animation: cmdIn 160ms var(--spring) both;
  display: flex;
  flex-direction: column;
  max-height: 60vh;
}
@keyframes cmdIn {
  from { opacity: 0; transform: translateY(-10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.cmd-search {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.cmd-search__icon { color: var(--violet-2); flex-shrink: 0; display: flex; }
.cmd-search input {
  flex: 1; min-width: 0;
  background: transparent;
  border: 0; outline: 0;
  font-size: 16px;
  font-family: var(--font-sans);
  color: var(--text);
  line-height: 1.4;
}
.cmd-search input::placeholder { color: var(--text-3); }
.cmd-search__kb {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-3);
  background: var(--inner-2);
  border: 1px solid var(--line-2);
  border-radius: 5px;
  padding: 3px 7px;
  flex-shrink: 0;
}
.cmd-results {
  overflow-y: auto;
  padding: 8px 0;
  flex: 1;
}
.cmd-group-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-4);
  padding: 8px 20px 4px;
}
.cmd-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 100ms;
  border-radius: 0;
  margin: 0 8px;
  border-radius: 8px;
}
.cmd-item:hover, .cmd-item--active {
  background: rgba(139, 92, 246, 0.12);
}
.cmd-item--active .cmd-item__icon { color: var(--violet-2); }
.cmd-item__icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--inner-2);
  display: grid; place-items: center;
  color: var(--text-3);
  flex-shrink: 0;
  font-size: 15px;
  transition: color 100ms;
}
.cmd-item__main { flex: 1; min-width: 0; }
.cmd-item__title { font-size: 13px; font-weight: 500; color: var(--text); }
.cmd-item__hint  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.cmd-item__kb {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-4);
  background: var(--inner);
  border-radius: 4px;
  padding: 2px 6px;
  flex-shrink: 0;
}
.cmd-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--text-4);
  font-family: var(--font-mono);
}
.cmd-footer span { display: flex; align-items: center; gap: 4px; }
.cmd-footer kbd {
  background: var(--inner-2);
  border: 1px solid var(--line-2);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: var(--font-mono);
  font-size: 10px;
}
.cmd-empty {
  padding: 32px 20px;
  text-align: center;
  font-size: 13px;
  color: var(--text-3);
}

/* Highlight hint on search bar */
.search-cmd-hint {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-4);
  background: var(--inner);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
  transition: color 120ms, border-color 120ms;
}
.search-cmd-hint:hover { color: var(--violet-2); border-color: var(--violet); }

/* ============================================================
   TOPBAR SUMMARY STRIP
   ============================================================ */
.topbar-summary {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 0 4px;
  height: 50px;
  overflow: hidden;
  flex-shrink: 0;
}
.tbs-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  height: 100%;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  border-right: 1px solid var(--line);
  white-space: nowrap;
  cursor: pointer;
  transition: background 120ms;
}
.tbs-item:last-child { border-right: 0; }
.tbs-item:hover { background: var(--inner-2); border-radius: 8px; }
.tbs-item__num {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.tbs-item__num--warn { color: #f87171; }
.tbs-item__num--ok   { color: #4ade80; }
.tbs-item__label { font-size: 11px; color: var(--text-3); }

/* Modo Parciales toggle */
.parciales-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  height: 100%;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 120ms;
  color: var(--text-3);
  white-space: nowrap;
}
.parciales-toggle:hover { background: var(--inner-2); }
.parciales-toggle[data-on="true"] {
  color: #f87171;
  background: rgba(248,113,113,0.12);
}
.parciales-toggle__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-4);
  transition: background 120ms;
  flex-shrink: 0;
}
.parciales-toggle[data-on="true"] .parciales-toggle__dot { background: #f87171; }

/* Energy pill in topbar */
.energy-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: 100%;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  border-right: 1px solid var(--line);
  cursor: pointer;
  transition: background 120ms;
  white-space: nowrap;
}
.energy-pill:hover { background: var(--inner-2); border-radius: 8px; }
.energy-pill__bar {
  width: 32px; height: 4px;
  background: var(--inner-2);
  border-radius: 999px;
  overflow: hidden;
}
.energy-pill__fill {
  height: 100%;
  border-radius: 999px;
  transition: width 300ms;
}

/* ============================================================
   MODO PARCIALES — overlay mode
   ============================================================ */
.parciales-banner {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: var(--r-md);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: #fca5a5;
}
.parciales-banner__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #f87171;
  flex-shrink: 0;
  animation: pulse 1.8s infinite;
}

/* ============================================================
   ENERGY TRACKER WIDGET
   ============================================================ */
.energy-widget {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 20px 22px;
}
.energy-widget__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.energy-widget__title {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
.energy-widget__date {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-mono);
}
.energy-checkin {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.ecin-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.ecin-row__label {
  font-size: 12px;
  color: var(--text-3);
  width: 60px;
  flex-shrink: 0;
}
.ecin-stars {
  display: flex;
  gap: 4px;
}
.ecin-star {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--inner-2);
  border: 1.5px solid var(--line-2);
  display: grid; place-items: center;
  font-size: 13px;
  cursor: pointer;
  transition: all 120ms;
  color: var(--text-3);
}
.ecin-star:hover { border-color: var(--violet); }
.ecin-star[data-on="true"] {
  background: rgba(139,92,246,0.18);
  border-color: var(--violet);
  color: var(--violet-2);
}
.ecin-sleep {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}
.ecin-sleep input {
  width: 56px;
  background: var(--inner-2);
  border: 1.5px solid var(--line-2);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 13px;
  color: var(--text);
  outline: 0;
  text-align: center;
  transition: border-color 120ms;
}
.ecin-sleep input:focus { border-color: var(--violet); }
.ecin-sleep__unit { font-size: 11px; color: var(--text-3); }
.ecin-moods {
  display: flex;
  gap: 6px;
  flex: 1;
}
.ecin-mood {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--inner-2);
  border: 1.5px solid var(--line-2);
  display: grid; place-items: center;
  font-size: 16px;
  cursor: pointer;
  transition: all 120ms;
}
.ecin-mood:hover { transform: scale(1.1); }
.ecin-mood[data-on="true"] {
  background: rgba(139,92,246,0.18);
  border-color: var(--violet);
  transform: scale(1.1);
}
.energy-history {
  margin-top: 14px;
  display: flex;
  gap: 4px;
  align-items: flex-end;
}
.energy-history__bar {
  flex: 1;
  background: var(--inner-2);
  border-radius: 3px;
  min-height: 4px;
  transition: height 300ms;
  cursor: default;
}
.energy-history__bar[data-today="true"] { background: var(--violet); }
.energy-alert {
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.25);
  border-radius: 8px;
  font-size: 11px;
  color: #fbbf24;
  line-height: 1.4;
}

/* ============================================================
   ANTI-PROCRASTINACIÓN — home section
   ============================================================ */
.procra-section {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
}
.procra-section__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.procra-section__title {
  font-size: 13px;
  font-weight: 600;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 7px;
}
.procra-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
}
.procra-item:last-child { border-bottom: 0; }
.procra-item__days {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: #f87171;
  background: rgba(248,113,113,0.1);
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.procra-item__days--medium { color: #fbbf24; background: rgba(251,191,36,0.1); }
.procra-item__name { flex: 1; min-width: 0; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.procra-empty {
  font-size: 12px;
  color: var(--text-3);
  text-align: center;
  padding: 8px 0;
}

/* ============================================================
   ESTADO DE LA CASA — widget + sección
   ============================================================ */
.casa-widget {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 20px;
}
.casa-widget__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.casa-widget__title {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
.casa-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.casa-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  background: var(--inner-2);
  border-radius: 9px;
  cursor: pointer;
  transition: background 120ms;
  border: 1.5px solid transparent;
}
.casa-item:hover { background: var(--card-2); }
.casa-item[data-done="true"] {
  border-color: rgba(74,222,128,0.3);
  background: rgba(74,222,128,0.07);
}
.casa-item__check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--line-2);
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: all 120ms;
  font-size: 11px;
}
.casa-item[data-done="true"] .casa-item__check {
  background: #4ade80;
  border-color: #4ade80;
  color: #1a1a1a;
}
.casa-item__emoji { font-size: 15px; flex-shrink: 0; }
.casa-item__label { font-size: 12px; font-weight: 500; flex: 1; }
.casa-item__days {
  font-size: 10px;
  color: var(--text-4);
  font-family: var(--font-mono);
}
.casa-item__days--warn { color: #f87171; }
.casa-progress {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--text-3);
}
.casa-progress__bar {
  flex: 1;
  height: 4px;
  background: var(--inner-2);
  border-radius: 999px;
  overflow: hidden;
}
.casa-progress__fill {
  height: 100%;
  background: #4ade80;
  border-radius: 999px;
  transition: width 300ms;
}

/* ============================================================
   FINANZAS — sección completa
   ============================================================ */
.fin-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}
.fin-stat {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.fin-stat__label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.fin-stat__value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.fin-stat__value--ok   { color: #4ade80; }
.fin-stat__value--warn { color: #fbbf24; }
.fin-stat__value--bad  { color: #f87171; }
.fin-stat__sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.fin-bar-wrap {
  margin-top: 8px;
  height: 6px;
  background: var(--inner-2);
  border-radius: 999px;
  overflow: hidden;
}

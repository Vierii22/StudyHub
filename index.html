.fin-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 400ms;
}

.fin-cats {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-bottom: 14px;
}
.fin-cats__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.fin-cats__title { font-size: 14px; font-weight: 600; margin: 0; }
.fin-cat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.fin-cat-row:last-child { border-bottom: 0; }
.fin-cat-row__emoji { font-size: 16px; width: 24px; text-align: center; }
.fin-cat-row__name { flex: 1; font-weight: 500; }
.fin-cat-row__bar { width: 80px; height: 4px; background: var(--inner-2); border-radius: 999px; overflow: hidden; }
.fin-cat-row__fill { height: 100%; border-radius: 999px; }
.fin-cat-row__amount { font-family: var(--font-mono); font-size: 12px; color: var(--text-2); min-width: 64px; text-align: right; }

.fin-gastos {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
}
.fin-gastos__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.fin-gastos__title { font-size: 14px; font-weight: 600; margin: 0; }
.fin-gasto-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.fin-gasto-row:last-child { border-bottom: 0; }
.fin-gasto-row__emoji { font-size: 15px; }
.fin-gasto-row__desc { flex: 1; font-size: 13px; }
.fin-gasto-row__cat { font-size: 10px; color: var(--text-3); background: var(--inner-2); padding: 2px 7px; border-radius: 4px; }
.fin-gasto-row__amount { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #f87171; min-width: 70px; text-align: right; }
.fin-gasto-row__del { color: var(--text-4); opacity: 0; transition: opacity 120ms; width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; }
.fin-gasto-row:hover .fin-gasto-row__del { opacity: 1; }
.fin-gasto-row__del:hover { background: rgba(248,113,113,0.12); color: #f87171; }

.fin-add-form {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.fin-add-form input, .fin-add-form select {
  background: var(--inner-2);
  border: 1.5px solid var(--line-2);
  border-radius: 9px;
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  outline: 0;
  transition: border-color 120ms;
  font-family: var(--font-sans);
}
.fin-add-form input:focus, .fin-add-form select:focus { border-color: var(--violet); }
.fin-add-form__desc { flex: 1; min-width: 140px; }
.fin-add-form__amount { width: 90px; }
.fin-add-form__cat { min-width: 120px; }

.fin-metas {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-top: 14px;
}
.fin-metas__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.fin-metas__title { font-size: 14px; font-weight: 600; margin: 0; }
.fin-meta-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.fin-meta-card {
  background: var(--inner-2);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.fin-meta-card__emoji { font-size: 22px; }
.fin-meta-card__name { font-size: 13px; font-weight: 600; }
.fin-meta-card__amounts { font-size: 11px; color: var(--text-3); }
.fin-meta-card__amounts b { color: var(--text-2); font-weight: 600; }
.fin-meta-card__bar { height: 5px; background: var(--card-3); border-radius: 999px; overflow: hidden; }
.fin-meta-card__fill { height: 100%; background: var(--grad-1); border-radius: 999px; transition: width 400ms; }
.fin-meta-card__pct { font-size: 10px; color: var(--violet-2); font-family: var(--font-mono); font-weight: 700; }

/* ============================================================
   COMIDAS — recetas
   ============================================================ */
.recipe-card {
  background: var(--inner-2);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  cursor: pointer;
  transition: background 120ms, border-color 120ms;
  border: 1.5px solid transparent;
}
.recipe-card:hover { background: var(--card-2); border-color: var(--line-2); }
.recipe-card__head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.recipe-card__emoji { font-size: 22px; }
.recipe-card__name { font-size: 13px; font-weight: 600; flex: 1; }
.recipe-card__time { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.recipe-card__tags { display: flex; gap: 5px; flex-wrap: wrap; }
.recipe-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(139,92,246,0.12);
  color: var(--violet-2);
}
.recipe-tag--green { background: rgba(74,222,128,0.1); color: #4ade80; }
.recipe-tag--yellow { background: rgba(251,191,36,0.1); color: #fbbf24; }
.recipe-suggestion {
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: var(--r-md);
  padding: 14px 18px;
  margin-bottom: 14px;
}
.recipe-suggestion__head { font-size: 12px; font-weight: 600; color: var(--violet-2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.recipe-suggestion__items { display: flex; flex-wrap: wrap; gap: 6px; }
.recipe-suggestion__pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--inner);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 120ms;
}
.recipe-suggestion__pill:hover { background: var(--inner-2); }


/* ============================================================
   POMODORO WIDGET
   ============================================================ */
.pomo-widget {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.pomo-ring {
  position: relative;
  width: 200px; height: 200px;
  flex-shrink: 0;
}
.pomo-ring svg { transform: rotate(-90deg); }
.pomo-ring__track { fill: none; stroke: var(--inner-2); }
.pomo-ring__fill  { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.pomo-time {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font-display);
}
.pomo-time__min { font-size: 46px; font-weight: 700; line-height: 1; }
.pomo-time__label { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.pomo-controls { display: flex; gap: 8px; }
.pomo-btn {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 120ms;
  border: 1.5px solid var(--line-2);
  background: var(--inner-2);
  color: var(--text-2);
}
.pomo-btn:hover { background: var(--card-2); }
.pomo-btn--primary { background: var(--violet); border-color: var(--violet); color: #fff; }
.pomo-btn--primary:hover { background: var(--violet-deep); }
.pomo-sessions {
  display: flex; gap: 5px;
}
.pomo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--inner-2);
  transition: background 200ms;
}
.pomo-dot[data-done="true"] { background: var(--violet); }
.pomo-modes { display: flex; gap: 4px; }
.pomo-mode-btn {
  padding: 4px 10px;
  border-radius: 7px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text-3);
  transition: all 100ms;
}
.pomo-mode-btn[data-on="true"] { background: var(--inner-2); color: var(--text); border-color: var(--violet); }

/* ============================================================
   TRACKER DE OCIO
   ============================================================ */
.ocio-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.ocio-filter-btn {
  padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--line);
  background: transparent; color: var(--text-3);
  transition: all 100ms;
}
.ocio-filter-btn[data-on="true"] { background: rgba(139,92,246,0.12); border-color: var(--violet); color: var(--violet-2); }
.ocio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.ocio-card {
  background: var(--inner);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  cursor: pointer;
  transition: background 120ms, border-color 120ms;
  border: 1.5px solid transparent;
  display: flex; flex-direction: column; gap: 8px;
}
.ocio-card:hover { background: var(--inner-2); border-color: var(--line-2); }
.ocio-card__head { display: flex; align-items: flex-start; gap: 8px; }
.ocio-card__emoji { font-size: 24px; flex-shrink: 0; }
.ocio-card__title { font-size: 13px; font-weight: 600; line-height: 1.3; flex: 1; }
.ocio-card__type { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
.ocio-status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px;
  align-self: flex-start;
}
.ocio-status-badge--pendiente   { background: rgba(99,102,241,0.12);  color: #818cf8; }
.ocio-status-badge--en_progreso { background: rgba(251,191,36,0.12);  color: #fbbf24; }
.ocio-status-badge--terminado   { background: rgba(74,222,128,0.12);  color: #4ade80; }
.ocio-status-badge--abandonado  { background: rgba(156,163,175,0.12); color: #9ca3af; }
.ocio-score { font-size: 12px; color: var(--text-3); }
.ocio-score span { color: #fbbf24; }
.ocio-stats {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
}
.ocio-stat {
  background: var(--inner); border-radius: var(--r-sm);
  padding: 10px 16px; display: flex; flex-direction: column; gap: 2px;
  flex: 1; min-width: 100px;
}
.ocio-stat__n { font-size: 22px; font-weight: 700; font-family: var(--font-display); }
.ocio-stat__l { font-size: 11px; color: var(--text-3); }

/* ============================================================
   MENTAL LOAD BANNER
   ============================================================ */
.mental-load-banner {
  border-radius: var(--r-md);
  padding: 12px 18px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; margin-bottom: 12px;
  border: 1px solid;
  animation: fadeUp 200ms var(--ease) both;
}
.mental-load-banner--warning {
  background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.3); color: #fbbf24;
}
.mental-load-banner--critical {
  background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: #f87171;
}

/* ============================================================
   ICS IMPORT/EXPORT
   ============================================================ */
.ics-panel {
  background: var(--inner);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-top: 14px;
}
.ics-panel__title { font-size: 14px; font-weight: 600; margin: 0 0 12px; }
.ics-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.ics-imported-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25);
  color: #4ade80; font-size: 11px; padding: 3px 9px; border-radius: 5px; font-weight: 600;
}

/* ============================================================
   PRIORITY ENHANCED (C3)
   ============================================================ */
.priority-matrix {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.pmatrix-cell {
  border-radius: var(--r-sm);
  padding: 12px 14px;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: border-color 100ms, background 100ms;
}
.pmatrix-cell:hover { background: var(--inner-2); }
.pmatrix-cell[data-on="true"] { border-color: var(--violet); background: rgba(139,92,246,0.08); }
.pmatrix-cell__label { font-size: 12px; font-weight: 700; }
.pmatrix-cell__hint  { font-size: 11px; color: var(--text-3); margin-top: 2px; line-height: 1.3; }

/* ============================================================
   GLOBAL POLISH — v3.1
   ============================================================ */

/* Widget hover lift */
.widget {
  transition: box-shadow 200ms ease, transform 200ms ease;
}
.widget:not(.editable):hover {
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(139,92,246,0.08);
}

/* Scrollbar global */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.25); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.45); }

/* Focus ring accesible */
:focus-visible {
  outline: 2px solid rgba(139,92,246,0.6);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Rail item hover más suave */
.r-item { transition: background 150ms, color 150ms, padding-left 150ms; }
.r-item:not(.r-item--active):hover { background: rgba(139,92,246,0.07); color: var(--text-2); }

/* Profile avatar glow */
.profile__avatar {
  transition: box-shadow 200ms, transform 200ms;
}
.profile__avatar:hover {
  box-shadow: 0 0 0 3px rgba(139,92,246,0.35);
  transform: scale(1.04);
}

/* Btn-primary box shadow siempre visible */
.btn-primary {
  box-shadow: 0 2px 8px rgba(139,92,246,0.2);
}

/* Route head title bold y más grande */
.route-head__title { letter-spacing: -0.3px; }

/* Mental load banner — border-radius más grande */
.mental-load-banner { border-radius: 12px; }

/* Widget header caps */
.widget__title { letter-spacing: 0.03em; }

/* Quick-toggle btn */
.quick-toggle__btn { transition: background 150ms, color 150ms; }
.quick-toggle__btn:hover { background: rgba(139,92,246,0.1); color: var(--violet-2); }

/* Input global focus glow */
input:focus, textarea:focus, select:focus {
  box-shadow: 0 0 0 2px rgba(139,92,246,0.15);
}

/* Subject cards hover */
.subject { transition: background 150ms, border-color 150ms, transform 150ms; }
.subject:hover { transform: translateY(-2px); }

/* Ocio card hover */
.ocio-card { transition: background 150ms, border-color 150ms, transform 150ms; }
.ocio-card:hover { transform: translateY(-2px); }

/* Casa item smooth */
.casa-item { transition: background 150ms, opacity 150ms; }

/* P-row hover */
.p-row { cursor: pointer; transition: background 120ms; border-radius: 10px; }
.p-row:hover { background: var(--inner); }

/* Dropdown polish */
.dropdown { border-color: rgba(139,92,246,0.15); }

/* Toast polish */
.toast { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

/* Dashboard banner gloss */
.banner { position: relative; overflow: hidden; }
.banner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

/* Mobile nav active indicator */
.mobile-nav__item--active::before {
  content: '';
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  border-radius: 2px;
  background: var(--violet);
}
.mobile-nav__item { position: relative; }

/* Smooth page transitions */
.page-enter {
  animation: pageSlideIn 200ms cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes pageSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

</style>

// ─── STORAGE (WEB) ──────────────────────────────────────────────
// AppStorage delegates to SupabaseStorage once the module script sets it.
// Falls back to localStorage while the module is loading.
(function() {
  const _fallback = {
    isElectron: false,
    isReady: () => true,
    onReady: (cb) => cb(),
    getItem:    (key)        => { try { return localStorage.getItem(key); }      catch(e){ return null; } },
    setItem:    (key, value) => { try { localStorage.setItem(key, value); }      catch(e){} },
    removeItem: (key)        => { try { localStorage.removeItem(key); }          catch(e){} },
    clear:      ()           => { try { localStorage.clear(); }                  catch(e){} },
  };
  Object.defineProperty(window, 'AppStorage', {
    get() { return window.SupabaseStorage || _fallback; },
    configurable: true,
  });
})();
</script>

function CommandPalette({ onClose, cmdCtx }) {
  const [query, setQuery] = React.useState('');
  const [activeIdx, setActiveIdx] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => { inputRef.current?.focus(); }, []);

  // Filter
  const filtered = query.trim()
    ? CMD_ITEMS.filter(i =>
        i.title.toLowerCase().includes(query.toLowerCase()) ||
        i.hint.toLowerCase().includes(query.toLowerCase()) ||
        i.group.toLowerCase().includes(query.toLowerCase())
      )
    : CMD_ITEMS;

  // Reset active when filter changes
  React.useEffect(() => { setActiveIdx(0); }, [query]);

  // Group items
  const groups = filtered.reduce((acc, item) => {
    if (!acc[item.group]) acc[item.group] = [];
    acc[item.group].push(item);
    return acc;
  }, {});

  // Flat list for keyboard nav
  const flatItems = filtered;

  const run = (item) => {
    item.action(cmdCtx);
    onClose();
  };

  const handleKey = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActiveIdx(i => Math.min(i + 1, flatItems.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActiveIdx(i => Math.max(i - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (flatItems[activeIdx]) run(flatItems[activeIdx]);
    } else if (e.key === 'Escape') {
      onClose();
    }
  };

  let flatIdx = 0;

  return (
    <div className="cmd-backdrop" onClick={onClose}>
      <div className="cmd-box" onClick={e => e.stopPropagation()} onKeyDown={handleKey}>
        <div className="cmd-search">
          <span className="cmd-search__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </span>
          <input
            ref={inputRef}
            placeholder="Buscar acción o sección…"
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          <span className="cmd-search__kb">ESC</span>
        </div>

        <div className="cmd-results">
          {filtered.length === 0 ? (
            <div className="cmd-empty">Sin resultados para "{query}"</div>
          ) : (
            Object.entries(groups).map(([group, items]) => (
              <div key={group}>
                {!query && <div className="cmd-group-label">{group}</div>}
                {items.map(item => {
                  const myIdx = flatIdx++;
                  const isActive = myIdx === activeIdx;
                  return (
                    <div
                      key={item.id}
                      className={"cmd-item" + (isActive ? " cmd-item--active" : "")}
                      onMouseEnter={() => setActiveIdx(myIdx)}
                      onClick={() => run(item)}
                    >
                      <div className="cmd-item__icon">{item.icon}</div>
                      <div className="cmd-item__main">
                        <div className="cmd-item__title">{item.title}</div>
                        <div className="cmd-item__hint">{item.hint}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </div>

        <div className="cmd-footer">
          <span><kbd>↑↓</kbd> navegar</span>
          <span><kbd>Enter</kbd> ejecutar</span>
          <span><kbd>Esc</kbd> cerrar</span>
        </div>
      </div>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email, setEmail]       = React.useState("");
  const [password, setPassword] = React.useState("");
  const [error, setError]       = React.useState("");
  const [loading, setLoading]   = React.useState(false);
  const [mode, setMode]         = React.useState("login");
  const [showPass, setShowPass] = React.useState(false);
  const [animating, setAnimating] = React.useState(false);
  const [emailSent, setEmailSent] = React.useState(false);
  const canvasRef = React.useRef(null);
  const mouseRef  = React.useRef({ x: -9999, y: -9999 });
  const rafRef    = React.useRef(null);

  // Interactive particle background
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let W = canvas.width  = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    const COLORS = ["rgba(139,92,246,", "rgba(99,102,241,", "rgba(167,139,250,", "rgba(217,70,239,"];
    const COUNT  = Math.min(90, Math.floor((W * H) / 14000));
    const LINK   = 130;
    const particles = Array.from({ length: COUNT }, () => ({
      x:  Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
      r:  Math.random() * 2 + 1,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * 0.5 + 0.3,
    }));
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      const mx = mouseRef.current.x, my = mouseRef.current.y;
      for (let p of particles) {
        const dx = mx - p.x, dy = my - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200 && dist > 0) { p.vx += dx/dist*0.012; p.vy += dy/dist*0.012; }
        const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if (speed > 1.8) { p.vx = p.vx/speed*1.8; p.vy = p.vy/speed*1.8; }
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.color + p.alpha + ")";
        ctx.fill();
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < LINK) {
            const op = (1 - d/LINK) * 0.3;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = "rgba(139,92,246," + op + ")";
            ctx.lineWidth = 0.8; ctx.stroke();
          }
        }
      }
      rafRef.current = requestAnimationFrame(draw);
    };
    const onResize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    const onMouse  = (e) => { mouseRef.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener("resize", onResize);
    window.addEventListener("mousemove", onMouse);
    rafRef.current = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener("resize", onResize);
      window.removeEventListener("mousemove", onMouse);
    };
  }, []);

  const switchMode = () => {
    setAnimating(true);
    setTimeout(() => { setMode(m => m === "login" ? "register" : "login"); setError(""); setAnimating(false); }, 180);
  };

  const handleSubmit = async (e) => {
    e.preventDefault(); setLoading(true); setError("");
    try {
      const sb = window._supabase; let result;
      if (mode === "login") { result = await sb.auth.signInWithPassword({ email, password }); }
      else { result = await sb.auth.signUp({ email, password }); }
      if (result.error) { setError(result.error.message); }
      else if (mode === "register" && !result.data.session) { setEmailSent(true); }
      else { onLogin(result.data.session); }
    } catch(err) { setError("Error inesperado. Intentá de nuevo."); }
    setLoading(false);
  };

  const BG = (
    <React.Fragment>
      <canvas ref={canvasRef} style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 70%)",top:"50%",left:"50%",transform:"translate(-50%,-50%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(217,70,239,0.08) 0%,transparent 70%)",top:"30%",right:"20%",pointerEvents:"none",zIndex:0}}/>
    </React.Fragment>
  );

  if (emailSent) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#18181d",fontFamily:"Outfit,sans-serif",position:"relative",overflow:"hidden"}}>
      {BG}
      <div style={{position:"relative",zIndex:1,background:"rgba(38,38,45,0.88)",backdropFilter:"blur(18px)",WebkitBackdropFilter:"blur(18px)",borderRadius:24,padding:"48px 40px",width:360,textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,0.6)",border:"1px solid rgba(139,92,246,0.18)"}}>
        <div style={{fontSize:52,marginBottom:16}}>📬</div>
        <div style={{fontSize:20,fontWeight:700,color:"#f5f5f7",marginBottom:10}}>Revisá tu email</div>
        <div style={{fontSize:14,color:"#9898a6",lineHeight:1.6,marginBottom:28}}>
          Te mandamos un link de confirmación a <b style={{color:"#c4b5fd"}}>{email}</b>.<br/>
          Tocalo para activar tu cuenta y poder ingresar.
        </div>
        <div style={{fontSize:12,color:"#5a5a6e",marginBottom:24}}>¿No lo ves? Revisá la carpeta de spam.</div>
        <button onClick={() => setEmailSent(false)} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,padding:"10px 28px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          Volver al login
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#18181d",fontFamily:"Outfit, sans-serif",position:"relative",overflow:"hidden"}}>
      {BG}
      <div style={{
        position:"relative",zIndex:1,
        background:"rgba(38,38,45,0.85)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
        borderRadius:22,padding:"40px 36px",width:360,
        boxShadow:"0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(139,92,246,0.15)",
        border:"1px solid rgba(255,255,255,0.07)",
        opacity:animating?0:1,transform:animating?"translateY(8px)":"translateY(0)",
        transition:"opacity 180ms ease, transform 180ms ease"
      }}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
            <img src="/assets/icon.png" alt="StudyHub" style={{width:64,height:64,clipPath:"inset(5% round 22%)",display:"block"}}/>
            <div style={{position:"absolute",inset:-4,borderRadius:"28%",background:"linear-gradient(135deg,rgba(139,92,246,0.3),rgba(217,70,239,0.15))",zIndex:-1,filter:"blur(8px)"}}/>
          </div>
          <div style={{fontSize:22,fontWeight:700,color:"#f5f5f7",letterSpacing:"-0.3px"}}>StudyHub</div>
          <div style={{fontSize:13,color:"#7e7e8c",marginTop:4}}>{mode==="login"?"Bienvenido de vuelta":"Creá tu cuenta gratis"}</div>
        </div>
        <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:12}}>
          <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required
            style={{background:"rgba(31,31,37,0.8)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"11px 14px",color:"#f5f5f7",fontSize:14,outline:"none",fontFamily:"inherit",transition:"border-color 150ms",width:"100%",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor="rgba(139,92,246,0.5)"}

            <button type="button" onClick={()=>setShowPass(v=>!v)}

function OnboardingScreen({ onDone }) {
  const [step, setStep] = useState(0);

  const [carrera, setCarrera] = useState('');
  const [facultad, setFacultad] = useState('');

  const [foto, setFoto] = useState('');
  const [saving, setSaving] = useState(false);
  const [tgCode, setTgCode] = useState('');
  const [tgCopied, setTgCopied] = useState(false);
  const [tgLoading, setTgLoading] = useState(false);

  const handleFoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2*1024*1024) { alert('Máx 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => setFoto(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleDone = () => {
    if (!nombre.trim()) { alert('Ingresá tu nombre'); return; }
    setSaving(true);
    try {
      const cfg = JSON.parse(localStorage.getItem('studyhub-config') || '{}');
      const updated = {
        ...cfg,
        name: nombre.trim(),
        career: carrera.trim(),
        facultad: facultad.trim(),
        materias: materias.trim(),
        initial: nombre.trim()[0]?.toUpperCase() || '?',
        photo: foto,
        _onboardingDone: true,
      };
      localStorage.setItem('studyhub-config', JSON.stringify(updated));
    } catch(e) {}
    setSaving(false);
    onDone();
  };

  const generateTgCode = async () => {
    const sb = window._supabase;
    if (!sb) return;
    setTgLoading(true);
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let suffix = '';
      for (let i = 0; i < 4; i++) suffix += chars[Math.floor(Math.random() * chars.length)];
      const newCode = 'SH-' + suffix;
      await sb.from('telegram_links').delete().eq('user_id', session.user.id);

        { user_id: session.user.id, link_code: newCode, linked: false, created_at: new Date().toISOString() }

  React.useEffect(() => {
    const canvas = canvasRef2.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
    const COLORS = ['rgba(139,92,246,','rgba(99,102,241,','rgba(167,139,250,'];
    const COUNT = Math.min(70, Math.floor((W*H)/16000));
    const particles = Array.from({length:COUNT},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*1.8+0.8,color:COLORS[Math.floor(Math.random()*COLORS.length)],alpha:Math.random()*0.4+0.2}));
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      const mx=mouseRef2.current.x, my=mouseRef2.current.y;
      for(let p of particles){const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<180&&d>0){p.vx+=dx/d*0.01;p.vy+=dy/d*0.01;}const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(s>1.5){p.vx=p.vx/s*1.5;p.vy=p.vy/s*1.5;}p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+p.alpha+')';ctx.fill();}
      for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(139,92,246,'+(1-d/120)*0.25+')';ctx.lineWidth=0.7;ctx.stroke();}}
      rafRef2.current=requestAnimationFrame(draw);
    };
    const onResize=()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;};
    const onMouse=(e)=>{mouseRef2.current={x:e.clientX,y:e.clientY};};
    window.addEventListener('resize',onResize); window.addEventListener('mousemove',onMouse);
    rafRef2.current=requestAnimationFrame(draw);
    return()=>{cancelAnimationFrame(rafRef2.current);window.removeEventListener('resize',onResize);window.removeEventListener('mousemove',onMouse);};
  }, []);

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#18181d',fontFamily:'Outfit,sans-serif',padding:20,position:'relative',overflow:'hidden'}}>

function needsOnboarding() {
  try {
    const cfg = JSON.parse(localStorage.getItem('studyhub-config') || '{}');
    return !cfg._onboardingDone && !cfg.name;
  } catch(e) { return true; }
}

function AuthWrapper() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showOnboarding, setShowOnboarding] = useState(false);

  useEffect(() => {
    const sb = window._supabase;
    if (!sb) { setLoading(false); return; }
    sb.auth.getSession().then(({ data }) => {
      if (data.session && needsOnboarding()) setShowOnboarding(true);
      setSession(data.session);
      setLoading(false);
    });
    const { data: listener } = sb.auth.onAuthStateChange((event, sess) => {
      if (sess && event !== 'SIGNED_OUT') {
        if (needsOnboarding()) setShowOnboarding(true);
      }
      if (event === 'SIGNED_OUT') setShowOnboarding(false);
      setSession(sess);
      setLoading(false);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  if (loading) return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center',
      justifyContent:'center', background:'#18181d'}}>
      <div style={{color:'#7e7e8c', fontFamily:'Outfit,sans-serif', fontSize:14}}>Cargando...</div>
    </div>
  );
  if (!session) return <LoginScreen onLogin={(sess) => {
    setSession(sess);
    if (needsOnboarding()) setShowOnboarding(true);
  }} />;
  if (showOnboarding) return <OnboardingScreen onDone={() => setShowOnboarding(false)} />;
  return <App />;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return AppStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

function applyConfig(cfg) {
  const root = document.documentElement;
  root.setAttribute('data-theme', cfg.theme);
  root.setAttribute('data-motion', cfg.animations ? 'normal' : 'reduced');
  root.setAttribute('data-sidebar', cfg.sidebar);
  const preset = ACCENT_PRESETS.find(a => a.id === cfg.accent) || ACCENT_PRESETS[0];
  for (const [k, v] of Object.entries(preset.vars)) root.style.setProperty(k, v);
  const radii = {
    sharp:  { sm: '6px',  md: '10px', lg: '14px', xl: '18px' },
    medium: { sm: '10px', md: '16px', lg: '22px', xl: '28px' },
    soft:   { sm: '14px', md: '22px', lg: '28px', xl: '36px' },
  }[cfg.radius] || { sm: '10px', md: '16px', lg: '22px', xl: '28px' };
  root.style.setProperty('--r-sm', radii.sm);
  root.style.setProperty('--r-md', radii.md);
  root.style.setProperty('--r-lg', radii.lg);
  root.style.setProperty('--r-xl', radii.xl);
  const fs = { compact: '13px', comfy: '14px', spacious: '15px' }[cfg.density] || '14px';
  document.body.style.fontSize = fs;
}

const CFG_KEY = 'studyhub_v3_config';
function loadConfig() {
  try {
    const raw = AppStorage.getItem(CFG_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrate legacy widget array (strings) -> objects {id, span}
      if (Array.isArray(parsed.widgets) && parsed.widgets.length && typeof parsed.widgets[0] === 'string') {
        parsed.widgets = parsed.widgets.map(id => ({
          id,
          span: (window.WIDGET_CATALOG?.[id]?.span) || 6,
        }));
      }
      return { ...defaultConfig, ...parsed };
    }
  } catch (e) {}
  return defaultConfig;
}
function saveConfig(cfg) {
  try { AppStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch (e) {}
}

function TelegramLinkCard() {
  const [code, setCode] = useStateS('');
  const [loading, setLoading] = useStateS(false);
  const [copied, setCopied] = useStateS(false);
  const [error, setError] = useStateS('');

  const generateCode = async () => {
    setLoading(true);
    setError('');
    try {
      const sb = window._supabase;
      if (!sb) throw new Error('Supabase no disponible');
      const { data: { session } } = await sb.auth.getSession();
      if (!session) throw new Error('No estás autenticado');
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let suffix = '';
      for (let i = 0; i < 4; i++) suffix += chars[Math.floor(Math.random() * chars.length)];
      const newCode = 'SH-' + suffix;
      await sb.from('telegram_links').delete().eq('user_id', session.user.id);
      const { error: dbErr } = await sb.from('telegram_links').insert(
        { user_id: session.user.id, link_code: newCode, linked: false, created_at: new Date().toISOString() }
      );
      if (dbErr) throw dbErr;
      setCode(newCode);
    } catch (e) {
      setError(e.message || 'Error al generar el código');
    } finally {
      setLoading(false);
    }
  };

  const copyCode = async () => {
    if (!code) return;
    try {
      await navigator.clipboard.writeText(code);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      setError('No se pudo copiar al portapapeles');
    }
  };

  const [showTutorial, setShowTutorial] = useStateS(false);

  return (
    <section className="cfg-section">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <h3 className="cfg-section__title" style={{margin:0}}>🤖 Conectar Telegram</h3>
        <button onClick={() => setShowTutorial(v => !v)} style={{background:'rgba(139,92,246,0.12)',border:'1px solid rgba(139,92,246,0.25)',borderRadius:8,padding:'5px 10px',color:'var(--violet-2)',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
          {showTutorial ? 'Cerrar tutorial' : '📖 Tutorial'}
        </button>
      </div>
      {showTutorial && (
        <div style={{background:'var(--inner)',borderRadius:12,padding:16,marginBottom:16,fontSize:13,lineHeight:1.7,color:'var(--text-2)'}}>
          <b style={{color:'var(--text)',display:'block',marginBottom:8}}>Cómo conectar el bot:</b>
          <ol style={{margin:0,paddingLeft:20,display:'flex',flexDirection:'column',gap:6}}>
            <li>Tocá <b>"⚡ Generar código"</b> acá abajo</li>
            <li>Abrí Telegram y buscá el bot <b style={{color:'var(--violet-2)'}}>@StudyHubBot</b></li>
            <li>Mandá el código que generaste (ej: <b>SH-A3X7</b>)</li>
            <li>El bot te confirma que quedó vinculado</li>
            <li>¡Listo! Podés mandar tareas, notas y más desde Telegram</li>
          </ol>
        </div>
      )}
      <p style={{fontSize: 13, color: 'var(--text-3)', marginBottom: 16, lineHeight: 1.55}}>
        Vinculá tu cuenta de Telegram para guardar cosas desde el bot.
      </p>
      <div style={{
        background: 'linear-gradient(135deg, rgba(139,92,246,0.10), rgba(217,70,239,0.08))',
        border: '1px solid rgba(139,92,246,0.25)',
        borderRadius: 14,
        padding: 20,
        display: 'flex',
        flexDirection: 'column',
        gap: 14,
      }}>
        <div style={{display: 'flex', gap: 8}}>
          <input
            readOnly
            value={code}
            placeholder="SH-XXXX"
            style={{
              flex: 1,
              background: 'var(--inner)',
              border: '1px solid var(--line-2)',
              borderRadius: 8,
              padding: '9px 14px',
              fontSize: 17,
              fontFamily: 'var(--font-mono)',
              fontWeight: 600,
              color: code ? 'var(--violet-2)' : 'var(--text-4)',
              letterSpacing: '0.12em',
              outline: 'none',
            }}
          />
          <button
            className="btn-primary"
            onClick={copyCode}
            disabled={!code}
            style={{opacity: code ? 1 : 0.35, flexShrink: 0}}
          >
            {copied ? '✓ Copiado' : 'Copiar'}
          </button>
        </div>
        <button
          className="btn-primary"
          onClick={generateCode}
          disabled={loading}
          style={{width: '100%', justifyContent: 'center'}}
        >
          {loading ? 'Generando...' : '⚡ Generar código'}
        </button>
        {error && (
          <div style={{fontSize: 12, color: '#f87171', padding: '8px 12px', background: 'rgba(248,113,113,0.08)', borderRadius: 8}}>
            {error}
          </div>
        )}
        {code && (
          <div style={{
            fontSize: 12, color: 'var(--text-3)', lineHeight: 1.55,
            padding: '10px 14px', background: 'var(--inner)',
            borderRadius: 8, borderLeft: '3px solid var(--violet)',
          }}>
            Mandá el código <b style={{color: 'var(--violet-2)', fontFamily: 'var(--font-mono)'}}>{code}</b> al bot de Telegram.
            Una vez que lo reciba, tu cuenta queda vinculada automáticamente y el bot empieza a funcionar.
          </div>
        )}
      </div>
    </section>
  );
}

const { useState, useEffect, useMemo, useRef } = React;

// ─── AUDIO FEEDBACK ──────────────────────────────────────────
const _sfx = (() => {
  let ctx = null;
  const getCtx = () => { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return ctx; };
  const play = (freq, type, dur, gain, delay = 0) => {
    const c = getCtx(); if (!c) return;
    const osc = c.createOscillator();
    const env = c.createGain();
    osc.connect(env); env.connect(c.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = c.currentTime + delay;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(gain, t + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur);
  };
  return {
    tick:     () => { play(880, 'sine', 0.08, 0.18); },
    complete: () => { play(523, 'sine', 0.18, 0.22); play(659, 'sine', 0.18, 0.22, 0.1); play(784, 'sine', 0.28, 0.2, 0.2); },

function Donut({ pct = 70, size = 78, stroke = 8, color = "#fff", track = "rgba(255,255,255,0.18)", label }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct / 100);
  return (
    <div className="stat__donut" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke}/>
        <circle
          cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={offset}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: "stroke-dashoffset 1.4s cubic-bezier(0.22,1,0.36,1)" }}
        />
      </svg>
      <div className="stat__donut-text">{label}</div>
    </div>
  );
}

function BigRing({ pct = 78, size = 150 }) {
  const stroke = 14;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct / 100);
  return (
    <div className="ring-wrap" style={{ width: size, height: size, ['--ring-circ']: c, ['--ring-offset']: offset }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="var(--violet)"/>
            <stop offset="60%" stopColor="var(--magenta)"/>
            <stop offset="100%" stopColor="var(--pink)"/>
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        <circle
          className="ring-anim"
          cx={size/2} cy={size/2} r={r} fill="none"
          stroke="url(#ringGrad)" strokeWidth={stroke} strokeLinecap="round"
          strokeDashoffset={offset}
          transform={`rotate(-90 ${size/2} ${size/2})`}
        />
      </svg>
      <div className="ring-wrap__text">{pct}%</div>
    </div>
  );
}

function WeekChart({ data, highlight = 2 }) {
  const w = 440, h = 200, padL = 30, padR = 16, padT = 20, padB = 24;
  const max = Math.max(...data) * 1.15;
  const stepX = (w - padL - padR) / (data.length - 1);
  const yFor = (v) => padT + (h - padT - padB) * (1 - v / max);
  const xFor = (i) => padL + i * stepX;
  const path = data.map((v, i) => {
    const x = xFor(i), y = yFor(v);
    if (i === 0) return `M ${x},${y}`;
    const px = xFor(i - 1), py = yFor(data[i - 1]);
    const cx = (px + x) / 2;
    return `C ${cx},${py} ${cx},${y} ${x},${y}`;
  }).join(" ");
  const hx = xFor(highlight), hy = yFor(data[highlight]);
  const ticks = [Math.round(max*0.25), Math.round(max*0.5), Math.round(max*0.75), Math.round(max)];

  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="var(--violet-2)"/>
            <stop offset="100%" stopColor="var(--pink)"/>
          </linearGradient>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="rgba(167,139,250,0.25)"/>
            <stop offset="100%" stopColor="rgba(167,139,250,0)"/>
          </linearGradient>
        </defs>
        {ticks.map(t => (
          <text key={t} x={padL - 8} y={yFor(t) + 4} textAnchor="end" fontSize="10" fill="var(--text-3)" fontFamily="JetBrains Mono">{t}</text>
        ))}
        <path d={`${path} L ${xFor(data.length-1)},${h - padB} L ${xFor(0)},${h - padB} Z`} fill="url(#areaGrad)"/>
        <path d={path} fill="none" stroke="url(#lineGrad)" strokeWidth="2.5" strokeLinecap="round" className="draw-line"/>
        <circle cx={hx} cy={hy} r="10" fill="rgba(139, 92, 246, 0.20)">
          <animate attributeName="r" values="8;14;8" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx={hx} cy={hy} r="5" fill="white" stroke="var(--violet)" strokeWidth="2"/>
      </svg>
    </div>
  );
}

const POMO_LOG_KEY = 'studyhub_pomo_log';
const addPomoMinutes = (mins) => {
  try {
    const today = new Date().toISOString().slice(0,10);
    const raw = localStorage.getItem(POMO_LOG_KEY);
    const log = raw ? JSON.parse(raw) : [];
    const existing = log.find(e => e.date === today);
    if (existing) { existing.mins = (existing.mins||0) + mins; }
    else { log.push({ date: today, mins }); }
    localStorage.setItem(POMO_LOG_KEY, JSON.stringify(log.slice(-30)));
  } catch(e) {}
};
const getPomoWeekMins = () => {
  try {
    const log = JSON.parse(localStorage.getItem(POMO_LOG_KEY) || '[]');
    const today = new Date();
    let total = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      const entry = log.find(e => e.date === key);
      if (entry) total += entry.mins || 0;
    }
    return total;
  } catch(e) { return 0; }
};

const getStreak = () => {
  try {
    const log = loadDailyLog();
    if (!log.length) return 0;
    const dates = new Set(log.map(e => e.date));
    const today = new Date();
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (dates.has(key)) { streak++; } else { break; }
    }
    return streak;
  } catch(e) { return 0; }
};

// B9 — MENTAL LOAD SYSTEM
// ============================================================
function MentalLoadBanner({ tasks, energyToday }) {
  const pendingCount = tasks.filter(t => !t.done).length;
  const highPriority = tasks.filter(t => !t.done && t.priority === 'high').length;
  const lowEnergy = energyToday && energyToday.energia <= 2;
  const lowSleep = energyToday && energyToday.sueno < 6;

  const score = (pendingCount > 10 ? 2 : pendingCount > 6 ? 1 : 0)
              + (highPriority > 3 ? 2 : highPriority > 1 ? 1 : 0)
              + (lowEnergy ? 2 : 0)
              + (lowSleep ? 1 : 0);

  if (score < 2) return null;

  const isCritical = score >= 4;
  const msgs = [];
  if (pendingCount > 10) msgs.push(`${pendingCount} tareas pendientes`);
  if (highPriority > 1) msgs.push(`${highPriority} urgentes`);
  if (lowEnergy) msgs.push('energía baja hoy');
  if (lowSleep) msgs.push('poco sueño');

  return (
    <div className={"mental-load-banner mental-load-banner--" + (isCritical ? 'critical' : 'warning')}>
      <span style={{fontSize:18}}>{isCritical ? '🔴' : '⚠️'}</span>
      <div style={{flex:1}}>
        <strong>{isCritical ? 'Carga crítica' : 'Carga alta'}:</strong>{' '}
        {msgs.join(', ')}.{' '}
        {isCritical ? 'Considerá simplificar el día.' : 'Priorizá lo esencial.'}
      </div>
    </div>
  );
}

// ============================================================
// Cal-1 — .ICS IMPORT / EXPORT
// ============================================================
function parseICS(text) {
  const events = [];
  const lines = text.replace(/\r\n|\r/g, '\n').split('\n');
  let ev = null;
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT' && ev) {
      // Try to extract date from DTSTART
      const dtRaw = ev['DTSTART'] || ev['DTSTART;VALUE=DATE'] || '';
      let date = '';
      if (dtRaw) {
        const d = dtRaw.replace(/T.*/, '').replace(/-/g, '');
        if (d.length === 8) {
          date = d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
        }
      }
      if (ev['SUMMARY'] && date) {
        events.push({
          id: Date.now() + Math.random(),
          title: ev['SUMMARY'].replace(/\\,/g, ',').replace(/\\n/g, ' '),
          date,
          desc: (ev['DESCRIPTION'] || '').replace(/\\n/g, ' ').slice(0,100),
          color: 'v3',
          fromICS: true,
        });
      }
      ev = null; continue;
    }
    if (!ev) continue;
    const sep = line.indexOf(':');
    if (sep === -1) continue;
    const key = line.slice(0, sep).split(';')[0];
    const val = line.slice(sep + 1);
    ev[key] = val;
  }
  return events;
}

function exportToICS(events) {
  const pad = (n) => String(n).padStart(2,'0');
  const toICSDate = (dateStr) => dateStr.replace(/-/g,'');
  let out = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//StudyHub//v3//ES',
    'CALSCALE:GREGORIAN', 'METHOD:PUBLISH',
  ];
  for (const ev of events) {
    const d = toICSDate(ev.date);
    out.push('BEGIN:VEVENT');
    out.push('UID:' + ev.id + '@studyhub');
    out.push('DTSTART;VALUE=DATE:' + d);
    out.push('DTEND;VALUE=DATE:' + d);
    out.push('SUMMARY:' + (ev.title || '').replace(/,/g,'\\,'));
    if (ev.desc) out.push('DESCRIPTION:' + ev.desc.replace(/,/g,'\\,'));
    out.push('END:VEVENT');
  }
  out.push('END:VCALENDAR');
  return out.join('\r\n');
}

function useOutsideClick(ref, onClose) {
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [ref, onClose]);
}

          <p className="stat__label">Total XP</p>
          <p className="stat__value">{(9900 + ctx.totalXp).toLocaleString()}</p>
          <Donut pct={70 + Math.min(20, ctx.totalXp/4)} label={`+${70 + Math.min(20, Math.round(ctx.totalXp/4))}%`}/>
        </div>
      );
    case 'stat-tasks':
      return (

          <p className="stat__value">{ctx.completedCount}/{ctx.tasks.length}</p>
          <Donut pct={ctx.completedPct} label={`${ctx.completedPct}%`}/>
        </div>
      );
    case 'stat-hours': {
      const _weekMins = getPomoWeekMins();
      const _h = Math.floor(_weekMins / 60);
      const _m = _weekMins % 60;
      return (
        <div className="mini-stat">
          <span className="mini-stat__icon"><I.Clock size={16}/></span>
          <p className="mini-stat__label">Foco · esta semana</p>
          <p className="mini-stat__value"><em>{_h > 0 ? `${_h}h ${_m}m` : `${_weekMins}m`}</em></p>
          <p className="mini-stat__sub">{_weekMins === 0 ? 'Usá el Pomodoro para registrar' : `${Math.round(_weekMins/7)} min/día promedio`}</p>
        </div>
      );
    }
    case 'stat-streak': {
      const _streak = getStreak();
      const _allLogs = loadDailyLog();
      const _maxStreak = (() => {
        if (!_allLogs.length) return 0;
        const _ds = [...new Set(_allLogs.map(e=>e.date))].sort();
        let max = 0, cur = 0;
        for (let i = 0; i < _ds.length; i++) {
          if (i === 0) { cur = 1; }
          else {
            const prev = new Date(_ds[i-1]+'T12:00:00'), curr = new Date(_ds[i]+'T12:00:00');
            const diff = Math.round((curr-prev)/(1000*60*60*24));
            cur = diff === 1 ? cur+1 : 1;
          }
          max = Math.max(max, cur);
        }
        return max;
      })();
      return (
        <div className="mini-stat">
          <span className="mini-stat__icon"><I.Flame size={16}/></span>
          <p className="mini-stat__label">Racha actual</p>
          <p className="mini-stat__value"><em>{_streak}</em> {_streak === 1 ? 'día' : 'días'}</p>
          <p className="mini-stat__sub">{_maxStreak > _streak ? `récord: ${_maxStreak} días` : _streak > 0 ? '¡racha máxima!' : 'empezá hoy 🔥'}</p>

          <QuickBtn icon={I.Zap} label="Misión nueva"     onClick={() => ctx.goTo('misiones')}/>
        </div>

    case 'procra':
      return <ProcraSection tasks={ctx.tasks || []} onGoToTareas={() => ctx.goTo('tareas')} onToggleTask={ctx.toggleTask}/>;
    case 'today-agenda': {
      const _today = new Date().toISOString().slice(0,10);
      const _events = (() => { try { const r = AppStorage.getItem('studyhub_v3_calendar'); return r ? JSON.parse(r) : []; } catch(e){ return []; } })();
      const _todayEvs = _events.filter(e => e.date === _today);
      const _urgentTasks = (ctx.tasks||[]).filter(t => !t.done && t.priority === 'high').slice(0,3);
      const _dueSoon = (ctx.tasks||[]).filter(t => !t.done && t.dueDate && (() => {
        const d = Math.round((new Date(t.dueDate+'T12:00:00') - new Date(_today+'T12:00:00')) / (1000*60*60*24));
        return d >= 0 && d <= 1;
      })()).slice(0,2);
      const hasContent = _todayEvs.length > 0 || _urgentTasks.length > 0 || _dueSoon.length > 0;
      return (
        <div className="panel" style={{display:'flex', flexDirection:'column', gap:12}}>
          <div className="panel__head" style={{margin:0}}>
            <h3 className="panel__title panel__title--left">Agenda de hoy</h3>

              <span style={{fontSize:13, fontWeight:500, flex:1}}>{ev.title}</span>
              <span style={{fontSize:11, color:'var(--violet-2)', fontWeight:600}}>HOY</span>
            </div>
          ))}
          {[..._dueSoon, ..._urgentTasks].filter((t,i,a) => a.findIndex(x=>x.id===t.id)===i).map(t => {
            const _d = t.dueDate ? Math.round((new Date(t.dueDate+'T12:00:00') - new Date(_today+'T12:00:00')) / (1000*60*60*24)) : null;
            return (
              <div key={t.id} style={{display:'flex', gap:10, alignItems:'center', padding:'8px 10px', background:'rgba(248,113,113,0.06)', borderRadius:10, border:'1px solid rgba(248,113,113,0.15)'}}>
                <span style={{fontSize:14}}>🔴</span>
                <span style={{fontSize:13, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{t.name}</span>
                <span style={{fontSize:10, color:'#f87171', fontWeight:700, flexShrink:0}}>{_d === 0 ? 'HOY' : _d === 1 ? '1d' : 'urgente'}</span>
              </div>
            );
          })}
        </div>
      );
    }
    case 'casa-widget':
      return <CasaWidget onGoToCasa={() => ctx.goTo('casa')}/>;
    default:
      return null;
  }
}

              <td style={{color:'var(--text-2)'}}>{row.progress}</td>

                {row.dueDate ? (() => {
                  const _t = new Date().toISOString().slice(0,10);
                  const _d = Math.round((new Date(row.dueDate+'T12:00:00') - new Date(_t+'T12:00:00')) / (1000*60*60*24));
                  const _c = row.done ? 'var(--text-4)' : _d < 0 ? '#f87171' : _d === 0 ? '#fbbf24' : _d <= 2 ? '#fb923c' : 'var(--text-3)';

function Modal({ title, onClose, children, width = 520 }) {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{width: `min(${width}px, 100%)`}} onClick={e => e.stopPropagation()}>
        <div className="modal__head">
          <div><h2 className="modal__title">{title}</h2></div>
          <button className="modal__close" onClick={onClose}><I.X size={18}/></button>
        </div>
        <div className="modal__body" style={{padding:'20px 24px'}}>
          {children}
        </div>
      </div>
    </div>
  );
}

  );
}

function SubjectWidgetContent({ widgetId, subject, flash }) {
  const skey = 'studyhub_v3_subj_' + subject.id + '_' + widgetId;
  const [items, setItems] = useState(() => { try { const r = AppStorage.getItem(skey); return r ? JSON.parse(r) : []; } catch(e){ return []; } });
  const [draft, setDraft] = useState('');
  const save = (next) => { setItems(next); try { AppStorage.setItem(skey, JSON.stringify(next)); } catch(e){} };
  const add = () => { if (!draft.trim()) return; save([...items, {id:Date.now(), text:draft.trim(), done:false}]); setDraft(''); };
  const toggle = (id) => save(items.map(x => x.id===id ? {...x, done:!x.done} : x));
  const del = (id) => save(items.filter(x => x.id!==id));
  const meta = SUBJ_WIDGET_CATALOG[widgetId];

  if (widgetId === 'subj-resumen') {
    const done = items.filter(x=>x.done).length;
    const pct = items.length ? Math.round(done/items.length*100) : subject.pct||0;
    return (
      <div className="panel" style={{height:'100%'}}>
        <h3 className="panel__title panel__title--left" style={{marginBottom:16}}>Resumen</h3>
        <div style={{textAlign:'center', padding:'16px 0'}}>
          <div style={{fontFamily:'var(--font-display)', fontSize:44, fontWeight:700, color:'var(--violet-2)'}}>{pct}%</div>
          <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>progreso general</div>
        </div>
        <div className="subj-prog" style={{marginTop:12}}>
          <div className="subj-prog__bar"><div className="subj-prog__fill" style={{width:pct+'%'}}/></div>
          <span style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--violet-2)', minWidth:32}}>{pct}%</span>
        </div>
        <div style={{fontSize:12, color:'var(--text-3)', textAlign:'center', marginTop:12}}>{done} / {items.length || '—'} completado</div>
      </div>
    );
  }

  return (
    <div className="panel" style={{height:'100%', display:'flex', flexDirection:'column'}}>
      <h3 className="panel__title panel__title--left" style={{marginBottom:12}}>{meta?.title}</h3>
      <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6}}>
        {items.length === 0 && <div style={{fontSize:12, color:'var(--text-3)', textAlign:'center', padding:'16px 0'}}>Sin items. Agregá uno abajo.</div>}
        {items.map(it => (
          <div key={it.id} style={{display:'flex', alignItems:'flex-start', gap:10, padding:'8px 0', borderBottom:'1px solid var(--line)'}}>
            <span className="tbl__check" data-done={it.done} onClick={() => toggle(it.id)} style={{cursor:'pointer', flexShrink:0, marginTop:2}}>
              {it.done && <I.CheckSquare size={11}/>}
            </span>
            <span style={{flex:1, fontSize:13, lineHeight:1.5, textDecoration:it.done?'line-through':'none', color:it.done?'var(--text-3)':'var(--text)'}}>{it.text}</span>
            <button className="dash-mini-btn dash-mini-btn--danger" onClick={() => del(it.id)}><I.X size={12}/></button>
          </div>
        ))}
      </div>
      <div className="task-add" style={{marginTop:10, borderTop:'1px solid var(--line)', paddingTop:10}}>
        <input className="cfg-input" style={{flex:1}} placeholder={`Agregar ${meta?.title?.toLowerCase()}…`}
          value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key==='Enter' && add()}/>
        <button className="task-add__btn" onClick={add}><I.Plus size={15}/></button>
      </div>
    </div>
  );
}

function DraggableSubjDrawer({ onClose, availableWidgets, currentWidgets, addWidget, removeWidget, exitEditor }) {
  const [pos, setPos] = useState({ x: window.innerWidth - 300, y: 120 });
  const dragging = useRef(false);
  const offset = useRef({ x: 0, y: 0 });
  const onMouseDown = (e) => { dragging.current = true; offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; document.body.style.userSelect = 'none'; };
  useEffect(() => {
    const onMove = (e) => { if (!dragging.current) return; setPos({ x: Math.max(0, Math.min(window.innerWidth-280, e.clientX-offset.current.x)), y: Math.max(0, Math.min(window.innerHeight-100, e.clientY-offset.current.y)) }); };
    const onUp = () => { dragging.current = false; document.body.style.userSelect = ''; };
    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);
  return (
    <div className="edit-drawer" style={{position:'fixed', left:pos.x, top:pos.y, right:'auto', bottom:'auto', maxHeight:'80vh', display:'flex', flexDirection:'column', zIndex:300}}>
      <div className="edit-drawer__head" onMouseDown={onMouseDown} style={{cursor:'grab'}}>
        <div className="edit-drawer__head-main">
          <h3 className="edit-drawer__title">⠿ Secciones</h3>
          <p className="edit-drawer__sub">Click para agregar · arrastrar para mover</p>
        </div>
        <button className="edit-drawer__close" onClick={onClose}><I.X size={14}/></button>
      </div>
      <div className="edit-drawer__body" style={{overflowY:'auto', flex:1}}>
        {availableWidgets.length > 0 && <>
          <div className="edit-drawer__group">Disponibles</div>

<style>

/* ============================================================
   STUDYHUB · SISTEMA DE DISEÑO
   Un solo acento (violeta) · fondo profundo · cards casi invisibles
   ============================================================ */
:root{
  /* — Superficies — */
  --bg:          #0d0d12;
  --surface-1:   #141419;   /* card nivel 1 */
  --surface-2:   #1b1b22;   /* card nivel 2 / inputs */
  --surface-3:   #22222b;   /* hover / activos */
  --line:        rgba(255,255,255,.06);
  --line-2:      rgba(255,255,255,.11);

  /* — Texto — */
  --tx-1:        #f3f3f7;   /* principal */
  --tx-2:        #9a9aa6;   /* secundario */
  --tx-3:        #5d5d68;   /* terciario / meta */

  /* — Acento violeta (único) — */
  --violet:      #8b6dff;
  --violet-2:    #c264e8;
  --violet-hi:   #a48cff;
  --violet-soft: rgba(139,109,255,.13);
  --violet-line: rgba(139,109,255,.40);
  --grad:        linear-gradient(135deg, #8b6dff 0%, #c264e8 100%);

  /* — fill conmutable (gradiente vs sólido) — */
  --fill:        var(--grad);
  --fill-soft:   var(--violet-soft);

  /* — Radios — */
  --r-sm: 7px;
  --r:    10px;
  --r-lg: 13px;
  --r-xl: 18px;

  /* — Zoom global de UI (slider 1–100 lo maneja) — */
  --ui-zoom: 0.92;

  /* — Spacing — */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px;
  --s6:24px; --s7:32px; --s8:40px; --s9:48px; --s10:64px;

  /* — Card padding (compacto/minimalista) — */
  --card-pad: 18px;
  --grid-gap: 16px;

  /* — Tipografía (conmutable) — */
  --font-display:'Outfit';
  --font-body:   'Outfit';
  --font-mono:   'JetBrains Mono';

  --sidebar-w: 92px;
}

/* ===== TIPOGRAFÍA CONMUTABLE ===== */
[data-font="outfit"]      { --font-display:'Outfit';        --font-body:'Outfit';        --font-mono:'Outfit'; }
[data-font="outfit-mono"] { --font-display:'Outfit';        --font-body:'Outfit';        --font-mono:'JetBrains Mono'; }
[data-font="grotesk"]     { --font-display:'Space Grotesk'; --font-body:'Space Grotesk'; --font-mono:'JetBrains Mono'; }

/* ===== ACENTO CONMUTABLE ===== */
[data-accent="gradient"] { --fill: var(--grad); }
[data-accent="mix"]      { --fill: var(--violet); }

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  background:var(--bg);
  color:var(--tx-1);
  font-family:var(--font-body), system-ui, sans-serif;
  font-size:13.5px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}
.tnum{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
#root{ height:100%; }
::selection{ background:rgba(139,109,255,.35); }

/* glow ambiental sutil */
.ambient{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(900px 600px at 88% -8%, rgba(139,109,255,.10), transparent 60%),
    radial-gradient(700px 500px at 6% 108%, rgba(194,100,232,.06), transparent 60%);
}

/* ===== ESCALA TIPOGRÁFICA ===== */
.display{ font-family:var(--font-display); font-weight:700; font-size:clamp(36px,4.4vw,54px); line-height:.98; letter-spacing:-.03em; }
.h1{ font-family:var(--font-display); font-weight:700; font-size:24px; line-height:1.08; letter-spacing:-.02em; }
.h2{ font-family:var(--font-display); font-weight:600; font-size:18px; line-height:1.18; letter-spacing:-.01em; }
.h3{ font-family:var(--font-display); font-weight:600; font-size:15px; line-height:1.28; }
.body{ font-size:13.5px; color:var(--tx-2); }
.small{ font-size:12px; color:var(--tx-2); }
.stat{ font-family:var(--font-display); font-weight:700; font-size:clamp(30px,3.4vw,42px); line-height:.94; letter-spacing:-.03em; font-feature-settings:"tnum"; }

/* etiqueta mono — el sello "terminal" */
.mono{
  font-family:var(--font-mono), monospace;
  font-size:10.5px; font-weight:500;
  letter-spacing:.15em; text-transform:uppercase;
  color:var(--tx-3);
}
.mono-accent{ color:var(--violet-hi); }

.tx-2{ color:var(--tx-2); } .tx-3{ color:var(--tx-3); } .tx-1{ color:var(--tx-1); }
.accent-tx{ color:var(--violet-hi); }

/* ===== CARD ===== */
.card{
  position:relative;
  background:var(--surface-1);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:var(--card-pad);
  transition:border-color .2s ease, background .2s ease, transform .2s ease;
}
.card.hoverable:hover{ border-color:var(--line-2); background:#16161c; }
.card-2{ background:var(--surface-2); }
.card-flush{ padding:0; }

/* card "hero": el ÚNICO momento de relleno fuerte */
.card-hero{
  background:var(--fill);
  border:none;
  color:#fff;
  overflow:hidden;
}
[data-accent="mix"] .card-hero{ box-shadow:inset 0 0 0 1px rgba(255,255,255,.08); }
.card-hero .mono{ color:rgba(255,255,255,.7); }

/* ===== ESQUINAS TERMINAL (solo hero / modales) ===== */
.tcorners{ position:relative; }
.tc{ position:absolute; width:16px; height:16px; pointer-events:none; z-index:3; opacity:.85; }
.tc-tl{ top:12px; left:12px; border-top:1.5px solid var(--violet-line); border-left:1.5px solid var(--violet-line); }
.tc-tr{ top:12px; right:12px; border-top:1.5px solid var(--violet-line); border-right:1.5px solid var(--violet-line); }
.tc-bl{ bottom:12px; left:12px; border-bottom:1.5px solid var(--violet-line); border-left:1.5px solid var(--violet-line); }
.tc-br{ bottom:12px; right:12px; border-bottom:1.5px solid var(--violet-line); border-right:1.5px solid var(--violet-line); }
.card-hero .tc{ border-color:rgba(255,255,255,.5); }

/* ===== BOTONES ===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  font-family:var(--font-body); font-size:13px; font-weight:600;
  padding:9px 14px; border-radius:var(--r); border:1px solid transparent;
  cursor:pointer; transition:all .16s ease; white-space:nowrap; line-height:1;
}
.btn svg{ width:15px; height:15px; }
.btn-primary{ background:var(--grad); color:#fff; box-shadow:0 5px 18px -8px rgba(139,109,255,.65); }
.btn-primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
.btn-secondary{ background:transparent; color:var(--tx-1); border-color:var(--line-2); }
.btn-secondary:hover{ background:var(--surface-2); border-color:var(--tx-3); }
.btn-ghost{ background:transparent; color:var(--tx-2); padding:9px 11px; }
.btn-ghost:hover{ background:var(--surface-2); color:var(--tx-1); }
.btn-sm{ padding:7px 11px; font-size:12px; }

/* ===== INPUT ===== */
.input{
  width:100%; background:var(--surface-2); border:1px solid var(--line);
  border-radius:var(--r); padding:10px 13px; color:var(--tx-1);
  font-family:var(--font-body); font-size:13.5px; transition:border-color .16s ease, background .16s ease;
}
.input::placeholder{ color:var(--tx-3); }
.input:focus{ outline:none; border-color:var(--violet-line); background:var(--surface-3); }

/* ===== CHIP / BADGE ===== */
.chip{
  display:inline-flex; align-items:center; gap:7px;
  font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:5px 10px; border-radius:999px; border:1px solid var(--line-2);
  color:var(--tx-2); background:var(--surface-2); white-space:nowrap;
}
.chip-accent{ color:var(--violet-hi); border-color:var(--violet-line); background:var(--violet-soft); }
.chip-dot::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ===== SIDEBAR (rail expandible) ===== */
.sidebar{
  flex:0 0 auto;
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  height:100%; overflow:hidden;
  width:74px;
  background:
    linear-gradient(180deg, rgba(139,109,255,.08), transparent 240px),
    rgba(15,15,20,.78);
  transition:width .28s cubic-bezier(.4,.1,.2,1);
}
.sidebar.expanded{ width:226px; }
.sidebar-brand{
  display:flex; align-items:center; gap:12px;
  padding:15px 17px 13px; min-height:66px;
}
.sidebar-brand img{ width:40px; height:40px; flex:0 0 40px; border-radius:12px; box-shadow:0 6px 18px -8px rgba(139,109,255,.6); }
.sidebar-brand .wordmark{ opacity:0; transform:translateX(-6px); transition:opacity .18s ease, transform .22s ease; overflow:hidden; }
.sidebar.expanded .sidebar-brand .wordmark{ opacity:1; transform:none; }
.sidebar:not(.expanded) .sidebar-brand .wordmark{ display:none; }
.sidebar-nav{
  flex:1; display:flex; flex-direction:column; gap:3px;
  padding:8px 12px; overflow-y:auto; overflow-x:hidden;
  scrollbar-width:none;
}
.sidebar-nav::-webkit-scrollbar{ width:0; height:0; }
.nav-item{
  display:flex; align-items:center; gap:13px;
  height:44px; padding:0 12px; border-radius:11px; cursor:pointer;
  color:var(--tx-2); font-size:13.5px; font-weight:600;
  position:relative; transition:background .14s ease, color .14s ease; white-space:nowrap;
}
.nav-item svg{ width:21px; height:21px; flex:0 0 21px; stroke-width:1.8; }
.nav-item .nav-label{ transition:opacity .16s ease; }
.sidebar:not(.expanded) .nav-item .nav-label{ display:none; }
.nav-item:hover{ color:var(--tx-1); background:var(--surface-2); }
.nav-item.active{ color:var(--violet-hi); background:var(--violet-soft); }
.nav-item.active::before{
  content:""; position:absolute; left:-12px; top:50%; transform:translateY(-50%);
  width:3px; height:22px; border-radius:0 3px 3px 0; background:var(--fill);
}
.sidebar:not(.expanded) .nav-item{ justify-content:center; padding:0; gap:0; }
.sidebar:not(.expanded) .nav-item.active::before{ left:0; }
.sidebar-foot{ padding:8px 12px 14px; display:flex; flex-direction:column; gap:3px; }
.nav-sep{ height:1px; background:var(--line); margin:7px 6px; }
.collapse-btn{
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:9px; cursor:pointer; margin:0 0 5px auto;
  color:var(--tx-3); border:1px solid var(--line); background:transparent;
  transition:all .14s ease;
}
.collapse-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); background:var(--surface-2); }
.collapse-btn svg{ width:17px; height:17px; }
.sidebar:not(.expanded) .collapse-btn{ margin:0 auto 5px; }

/* ===== HEADER (slim) ===== */
.header{
  display:flex; align-items:center; gap:14px;
  padding:11px 22px; border-bottom:1px solid var(--line); min-height:58px;
}
.searchbar{
  flex:1; max-width:420px; display:flex; align-items:center; gap:10px;
  background:var(--surface-1); border:1px solid var(--line); border-radius:99px;
  padding:8px 14px; color:var(--tx-3);
}
.searchbar input{ flex:1; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:13px; }
.searchbar input::placeholder{ color:var(--tx-3); }
.kbd{ font-family:var(--font-mono); font-size:10px; color:var(--tx-3); border:1px solid var(--line-2); border-radius:5px; padding:2px 5px; }
.icon-btn{
  width:36px; height:36px; border-radius:var(--r); border:1px solid var(--line);
  background:var(--surface-1); color:var(--tx-2); display:grid; place-items:center;
  cursor:pointer; transition:all .15s ease; flex:0 0 auto;
}
.icon-btn:hover{ color:var(--tx-1); border-color:var(--line-2); background:var(--surface-2); }
.icon-btn svg{ width:17px; height:17px; }

/* avatar */
.avatar{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; font-weight:700; color:#fff; background:var(--grad); font-family:var(--font-display); flex:0 0 auto; }

/* ===== PROGRESS RING ===== */
.ring-track{ stroke:rgba(255,255,255,.10); }
.ring-fill{ stroke:var(--violet); }
.card-hero .ring-track{ stroke:rgba(255,255,255,.25); }
.card-hero .ring-fill{ stroke:#fff; }

/* ===== layout helpers ===== */
.app{ position:relative; z-index:1; display:flex; height:100%; }
.main{ flex:1; display:flex; flex-direction:column; min-width:0; height:100%; }
.scroll{ flex:1; overflow-y:auto; }
.scroll-zoom{ zoom:var(--ui-zoom); }
.page{ width:100%; max-width:1560px; margin:0 auto; padding:22px clamp(20px,3vw,44px) 70px; }
.page-wide{ max-width:none; }
.page-cozy{ max-width:1280px; }
.row{ display:flex; align-items:center; }
.between{ justify-content:space-between; }
.wrap-gap{ display:flex; gap:10px; flex-wrap:wrap; }
.grid{ display:grid; gap:var(--grid-gap); }
.divider{ height:1px; background:var(--line); }

/* toolbar slim de sección (reemplaza el page-head grande) */
.toolbar{ display:flex; align-items:baseline; gap:6px 14px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
.toolbar .t-title{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:-.02em; white-space:nowrap; flex:0 0 auto; }
.toolbar .t-meta{ font-size:12.5px; color:var(--tx-3); letter-spacing:0; text-transform:none; white-space:nowrap; }
@media (max-width:760px){ .toolbar .t-meta{ white-space:normal; flex-basis:100%; } }
.page-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:24px; }

/* scrollbar */
.scroll::-webkit-scrollbar, .sidebar::-webkit-scrollbar{ width:10px; }
.scroll::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:10px; border:3px solid var(--bg); }

/* progress bar */
.bar{ height:6px; border-radius:99px; background:var(--surface-3); overflow:hidden; }
.bar > i{ display:block; height:100%; border-radius:99px; background:var(--fill); }

/* segmented control */
.seg{ display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:2px; }
.seg button{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-body); font-size:13px; font-weight:600; color:var(--tx-2);
  background:none; border:none; padding:7px 14px; border-radius:7px; cursor:pointer; transition:all .14s ease;
}
.seg button svg{ width:14px; height:14px; opacity:.85; }
.seg button:hover{ color:var(--tx-1); }
.seg button.on{ background:var(--surface-3); color:var(--tx-1); box-shadow:0 1px 0 rgba(255,255,255,.04) inset; }

/* popover */
.pop{
  position:absolute; top:54px; right:0; z-index:50; width:330px;
  background:#15151b; border:1px solid var(--line-2); border-radius:var(--r-lg);
  padding:20px; box-shadow:0 30px 60px -20px rgba(0,0,0,.7);
}

/* modal */
.overlay{ position:fixed; inset:0; z-index:100; background:rgba(7,7,10,.72); backdrop-filter:blur(6px); display:grid; place-items:center; padding:24px; }
.modal{ width:min(720px,100%); background:#121217; border:1px solid var(--line-2); border-radius:var(--r-xl); padding:32px; position:relative; }

/* ===== BRAND BANNER ===== */
.brand-banner{
  position:relative; overflow:hidden;
  border-radius:var(--r-xl); border:1px solid var(--line-2);
  background:
    radial-gradient(420px 220px at 88% -30%, rgba(139,109,255,.30), transparent 70%),
    radial-gradient(360px 200px at 8% 130%, rgba(194,100,232,.22), transparent 70%),
    linear-gradient(180deg, #16131f, #101015);
  display:flex; align-items:center; gap:24px; padding:30px 34px;
}
.brand-banner img{ width:84px; height:84px; flex:0 0 84px; border-radius:20px; box-shadow:0 16px 40px -14px rgba(139,109,255,.85); }
.brand-wm{ font-family:var(--font-display); font-weight:800; letter-spacing:-.03em; line-height:1; font-size:clamp(30px,4vw,46px); }
.brand-wm .grad{ background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.brand-tag{ font-family:var(--font-mono); font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:var(--tx-2); margin-top:12px; }
.brand-banner.lg{ padding:46px 44px; gap:30px; }
.brand-banner.lg img{ width:108px; height:108px; flex:0 0 108px; border-radius:26px; }

/* materia swatch */
.subject-icon{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:20px; color:#fff; }

.fade-in{ animation:fade .4s ease; }
@keyframes fade{ from{ transform:translateY(10px); } to{ transform:none; } }

a{ color:inherit; text-decoration:none; }
.link{ color:var(--violet-hi); cursor:pointer; font-weight:600; }
.link:hover{ text-decoration:underline; }

/* ============================================================
   PIZARRÓN ESTILO CANVA
   ============================================================ */
.board-wrap{ position:relative; border:1px solid var(--line); border-radius:var(--r-lg); background:var(--surface-1); overflow:hidden; }
.board-dots{
  position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,.13) 1.4px, transparent 1.4px);
  background-size:26px 26px; background-position:-1px -1px;
  pointer-events:none;
}
.board-canvas{ position:relative; width:100%; min-height:640px; }
.board-item{
  position:absolute; border-radius:var(--r); background:var(--surface-1);
  border:1px solid var(--line-2); overflow:hidden;
  box-shadow:0 10px 30px -16px rgba(0,0,0,.6);
}
.board-item.editing{ cursor:move; }
.board-item.editing:hover{ border-color:var(--violet-line); }
.board-item .ed-bar{
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:rgba(20,20,26,.9); border-bottom:1px solid var(--line);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx-2);
}
.board-item .ed-bar .handle{ cursor:move; color:var(--tx-3); letter-spacing:0; }
.board-item .resize{
  position:absolute; right:0; bottom:0; width:18px; height:18px; cursor:nwse-resize;
  background:linear-gradient(135deg,transparent 45%,var(--violet-line) 45%,var(--violet-line) 60%,transparent 60%,transparent 72%,var(--violet-line) 72%,var(--violet-line) 87%,transparent 87%);
  z-index:5;
}
.board-body{ padding:16px 18px; height:100%; overflow:auto; }
.board-body::-webkit-scrollbar{ width:7px; }
.board-body::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:7px; }

/* barra de herramientas del pizarrón */
.board-tools{
  position:absolute; bottom:14px; right:14px; z-index:20;
  display:flex; align-items:center; gap:10px;
}
.board-tools .bt-hint{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; color:var(--tx-3);
  background:rgba(18,18,23,.82); border:1px solid var(--line); border-radius:99px;
  padding:6px 12px; backdrop-filter:blur(8px);
}
@media (max-width:760px){ .board-tools .bt-hint{ display:none; } }
.board-tools .bt-group{
  display:flex; align-items:center; gap:2px;
  background:rgba(18,18,23,.9); border:1px solid var(--line-2); border-radius:11px;
  padding:3px; backdrop-filter:blur(8px);
}
.board-tools .bt-btn{
  width:34px; height:34px; border-radius:9px; border:1px solid var(--line-2);
  background:rgba(18,18,23,.9); color:var(--tx-2); display:grid; place-items:center; cursor:pointer;
  transition:all .14s ease; backdrop-filter:blur(8px);
}
.board-tools .bt-group .bt-btn{ border:none; background:transparent; }
.board-tools .bt-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.board-tools .bt-zoom{
  min-width:54px; height:34px; border:none; background:transparent; cursor:pointer;
  font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--tx-1);
}
.board-tools .bt-zoom:hover{ color:var(--violet-hi); }

/* post-it */
.postit{
  position:absolute; min-width:170px; min-height:150px; padding:16px;
  border-radius:4px; box-shadow:0 14px 30px -12px rgba(0,0,0,.55);
  font-family:var(--font-body); color:#2a2410; transform:rotate(-1.4deg);
  transition:transform .15s ease;
}
.postit textarea{ width:100%; height:100%; min-height:90px; background:none; border:none; outline:none; resize:none; color:inherit; font-family:var(--font-body); font-size:14px; line-height:1.45; }
.postit textarea::placeholder{ color:rgba(0,0,0,.35); }

/* floating drawer (edición) */
.drawer{
  position:fixed; z-index:120; width:300px; background:#15151b;
  border:1px solid var(--line-2); border-radius:var(--r-lg);
  box-shadow:0 30px 70px -20px rgba(0,0,0,.8); overflow:hidden;
}
.drawer-head{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); cursor:move; background:var(--surface-2); }
.drawer-body{ padding:16px; max-height:62vh; overflow-y:auto; }
.drawer-body::-webkit-scrollbar{ width:8px; } .drawer-body::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.chiprow{ display:flex; flex-wrap:wrap; gap:8px; }
.addbtn{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:11px 13px; border-radius:10px; border:1px solid var(--line);
  background:var(--surface-2); color:var(--tx-1); font-size:13.5px; font-weight:500; cursor:pointer; font-family:var(--font-body);
  transition:all .14s ease;
}
.addbtn:hover{ border-color:var(--violet-line); background:var(--violet-soft); }
.addbtn svg{ color:var(--violet-hi); }
.addmini{
  display:flex; align-items:center; gap:8px; padding:9px 10px;
  border-radius:9px; border:1px solid var(--line); background:var(--surface-2);
  color:var(--tx-1); font-size:12.5px; font-weight:500; cursor:pointer; font-family:var(--font-body);
  transition:all .14s ease; white-space:nowrap; overflow:hidden;
}
.addmini:hover{ border-color:var(--violet-line); background:var(--violet-soft); }
.addmini svg{ color:var(--violet-hi); flex:0 0 auto; }

/* ===== SMART LIST ===== */
.sl-pill{
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.04em;
  padding:3px 8px; border-radius:99px; border:1px solid var(--line-2);
  white-space:nowrap; cursor:default;
}
.sl-tabs{ display:inline-flex; gap:2px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:2px; }
.sl-tabs button{ width:26px; height:24px; border:none; background:none; border-radius:6px; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; transition:all .12s ease; }
.sl-tabs button:hover{ color:var(--tx-1); }
.sl-tabs button.on{ background:var(--surface-3); }
.sl-row{ display:flex; align-items:center; gap:11px; padding:9px 6px; border-radius:8px; cursor:pointer; transition:background .12s ease; }
.sl-row:hover{ background:var(--surface-2); }
.sl-kanban{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; padding-top:4px; }
.sl-col{ background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px; min-height:90px; }
.sl-card{ background:var(--surface-1); border:1px solid var(--line); border-radius:8px; padding:9px 10px; margin-bottom:7px; cursor:pointer; transition:border-color .12s ease; }
.sl-card:hover{ border-color:var(--line-2); }
.sl-table{ width:100%; border-collapse:collapse; font-size:13px; }
.sl-table th{ text-align:left; font-family:var(--font-mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line); }
.sl-table td{ padding:9px 8px; border-bottom:1px solid var(--line); }
.sl-table tbody tr{ cursor:pointer; transition:background .12s ease; }
.sl-table tbody tr:hover{ background:var(--surface-2); }

/* side peek */
.sp-scrim{ position:fixed; inset:0; z-index:210; background:rgba(7,7,10,.5); backdrop-filter:blur(3px); display:flex; justify-content:flex-end; animation:fade .2s ease; }
.sp-panel{
  position:fixed; right:0; top:0; bottom:0; z-index:211;
  width:min(390px,100%); padding:26px 26px 22px; overflow-y:auto;
  background:#121217; border-left:1px solid var(--line-2);
  box-shadow:-30px 0 60px -25px rgba(0,0,0,.7); animation:fbSlide .3s cubic-bezier(.4,.1,.2,1);
}
.sp-panel::-webkit-scrollbar{ width:8px; } .sp-panel::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.sp-title{ width:100%; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-display); font-weight:700; font-size:24px; letter-spacing:-.02em; margin-bottom:18px; }
.sp-row{ display:flex; align-items:center; gap:14px; padding:11px 0; border-bottom:1px solid var(--line); }
.sp-key{ display:flex; align-items:center; gap:8px; width:120px; flex:0 0 120px; font-size:12.5px; color:var(--tx-2); }
.sp-key svg{ color:var(--tx-3); }
.sl-pick{ font-family:var(--font-body); font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:99px; border:1px solid; cursor:pointer; transition:all .12s ease; }

/* ===== MI ESPACIO ===== */
.space-rail{
  flex:0 0 218px; width:218px; border-right:1px solid var(--line);
  padding:18px 12px; overflow-y:auto; background:rgba(16,16,21,.4);
  display:flex; flex-direction:column; gap:3px;
}
.space-rail::-webkit-scrollbar{ width:0; }
.space-pageitem{
  display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:9px;
  cursor:pointer; color:var(--tx-2); font-size:13.5px; font-weight:500;
  transition:background .12s ease, color .12s ease;
}
.space-pageitem:hover{ background:var(--surface-2); color:var(--tx-1); }
.space-pageitem.on{ background:var(--violet-soft); color:var(--violet-hi); }
.space-del{ opacity:0; cursor:pointer; color:var(--tx-3); transition:opacity .12s ease; display:inline-flex; }
.space-pageitem:hover .space-del{ opacity:1; }
.space-focus{ position:fixed; inset:0; z-index:150; background:var(--bg); overflow-y:auto; }
.habits{ border-collapse:collapse; }
.habits th{ padding:4px 5px; text-align:center; }
.habits td{ padding:4px 5px; text-align:center; }
.habit-cell{ width:24px; height:24px; border-radius:7px; border:1px solid var(--line); display:grid; place-items:center; cursor:pointer; margin:0 auto; transition:transform .1s ease; }
.habit-cell:hover{ transform:scale(1.12); }

/* documento por bloques (Mi Espacio) */
.doc{ max-width:760px; }
.doc-block{ display:flex; align-items:flex-start; gap:4px; position:relative; padding:3px 0; }
.doc-block > div:nth-child(3){ padding:2px 0; }
.doc-handle{ opacity:0; cursor:grab; color:var(--tx-3); font-size:12px; line-height:1.8; width:16px; text-align:center; flex:0 0 16px; user-select:none; transition:opacity .12s ease; }
.doc-plus{ opacity:0; cursor:pointer; color:var(--tx-3); width:20px; height:24px; display:grid; place-items:center; border-radius:6px; flex:0 0 20px; transition:opacity .12s ease, background .12s ease; }
.doc-plus:hover{ background:var(--surface-2); color:var(--violet-hi); }
.doc-del{ opacity:0; cursor:pointer; color:var(--tx-3); padding:4px; transition:opacity .12s ease; flex:0 0 auto; }
.doc-del:hover{ color:#e8639b; }
.doc-block:hover .doc-handle, .doc-block:hover .doc-plus, .doc-block:hover .doc-del{ opacity:1; }
.doc-slash{ position:absolute; top:100%; left:0; z-index:60; margin-top:4px; width:220px; background:#15151b; border:1px solid var(--line-2); border-radius:var(--r-lg); padding:6px; box-shadow:0 24px 50px -18px rgba(0,0,0,.7); }
.doc-slash button{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:8px 11px; border-radius:8px; border:none; background:none; color:var(--tx-1); font-size:13.5px; font-family:var(--font-body); cursor:pointer; }
.doc-slash button:hover{ background:var(--violet-soft); color:var(--violet-hi); }
.doc-slash button svg{ color:var(--violet-hi); }
.doc-addbtn{ display:flex; align-items:center; gap:8px; margin-top:8px; padding:8px 10px; border-radius:8px; border:none; background:none; color:var(--tx-3); font-size:13px; font-family:var(--font-body); cursor:pointer; transition:color .12s ease; }
.doc-addbtn:hover{ color:var(--violet-hi); }

/* ===== TABLA EDITABLE (bloque /tabla, estilo Notion/Airtable) ===== */
.tbl-wrap{ border:1px solid var(--line); border-radius:var(--r); background:var(--surface-1); overflow:hidden; margin:6px 0; }
.tbl-bar{ display:flex; align-items:center; gap:8px; padding:7px 12px; border-bottom:1px solid var(--line); background:var(--surface-2); }
.tbl-bar-btn{ display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:7px; border:1px solid var(--line); background:var(--surface-1); color:var(--tx-2); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .12s ease; }
.tbl-bar-btn:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.tbl-scroll{ overflow-x:auto; }
.tbl-scroll::-webkit-scrollbar{ height:8px; } .tbl-scroll::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.tbl{ width:100%; border-collapse:separate; border-spacing:0; font-size:13px; font-variant-numeric:tabular-nums; }
.tbl thead th{ position:relative; background:var(--surface-2); border-bottom:1px solid var(--line-2); border-right:1px solid var(--line); padding:0; min-width:140px; text-align:left; vertical-align:bottom; }
.tbl thead th:last-child{ border-right:none; }
.tbl-th{ display:flex; align-items:center; gap:6px; padding:9px 11px 8px; }
.tbl-th-name{ flex:1; min-width:0; background:none; border:none; outline:none; color:var(--tx-1); font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:0; }
.tbl-th-name::placeholder{ color:var(--tx-3); }
.tbl-th-type{ font-family:var(--font-body); font-size:10px; color:var(--tx-3); letter-spacing:0; text-transform:none; font-weight:500; }
.tbl-th-menu{ width:22px; height:22px; border-radius:5px; border:none; background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; opacity:0; transition:all .12s ease; }
.tbl thead th:hover .tbl-th-menu{ opacity:1; }
.tbl-th-menu:hover{ background:var(--surface-3); color:var(--tx-1); }
.tbl-add-col{ min-width:42px !important; width:42px; }
.tbl-add-col button{ width:32px; height:32px; border-radius:7px; border:1px dashed var(--line-2); background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; margin:4px auto; transition:all .12s ease; }
.tbl-add-col button:hover{ color:var(--violet-hi); border-color:var(--violet-line); }
.tbl tbody td{ border-bottom:1px solid var(--line); border-right:1px solid var(--line); padding:9px 11px; color:var(--tx-1); cursor:cell; vertical-align:middle; min-height:36px; }
.tbl tbody td:last-child{ border-right:none; }
.tbl tbody td.edit{ padding:0; background:var(--surface-2); box-shadow:inset 0 0 0 1.5px var(--violet-line); }
.tbl tbody td.edit:has(input), .tbl tbody td.edit:has(select){ padding:0; }
.tbl tbody tr:hover td{ background:rgba(255,255,255,.015); }
.tbl tbody tr:hover td.edit{ background:var(--surface-2); }
.tbl-edit-in, .tbl-edit-sel{ width:100%; height:100%; min-height:36px; background:transparent; border:none; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:13px; padding:9px 11px; font-variant-numeric:tabular-nums; }
.mono-num{ font-family:var(--font-mono); }
.tbl-edit-sel{ appearance:none; cursor:pointer; }
.tbl-empty{ color:var(--tx-3); }
.tbl-row-actions{ width:32px; text-align:center; padding:0 !important; }
.tbl-row-actions button{ width:22px; height:22px; border-radius:5px; border:none; background:transparent; color:var(--tx-3); cursor:pointer; display:grid; place-items:center; margin:0 auto; opacity:0; transition:all .12s ease; }
.tbl tbody tr:hover .tbl-row-actions button{ opacity:1; }
.tbl-row-actions button:hover{ color:#e8639b; background:var(--surface-2); }
.tbl-add-row td{ padding:0 !important; border-right:none !important; }
.tbl-add-row button{ display:flex; align-items:center; gap:7px; width:100%; padding:8px 11px; border:none; background:transparent; color:var(--tx-3); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .12s ease; }
.tbl-add-row button:hover{ color:var(--violet-hi); background:var(--violet-soft); }
.tbl tfoot td{ background:var(--surface-2); border-top:1px solid var(--line-2); border-right:1px solid var(--line); padding:7px 11px; font-size:11px; color:var(--tx-3); }
.tbl tfoot td:last-child{ border-right:none; }
.tbl-total-inner{ display:flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:11px; font-variant-numeric:tabular-nums; }
.tbl-total-inner .mono{ font-size:10px; }
.tbl-menu{ position:absolute; top:100%; left:0; z-index:60; width:230px; margin-top:2px; background:#15151b; border:1px solid var(--line-2); border-radius:var(--r); padding:6px; box-shadow:0 24px 50px -18px rgba(0,0,0,.8); }
.tbl-menu-label{ font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3); padding:6px 10px 4px; }
.tbl-menu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; padding:7px 10px; border-radius:6px; border:none; background:none; color:var(--tx-1); font-family:var(--font-body); font-size:12.5px; font-weight:500; cursor:pointer; }
.tbl-menu button:hover{ background:var(--violet-soft); color:var(--violet-hi); }
.tbl-menu button.on{ color:var(--violet-hi); background:var(--violet-soft); }
.tbl-menu button.danger:hover{ background:rgba(232,99,155,.13); color:#e8639b; }
.tbl-menu button[disabled]{ opacity:.4; cursor:not-allowed; }
.tbl-menu-sep{ height:1px; background:var(--line); margin:5px 4px; }
.tbl-menu-opt{ display:flex; align-items:center; gap:8px; padding:5px 10px; }
.tbl-opt-dot{ width:10px; height:10px; border-radius:50%; flex:0 0 10px; cursor:pointer; }
.tbl-menu-opt input{ flex:1; min-width:0; background:var(--surface-2); border:1px solid var(--line); border-radius:6px; outline:none; color:var(--tx-1); font-family:var(--font-body); font-size:12.5px; padding:5px 8px; }
.tbl-menu-opt input:focus{ border-color:var(--violet-line); }
.tbl-menu-opt button{ width:22px; height:22px; padding:0; flex:0 0 22px; justify-content:center; color:var(--tx-3); }
.tbl-menu-addopt{ display:flex; align-items:center; gap:7px; padding:6px 10px; border-radius:6px; border:1px dashed var(--line-2); background:transparent; color:var(--tx-3); font-family:var(--font-body); font-size:12px; cursor:pointer; margin:4px; width:calc(100% - 8px); justify-content:flex-start; }
.tbl-menu-addopt:hover{ color:var(--violet-hi); border-color:var(--violet-line); }

/* control de tamaño de widget en dashboard */
.dash-resize{ position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); z-index:6; display:flex; gap:2px; background:#15151b; border:1px solid var(--line-2); border-radius:99px; padding:3px; box-shadow:0 8px 20px -8px rgba(0,0,0,.6); }
.dash-resize button{ min-width:26px; height:22px; border:none; background:none; border-radius:99px; color:var(--tx-3); font-family:var(--font-mono); font-size:11px; font-weight:600; cursor:pointer; transition:all .12s ease; }
.dash-resize button:hover{ color:var(--tx-1); }
.dash-resize button.on{ background:var(--violet); color:#fff; }

/* swatch picker */
.swatches{ display:flex; flex-wrap:wrap; gap:9px; }
.swatch{ width:30px; height:30px; border-radius:9px; cursor:pointer; border:2px solid transparent; transition:transform .12s ease; }
.swatch:hover{ transform:scale(1.12); }
.swatch.sel{ border-color:#fff; box-shadow:0 0 0 2px var(--bg),0 0 0 4px rgba(255,255,255,.5); }

/* toast */
.toast-wrap{ position:fixed; top:22px; right:22px; z-index:300; display:flex; flex-direction:column; gap:10px; }
.toast{
  display:flex; align-items:center; gap:11px; padding:13px 17px;
  background:#1a1a22; border:1px solid var(--line-2); border-left:3px solid var(--violet);
  border-radius:var(--r); box-shadow:0 16px 40px -14px rgba(0,0,0,.7);
  font-size:14px; font-weight:500; color:var(--tx-1); animation:toastIn .25s ease;
}
.toast .ok{ color:#3ecf9a; }
@keyframes toastIn{ from{ opacity:0; transform:translateX(30px); } to{ opacity:1; transform:none; } }

/* ===== FEEDBACK WIDGET ===== */
.fb-fab{
  position:fixed; right:26px; bottom:26px; z-index:200;
  width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
  background:var(--grad); color:#fff; display:grid; place-items:center;
  box-shadow:0 14px 34px -10px rgba(139,109,255,.75), 0 4px 12px rgba(0,0,0,.35);
  transition:transform .18s cubic-bezier(.2,.9,.2,1.2), filter .18s ease;
}
.fb-fab:hover{ transform:scale(1.07) translateY(-1px); filter:brightness(1.08); }
.fb-fab:active{ transform:scale(.96); }
.fb-scrim{ position:fixed; inset:0; z-index:201; background:rgba(7,7,10,.5); backdrop-filter:blur(3px); animation:fade .2s ease; display:flex; justify-content:flex-end; }
.fb-panel{
  width:min(420px,100%); height:100%; padding:30px 30px 26px;
  background:#121217; border-left:1px solid var(--line-2);
  box-shadow:-30px 0 60px -25px rgba(0,0,0,.7);
  overflow-y:auto; animation:fbSlide .3s cubic-bezier(.4,.1,.2,1);
}
@keyframes fbSlide{ from{ transform:translateX(100%); } to{ transform:none; } }
.fb-panel::-webkit-scrollbar{ width:8px; } .fb-panel::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:8px; }
.fb-type{
  display:flex; flex-direction:column; align-items:center; gap:9px;
  padding:16px 6px; border-radius:var(--r-lg); border:1px solid var(--line-2);
  cursor:pointer; transition:all .15s ease; font-family:var(--font-body);
}
.fb-type:hover{ filter:brightness(1.12); }

/* checkbox / check item */
.cbox{ width:21px; height:21px; border-radius:6px; border:1.5px solid var(--line-2); display:grid; place-items:center; cursor:pointer; flex:0 0 auto; transition:all .14s ease; }
.cbox.on{ background:var(--violet); border-color:var(--violet); }
.check-row{ display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
.check-row:last-child{ border-bottom:none; }

/* inline add input */
.addline{ display:flex; gap:10px; align-items:center; margin-top:14px; }
.addline .input{ flex:1; padding:11px 14px; font-size:14px; }

/* tabs */
.tabs{ display:flex; gap:6px; flex-wrap:wrap; }
.tab{ font-family:var(--font-body); font-size:13.5px; font-weight:600; color:var(--tx-2); background:var(--surface-2); border:1px solid var(--line); padding:9px 16px; border-radius:99px; cursor:pointer; transition:all .14s ease; display:inline-flex; gap:7px; align-items:center; }
.tab:hover{ color:var(--tx-1); border-color:var(--line-2); }
.tab.on{ color:#fff; background:var(--violet-soft); border-color:var(--violet-line); color:var(--violet-hi); }

/* badge prioridad */
.prio{ font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 9px; border-radius:6px; }

/* select */
.sel-input{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r); color:var(--tx-1); padding:11px 14px; font-family:var(--font-body); font-size:14px; cursor:pointer; }
.sel-input:focus{ outline:none; border-color:var(--violet-line); }

/* chat bubbles */
.bubble{ max-width:74%; padding:13px 16px; border-radius:16px; font-size:14.5px; line-height:1.5; }
.bubble.me{ background:var(--violet-soft); border:1px solid var(--violet-line); border-bottom-right-radius:5px; align-self:flex-end; }
.bubble.ai{ background:var(--surface-2); border:1px solid var(--line); border-bottom-left-radius:5px; align-self:flex-start; }
.typing span{ width:6px; height:6px; border-radius:50%; background:var(--tx-3); display:inline-block; animation:blink 1.2s infinite; }
.typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
@keyframes blink{ 0%,60%,100%{ opacity:.25; } 30%{ opacity:1; } }

/* onboarding */
.ob-step-dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-family:var(--font-mono); font-weight:600; font-size:13px; border:1.5px solid var(--line-2); color:var(--tx-3); }
.ob-step-dot.on{ background:var(--violet); border-color:var(--violet); color:#fff; }
.ob-step-dot.done{ border-color:var(--violet); color:var(--violet-hi); }
.pickcard{ border:1px solid var(--line-2); border-radius:var(--r-lg); padding:24px; cursor:pointer; transition:all .15s ease; background:var(--surface-1); }
.pickcard:hover{ border-color:var(--violet-line); background:var(--surface-2); }
.pickcard.sel{ border-color:var(--violet); background:var(--violet-soft); }

/* generic empty */
.empty{ display:grid; place-items:center; padding:34px 18px; text-align:center; color:var(--tx-3); }
.empty .h3{ text-wrap:balance; }
.empty .small{ text-wrap:pretty; }

/* ===== CARD DE MATERIA (neutra, acento contenido) ===== */
.subj-card{ position:relative; cursor:pointer; padding:0; overflow:hidden; }
.subj-accent{ position:absolute; left:0; top:0; bottom:0; width:3px; }
.subj-body{ padding:18px 18px 16px 21px; }
.subj-mono{
  width:46px; height:46px; border-radius:13px; flex:0 0 auto;
  display:grid; place-items:center;
  font-family:var(--font-display); font-weight:700; font-size:19px;
  border:1px solid var(--line-2); background-size:cover; background-position:center;
}

/* color strip materia card */
.strip{ height:74px; padding:16px 18px; display:flex; flex-direction:column; justify-content:flex-end; color:#fff; position:relative; }

/* btn disabled */
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }

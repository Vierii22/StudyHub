function SubjectDashboard({ subject, onEdit, onBack, flash }) {
  const wkey = 'studyhub_v3_subj_widgets_' + subject.id;
  const [widgets, setWidgets] = useState(() => { try { const r = AppStorage.getItem(wkey); return r ? JSON.parse(r) : DEFAULT_SUBJ_WIDGETS; } catch(e){ return DEFAULT_SUBJ_WIDGETS; } });
  const [editMode, setEditMode] = useState(false);
  const [draggedIdx, setDraggedIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const gridRef = useRef(null);
  const resizingRef = useRef(null);
  const [resizing, setResizing] = useState(null);

  const saveWidgets = (next) => { setWidgets(next); try { AppStorage.setItem(wkey, JSON.stringify(next)); } catch(e){} };
  const availableWidgets = Object.keys(SUBJ_WIDGET_CATALOG).filter(k => !widgets.some(w => w.id === k));
  const addWidget = (id) => saveWidgets([...widgets, {id, span: SUBJ_WIDGET_CATALOG[id].span}]);
  const removeWidget = (i) => { const next = [...widgets]; next.splice(i,1); saveWidgets(next); };
  const moveWidget = (from, to) => {
    if (from === to || from == null || to == null) return;
    const next = [...widgets]; const [m] = next.splice(from,1); next.splice(to,0,m); saveWidgets(next);
  };
  const resizeWidget = (i, span) => { const next = [...widgets]; next[i] = {...next[i], span}; saveWidgets(next); };

  // Resize by drag corner
  const startResize = (e, idx) => {
    e.preventDefault(); e.stopPropagation();
    if (!gridRef.current) return;
    const gridRect = gridRef.current.getBoundingClientRect();
    const gap = 14; const colW = (gridRect.width - 11*gap)/12;
    const widgetEl = e.currentTarget.closest('.widget');
    if (!widgetEl) return;
    const wRect = widgetEl.getBoundingClientRect();
    const w = widgets[idx];
    setResizing({ idx, startX:e.clientX, startY:e.clientY, startWidth:wRect.width, startHeight:wRect.height, colW, gap, currentSpan:w.span||6, currentHeight:wRect.height });
  };
  useEffect(() => {
    if (!resizing) return;
    document.body.classList.add('is-resizing');
    const onMove = (e) => {
      const dx = e.clientX - resizing.startX; const dy = e.clientY - resizing.startY;
      const newWidth = Math.max(50, resizing.startWidth + dx);
      let newSpan = Math.round((newWidth + resizing.gap) / (resizing.colW + resizing.gap));
      newSpan = Math.max(3, Math.min(12, newSpan));
      const newHeight = Math.max(140, Math.min(700, resizing.startHeight + dy));
      setResizing(r => r ? {...r, currentSpan:newSpan, currentHeight:newHeight} : r);
      const next = [...widgets]; if (!next[resizing.idx]) return;
      next[resizing.idx] = {...next[resizing.idx], span:newSpan, height:newHeight}; setWidgets(next);
    };
    const up = () => { setResizing(null); try { AppStorage.setItem(wkey, JSON.stringify(widgets)); } catch(e){} };
    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', up);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', up); document.body.classList.remove('is-resizing'); };
  }, [resizing]);

  const colorInfo = SUBJECT_COLORS.find(c => c.id === (subject.color||'v1')) || SUBJECT_COLORS[0];
  const initials = subject.name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();

  return (
    <div style={{padding:'0 0 40px'}}>
      {/* Header */}
      <div className="subj-header">
        <div className="subj-header__badge" style={{background:colorInfo.css}}>{initials}</div>
        <div style={{flex:1, minWidth:0}}>
          <div className="subj-header__name">{subject.name}</div>
          <div className="subj-header__meta">
            {subject.prof && <span>{subject.prof}</span>}
            {subject.next && <span style={{color:'var(--violet-2)'}}>{subject.next}</span>}
            {subject.link && <a href={subject.link} target="_blank" rel="noreferrer" className="subj-header__link">🔗 Abrir classroom</a>}
          </div>
        </div>
        <div style={{display:'flex', gap:10, flexShrink:0}}>
          <button className="editor-toolbar__btn" onClick={onEdit}><I.Edit size={13}/> Editar</button>
          <button className={"btn-primary" + (editMode ? ' editor-toolbar__btn--primary' : '')} onClick={() => setEditMode(!editMode)}>
            {editMode ? <><I.CheckSquare size={13}/> Listo</> : <><I.Edit size={13}/> Personalizar</>}
          </button>
          <button className="editor-toolbar__btn" onClick={onBack}>← Volver</button>
        </div>
      </div>

      {/* Widget grid */}
      <div className="widget-grid stagger" ref={gridRef}>
        {widgets.map((w, i) => {
          const span = w.span || 6;
          const customHeight = w.height ? {minHeight: w.height + 'px'} : undefined;
          const isResizingThis = resizing?.idx === i;
          if (!editMode) {
            return (
              <div key={w.id} className={"widget widget--s" + span} style={customHeight}>
                <SubjectWidgetContent widgetId={w.id} subject={subject} flash={flash}/>
              </div>
            );
          }
          return (
            <div key={w.id}
              className={"widget editable widget--s"+span+(draggedIdx===i?' dragging':'')+(dragOverIdx===i&&draggedIdx!==i?' drag-over':'')+(isResizingThis?' resizing':'')}
              style={customHeight}
              draggable={!isResizingThis}
              onDragStart={(e) => { e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',String(i)); setDraggedIdx(i); }}
              onDragOver={(e) => { e.preventDefault(); if(dragOverIdx!==i) setDragOverIdx(i); }}
              onDragLeave={() => { if(dragOverIdx===i) setDragOverIdx(null); }}
              onDrop={(e) => { e.preventDefault(); moveWidget(draggedIdx,i); setDraggedIdx(null); setDragOverIdx(null); }}
              onDragEnd={() => { setDraggedIdx(null); setDragOverIdx(null); }}>
              <div className="widget__edit-bar" onMouseDown={e=>e.stopPropagation()}>
                <span className="widget__edit-handle">⋮⋮</span>
                <span className="widget__edit-name">{SUBJ_WIDGET_CATALOG[w.id]?.title}</span>
                <div className="widget__edit-sizes">
                  {[4,6,8,12].map(s => (
                    <button key={s} data-on={span===s} draggable={false} onClick={e=>{e.stopPropagation();resizeWidget(i,s);}} title={`Ancho ${s}/12`}>{s}</button>
                  ))}
                </div>
                <button className="widget__edit-remove" draggable={false} onClick={e=>{e.stopPropagation();removeWidget(i);}}><I.X size={14}/></button>
              </div>
              <SubjectWidgetContent widgetId={w.id} subject={subject} flash={flash}/>
              {isResizingThis && <div className="widget__size-badge">{resizing.currentSpan}/12 · {Math.round(resizing.currentHeight)}px</div>}
              <div className="widget__resize-handle" draggable={false} onDragStart={e=>e.preventDefault()} onMouseDown={e=>startResize(e,i)}>
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M13 6 L6 13"/><path d="M13 10 L10 13"/></svg>
              </div>
            </div>
          );
        })}
        {widgets.length === 0 && (
          <div className="widget widget--s12"><div className="r-panel" style={{textAlign:'center', padding:48}}>
            <div style={{fontSize:14, color:'var(--text-3)', marginBottom:12}}>Dashboard vacío</div>
            <button className="btn-primary" onClick={() => setEditMode(true)}><I.Edit size={14}/> Personalizar</button>
          </div></div>
        )}
      </div>

      {editMode && (
        <DraggableSubjDrawer
          onClose={() => setEditMode(false)}
          availableWidgets={availableWidgets}
          currentWidgets={widgets}
          addWidget={addWidget}
          removeWidget={removeWidget}
          exitEditor={() => setEditMode(false)}
        />
      )}
    </div>
  );
}

// ============================================================
function EnergyWidget({ onCheckin }) {
  const today = new Date().toISOString().slice(0,10);
  const [log, setLog] = useState(() => loadEnergyLog());
  const [editing, setEditing] = useState(false);
  const todayEntry = log.find(e => e.date === today);
  const [form, setForm] = useState({ energia: todayEntry?.energia || 0, sueno: todayEntry?.sueno || '', humor: todayEntry?.humor || '' });

  const MOODS = ['😴','😞','😐','🙂','😄'];
  const ENERGIA_LABELS = ['','Agotado','Cansado','Normal','Bien','Con pilas'];

  const saveEntry = () => {
    if (!form.energia) return;
    const next = log.filter(e => e.date !== today);
    const entry = { date: today, ...form, sueno: Number(form.sueno) || 0 };
    next.push(entry);
    // keep last 30 days
    const sorted = next.sort((a,b) => a.date.localeCompare(b.date)).slice(-30);
    setLog(sorted);
    saveEnergyLog(sorted);
    setEditing(false);
    if (onCheckin) onCheckin(entry);
  };

  // Alert: low energy 3+ days in a row
  const lastDays = log.slice(-3);
  const alertLowSleep = lastDays.length >= 3 && lastDays.every(e => e.sueno < 6);
  const alertLowEnergy = lastDays.length >= 3 && lastDays.every(e => e.energia <= 2);

  const last7 = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (6-i));
    const key = d.toISOString().slice(0,10);
    return log.find(e => e.date === key) || null;
  });

  // Energy bar color
  const energyColor = (v) => {
    if (!v) return 'var(--text-4)';
    if (v <= 2) return '#f87171';
    if (v === 3) return '#fbbf24';
    return '#4ade80';
  };

  return (
    <div className="energy-widget">
      <div className="energy-widget__head">
        <h4 className="energy-widget__title">⚡ Energía del día</h4>
        <span className="energy-widget__date">{today}</span>
      </div>

      {!editing && todayEntry ? (
        <div>
          <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:10}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:24, fontWeight:700, color: energyColor(todayEntry.energia)}}>{todayEntry.energia}/5</div>
              <div style={{fontSize:10, color:'var(--text-3)'}}>Energía</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:24, fontWeight:700, color: todayEntry.sueno < 6 ? '#f87171' : '#4ade80'}}>{todayEntry.sueno || '—'}h</div>
              <div style={{fontSize:10, color:'var(--text-3)'}}>Sueño</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:24}}>{todayEntry.humor}</div>
              <div style={{fontSize:10, color:'var(--text-3)'}}>Humor</div>
            </div>
            <button className="editor-toolbar__btn" style={{marginLeft:'auto', fontSize:11}} onClick={() => setEditing(true)}>Editar</button>
          </div>
          <div className="energy-history">
            {last7.map((e,i) => (
              <div key={i} className="energy-history__bar"
                data-today={last7.indexOf(todayEntry) === i}
                style={{height: e ? Math.max(8, e.energia * 8) + 'px' : '4px', background: e ? energyColor(e.energia) : undefined, opacity: e ? 1 : 0.3}}
                title={e ? `${e.date}: ${ENERGIA_LABELS[e.energia]}, ${e.sueno}h` : 'Sin registro'}/>
            ))}
          </div>
          {(alertLowSleep || alertLowEnergy) && (
            <div className="energy-alert">
              {alertLowSleep && '😴 Dormiste menos de 6hs los últimos 3 días. '}
              {alertLowEnergy && '⚠️ Energía baja 3 días seguidos — tomá un descanso.'}
            </div>
          )}
        </div>
      ) : (
        <div className="energy-checkin">
          <div className="ecin-row">
            <span className="ecin-row__label">Energía</span>
            <div className="ecin-stars">
              {[1,2,3,4,5].map(n => (
                <button key={n} className="ecin-star" data-on={form.energia >= n}
                  onClick={() => setForm(f => ({...f, energia:n}))}>
                  {n}
                </button>
              ))}
              <span style={{fontSize:11, color:'var(--text-3)', marginLeft:4, alignSelf:'center'}}>{ENERGIA_LABELS[form.energia]}</span>
            </div>
          </div>
          <div className="ecin-row">
            <span className="ecin-row__label">Sueño</span>
            <div className="ecin-sleep">
              <input type="number" min={0} max={24} step={0.5} placeholder="7"
                value={form.sueno} onChange={e => setForm(f => ({...f, sueno: e.target.value}))}/>
              <span className="ecin-sleep__unit">horas anoche</span>
            </div>
          </div>
          <div className="ecin-row">
            <span className="ecin-row__label">Humor</span>
            <div className="ecin-moods">
              {MOODS.map(m => (
                <button key={m} className="ecin-mood" data-on={form.humor === m}
                  onClick={() => setForm(f => ({...f, humor:m}))}>
                  {m}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:'flex', gap:8, marginTop:4}}>
            {todayEntry && <button className="editor-toolbar__btn" onClick={() => setEditing(false)}>Cancelar</button>}
            <button className="btn-primary" style={{flex:1}} onClick={saveEntry} disabled={!form.energia}>
              Guardar check-in
            </button>
          </div>
        </div>
      )}

      {!editing && !todayEntry && (
        <button className="btn-secondary" style={{width:'100%', justifyContent:'center'}} onClick={() => setEditing(true)}>
          + Registrar energía de hoy
        </button>
      )}
    </div>
  );
}

// ANTI-PROCRASTINACIÓN SECTION
// ============================================================
function ProcraSection({ tasks, onGoToTareas, onToggleTask }) {
  const today = new Date();
  const now = today.getTime();
  // Use createdAt if available; fall back to id only if it looks like a valid timestamp (> 1e12)
  const evitadas = tasks
    .filter(t => !t.done)
    .map(t => {
      const ts = t.createdAt || (typeof t.id === 'number' && t.id > 1000000000000 ? t.id : null);
      if (!ts) return null;
      const days = Math.floor((now - ts) / (1000*60*60*24));
      return {...t, days};
    })
    .filter(Boolean)
    .filter(t => t.days >= 2)
    .sort((a,b) => b.days - a.days)
    .slice(0, 5);

  return (
    <div className="procra-section">
      <div className="procra-section__head">
        <h4 className="procra-section__title">
          <span>🔦</span> Tareas evitadas
        </h4>
        <button style={{fontSize:11, color:'var(--violet-2)', cursor:'pointer'}} onClick={onGoToTareas}>Ver todas →</button>
      </div>
      {evitadas.length === 0 ? (
        <div className="procra-empty">✅ No tenés tareas pendientes hace tiempo. Bien hecho.</div>
      ) : evitadas.map(t => (
        <div key={t.id} className="procra-item" style={{gap:8}}>
          <span className={"procra-item__days" + (t.days >= 5 ? '' : ' procra-item__days--medium')}>
            {t.days}d
          </span>
          <span className="procra-item__name" style={{flex:1}}>{t.name}</span>
          {onToggleTask && (
            <button onClick={() => { onToggleTask(t.id); playSound('tick'); }}
              style={{fontSize:10, fontWeight:600, color:'#4ade80', background:'rgba(74,222,128,0.1)', border:'1px solid rgba(74,222,128,0.2)', borderRadius:6, padding:'2px 8px', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0}}>
              ✓ Listo
            </button>
          )}
        </div>
      ))}
    </div>
  );
}

function CasaWidget({ onGoToCasa }) {
  const [items, setItems] = useState(() => loadCasa());
  const today = new Date().toISOString().slice(0,10);

  const toggle = (id) => {
    const next = items.map(it => it.id === id ? {...it, done: !it.done, lastDone: !it.done ? today : it.lastDone} : it);
    setItems(next); saveCasa(next);
  };

  const doneCnt = items.filter(i => i.done).length;
  const pct = Math.round(doneCnt / items.length * 100);

  const daysSince = (lastDone) => {
    if (!lastDone) return null;
    return Math.floor((new Date() - new Date(lastDone)) / (1000*60*60*24));
  };

  return (
    <div className="casa-widget">
      <div className="casa-widget__head">
        <h4 className="casa-widget__title">🏠 Estado de la casa</h4>
        <button style={{fontSize:11, color:'var(--violet-2)', cursor:'pointer'}} onClick={onGoToCasa}>Ver todo →</button>
      </div>
      <div className="casa-grid">
        {items.slice(0,6).map(it => {
          const ds = daysSince(it.lastDone);
          return (
            <div key={it.id} className="casa-item" data-done={it.done} onClick={() => toggle(it.id)}>
              <div className="casa-item__check">{it.done && '✓'}</div>
              <span className="casa-item__emoji">{it.emoji}</span>
              <span className="casa-item__label">{it.label}</span>

                <span className={"casa-item__days" + (ds > 5 ? ' casa-item__days--warn' : '')}>{ds}d</span>
              )}
            </div>
          );
        })}
      </div>
      <div className="casa-progress">
        <div className="casa-progress__bar">
          <div className="casa-progress__fill" style={{width: pct+'%'}}/>
        </div>
        <span>{doneCnt}/{items.length}</span>
      </div>
    </div>
  );
}

// FINANZAS — sección completa

function FinanzasRoute({ flash }) {
  const [fin, setFin] = useState(() => loadFin());
  const [newGasto, setNewGasto] = useState({ desc:'', monto:'', cat:'comida' });
  const [newMeta, setNewMeta] = useState({ emoji:'🎯', name:'', objetivo:'', actual:'0' });
  const [showMetaForm, setShowMetaForm] = useState(false);
  const [showPresForm, setShowPresForm] = useState(false);
  const [newPresupuesto, setNewPresupuesto] = useState(String(fin.presupuesto));

  const save = (next) => { setFin(next); saveFin(next); };

  const addGasto = () => {
    if (!newGasto.desc.trim() || !newGasto.monto) return;
    const gasto = {
      id: Date.now(),
      desc: newGasto.desc.trim(),
      monto: Number(newGasto.monto),
      cat: newGasto.cat,
      fecha: new Date().toISOString().slice(0,10),
      emoji: FIN_CATS.find(c=>c.id===newGasto.cat)?.emoji || '💸',
    };
    save({...fin, gastos:[...fin.gastos, gasto]});
    setNewGasto({desc:'', monto:'', cat: newGasto.cat});
    flash('Gasto registrado');
  };

  const delGasto = (id) => {
    save({...fin, gastos: fin.gastos.filter(g=>g.id!==id)});
    flash('Gasto eliminado');
  };

  const addMeta = () => {
    if (!newMeta.name.trim() || !newMeta.objetivo) return;
    const meta = { id:Date.now(), emoji:newMeta.emoji, name:newMeta.name, objetivo:Number(newMeta.objetivo), actual:Number(newMeta.actual)||0 };
    save({...fin, metas:[...fin.metas, meta]});
    setNewMeta({emoji:'🎯', name:'', objetivo:'', actual:'0'});
    setShowMetaForm(false);
    flash('Meta agregada');
  };

  const addToMeta = (id, amount) => {
    save({...fin, metas: fin.metas.map(m => m.id===id ? {...m, actual: Math.min(m.objetivo, m.actual+amount)} : m)});
  };

  const totalGastos = fin.gastos.reduce((a,g) => a+g.monto, 0);
  const restante = fin.presupuesto - totalGastos;
  const pctUsado = Math.min(100, Math.round(totalGastos / fin.presupuesto * 100));

  const gastoPorCat = FIN_CATS.map(cat => ({
    ...cat,
    total: fin.gastos.filter(g=>g.cat===cat.id).reduce((a,g)=>a+g.monto, 0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  const maxCat = Math.max(...gastoPorCat.map(c=>c.total), 1);

  const fmt = (n) => {
    if (n >= 1000000) return 'AR$ ' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return 'AR$ ' + n.toLocaleString('es-AR');
    return 'AR$ ' + n.toLocaleString('es-AR');
  };

  const restColor = restante < 0 ? 'fin-stat__value--bad' : restante < fin.presupuesto * 0.2 ? 'fin-stat__value--warn' : 'fin-stat__value--ok';
  const barColor = pctUsado > 90 ? '#f87171' : pctUsado > 70 ? '#fbbf24' : '#4ade80';

  return (
    <>
      <RouteHead title="💰 Finanzas" sub="Presupuesto · Gastos · Metas de ahorro"
        actions={
          <button className="btn-primary" onClick={() => setShowPresForm(!showPresForm)}>
            ⚙️ Presupuesto
          </button>
        }/>

      {showPresForm && (
        <div style={{background:'var(--inner)', borderRadius:'var(--r-md)', padding:'16px 20px', marginBottom:14, display:'flex', alignItems:'center', gap:12}}>
          <span style={{fontSize:13, color:'var(--text-3)'}}>Presupuesto mensual:</span>
          <input type="number" className="cfg-input" style={{width:140}} value={newPresupuesto}
            onChange={e => setNewPresupuesto(e.target.value)}
            onKeyDown={e => { if(e.key==='Enter') { save({...fin, presupuesto:Number(newPresupuesto)}); setShowPresForm(false); flash('Presupuesto actualizado'); }}}/>
          <button className="btn-primary" onClick={() => { save({...fin, presupuesto:Number(newPresupuesto)}); setShowPresForm(false); flash('Presupuesto actualizado'); }}>Guardar</button>
          <button className="editor-toolbar__btn" onClick={() => setShowPresForm(false)}>Cancelar</button>
        </div>
      )}

      {/* Stats */}
      <div className="fin-grid">
        <div className="fin-stat">
          <span className="fin-stat__label">Presupuesto</span>
          <span className="fin-stat__value">{fmt(fin.presupuesto)}</span>
          <span className="fin-stat__sub">Este mes</span>
        </div>
        <div className="fin-stat">
          <span className="fin-stat__label">Gastado</span>
          <span className="fin-stat__value">{fmt(totalGastos)}</span>
          <span className="fin-stat__sub">{pctUsado}% del presupuesto</span>
          <div className="fin-bar-wrap">
            <div className="fin-bar-fill" style={{width:pctUsado+'%', background:barColor}}/>
          </div>
        </div>
        <div className="fin-stat">
          <span className="fin-stat__label">Disponible</span>
          <span className={"fin-stat__value " + restColor}>{fmt(Math.abs(restante))}</span>
          <span className="fin-stat__sub">{restante < 0 ? '⚠️ Excediste el presupuesto' : 'Podés gastar hoy: ' + fmt(Math.max(0, Math.round(restante / Math.max(1, new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate() - new Date().getDate()))))}
          </span>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14}}>
        {/* Categorías */}
        <div className="fin-cats">
          <div className="fin-cats__head">
            <h4 className="fin-cats__title">Por categoría</h4>
          </div>
          {gastoPorCat.length === 0 ? (
            <div style={{fontSize:12, color:'var(--text-3)', textAlign:'center', padding:'16px 0'}}>Sin gastos registrados</div>
          ) : gastoPorCat.map(cat => (
            <div key={cat.id} className="fin-cat-row">
              <span className="fin-cat-row__emoji">{cat.emoji}</span>
              <span className="fin-cat-row__name">{cat.label}</span>
              <div className="fin-cat-row__bar">
                <div className="fin-cat-row__fill" style={{width: Math.round(cat.total/maxCat*100)+'%', background:cat.color}}/>
              </div>
              <span className="fin-cat-row__amount">{fmt(cat.total)}</span>
            </div>
          ))}
        </div>

        {/* Metas */}
        <div className="fin-metas" style={{margin:0}}>
          <div className="fin-metas__head">
            <h4 className="fin-metas__title">Metas de ahorro</h4>
            <button className="editor-toolbar__btn" style={{fontSize:11}} onClick={() => setShowMetaForm(!showMetaForm)}>+ Meta</button>
          </div>
          {showMetaForm && (
            <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:12, padding:'12px', background:'var(--inner-2)', borderRadius:10}}>
              <div style={{display:'flex', gap:8}}>
                <input className="cfg-input" style={{width:48}} value={newMeta.emoji} onChange={e => setNewMeta(m=>({...m,emoji:e.target.value}))} placeholder="🎯"/>
                <input className="cfg-input" style={{flex:1}} placeholder="Nombre de la meta" value={newMeta.name} onChange={e => setNewMeta(m=>({...m,name:e.target.value}))}/>
              </div>
              <div style={{display:'flex', gap:8}}>
                <input type="number" className="cfg-input" style={{flex:1}} placeholder="Objetivo $" value={newMeta.objetivo} onChange={e => setNewMeta(m=>({...m,objetivo:e.target.value}))}/>
                <input type="number" className="cfg-input" style={{flex:1}} placeholder="Ya tengo $" value={newMeta.actual} onChange={e => setNewMeta(m=>({...m,actual:e.target.value}))}/>
              </div>
              <button className="btn-primary" style={{justifyContent:'center'}} onClick={addMeta}>Guardar meta</button>
            </div>
          )}
          <div className="fin-meta-cards">
            {fin.metas.map(meta => {
              const pct = Math.min(100, Math.round(meta.actual/meta.objetivo*100));
              return (
                <div key={meta.id} className="fin-meta-card">
                  <span className="fin-meta-card__emoji">{meta.emoji}</span>
                  <span className="fin-meta-card__name">{meta.name}</span>
                  <span className="fin-meta-card__amounts">{fmt(meta.actual)} <b>/ {fmt(meta.objetivo)}</b></span>
                  <div className="fin-meta-card__bar"><div className="fin-meta-card__fill" style={{width:pct+'%'}}/></div>
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                    <span className="fin-meta-card__pct">{pct}%</span>
                    <button style={{fontSize:10, color:'var(--violet-2)', cursor:'pointer'}}
                      onClick={() => { const a = prompt('¿Cuánto agregás?'); if(a && !isNaN(Number(a))) addToMeta(meta.id, Number(a)); }}>
                      + Agregar
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Gastos */}
      <div className="fin-gastos">
        <div className="fin-gastos__head">
          <h4 className="fin-gastos__title">Gastos del mes ({fin.gastos.length})</h4>
        </div>
        <div className="fin-add-form">
          <input className="fin-add-form__desc cfg-input" placeholder="Descripción del gasto…"
            value={newGasto.desc} onChange={e => setNewGasto(g=>({...g,desc:e.target.value}))}
            onKeyDown={e => e.key==='Enter' && addGasto()}/>
          <input type="number" className="fin-add-form__amount cfg-input" placeholder="$"
            value={newGasto.monto} onChange={e => setNewGasto(g=>({...g,monto:e.target.value}))}
            onKeyDown={e => e.key==='Enter' && addGasto()}/>
          <select className="fin-add-form__cat cfg-input" value={newGasto.cat} onChange={e => setNewGasto(g=>({...g,cat:e.target.value}))}>
            {FIN_CATS.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
          </select>
          <button className="btn-primary" onClick={addGasto}><I.Plus size={14}/> Agregar</button>
        </div>
        <div style={{marginTop:12}}>
          {fin.gastos.length === 0 ? (
            <div style={{textAlign:'center', padding:'24px 0', fontSize:12, color:'var(--text-3)'}}>Sin gastos registrados este mes</div>
          ) : [...fin.gastos].reverse().map(g => (
            <div key={g.id} className="fin-gasto-row">
              <span className="fin-gasto-row__emoji">{g.emoji}</span>
              <span className="fin-gasto-row__desc">{g.desc}</span>
              <span className="fin-gasto-row__cat">{FIN_CATS.find(c=>c.id===g.cat)?.label}</span>
              <span style={{fontSize:10, color:'var(--text-4)', fontFamily:'var(--font-mono)'}}>{g.fecha}</span>
              <span className="fin-gasto-row__amount">-{fmt(g.monto)}</span>
              <button className="fin-gasto-row__del" onClick={() => delGasto(g.id)}><I.X size={12}/></button>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}


// ============================================================
// POMODORO WIDGET (C2)
// ============================================================
function PomodoroWidget() {
  const MODES = {
    foco:    { label: 'Foco', mins: 25, color: '#8b5cf6' },
    descanso:{ label: 'Descanso', mins: 5, color: '#4ade80' },
    largo:   { label: 'Descanso largo', mins: 15, color: '#60a5fa' },
  };
  const [mode, setMode] = useState('foco');
  const [running, setRunning] = useState(false);
  const [secs, setSecs] = useState(25 * 60);
  const [sessions, setSessions] = useState(0);
  const [focusMode, setFocusMode] = useState(false);
  const [focusTask, setFocusTask] = useState(() => { try { return localStorage.getItem('studyhub_pomo_task') || ''; } catch(e){ return ''; } });
  const totalSecs = MODES[mode].mins * 60;
  const color = MODES[mode].color;

  // Focus mode: overlay encima de todo, Esc para salir
  const toggleFocus = () => {
    const next = !focusMode;
    setFocusMode(next);
    if (next) document.documentElement.requestFullscreen?.().catch(() => {});
    else document.exitFullscreen?.().catch(() => {});
  };

  // Salir con Esc o cuando el timer termina
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape' && focusMode) { setFocusMode(false); document.exitFullscreen?.().catch(() => {}); }
      if (e.key === ' ' && focusMode && e.target === document.body) { e.preventDefault(); setRunning(r => !r); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [focusMode]);

  React.useEffect(() => {
    if (!running && secs === 0 && focusMode) {
      setFocusMode(false);
      document.exitFullscreen?.().catch(() => {});
    }
  }, [running, secs]);

  // Switch mode resets timer
  const switchMode = (m) => { setMode(m); setSecs(MODES[m].mins * 60); setRunning(false); };

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setSecs(s => {
        if (s <= 1) {
          setRunning(false);
          if (mode === 'foco') {
            setSessions(n => n + 1);
            addPomoMinutes(25);
            playSound('complete');
          } else {
            playSound('save');
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, mode]);

  useEffect(() => { setSecs(MODES[mode].mins * 60); }, [mode]);

  const mins = Math.floor(secs / 60);
  const remSecs = secs % 60;
  const pct = 1 - secs / totalSecs;

  // SVG ring
  const R = 88; const CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - pct);

  const totalSessions = Math.floor(sessions / 4);

  // Portal de modo foco — se monta en body, tapa todo
  const focusOverlay = focusMode ? ReactDOM.createPortal(
    <div style={{
      position:'fixed', inset:0, zIndex:99999,
      background:'var(--bg)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28
    }}>
      <div className="pomo-modes">
        {Object.entries(MODES).map(([id, m]) => (
          <button key={id} className="pomo-mode-btn" data-on={mode === id} onClick={() => switchMode(id)}>
            {m.label}
          </button>
        ))}
      </div>
      {mode === 'foco' && (
        <input
          value={focusTask}
          onChange={e => { setFocusTask(e.target.value); try { localStorage.setItem('studyhub_pomo_task', e.target.value); } catch(ex){} }}
          placeholder="¿Qué estás estudiando?"
          style={{background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, padding:'10px 18px', color:'var(--text)', fontSize:14, fontFamily:'var(--font-display)', textAlign:'center', width:300, outline:'none', transition:'border-color 200ms'}}
          onFocus={e => e.target.style.borderColor='rgba(139,92,246,0.4)'}
          onBlur={e => e.target.style.borderColor='rgba(255,255,255,0.1)'}
        />
      )}
      <div className="pomo-ring" style={{width:260, height:260}}>
        <svg width="260" height="260" viewBox="0 0 260 260">
          <circle className="pomo-ring__track" cx="130" cy="130" r="110" strokeWidth="12"/>
          <circle className="pomo-ring__fill" cx="130" cy="130" r="110" strokeWidth="12"
            stroke={color}
            strokeDasharray={2 * Math.PI * 110}
            strokeDashoffset={2 * Math.PI * 110 * (1 - pct)}/>
        </svg>
        <div className="pomo-time">
          <span style={{fontFamily:'var(--font-display)', fontSize:64, fontWeight:700, lineHeight:1, color}}>
            {String(mins).padStart(2,'0')}:{String(remSecs).padStart(2,'0')}
          </span>
          <span style={{fontSize:14, color:'var(--text-3)', marginTop:6}}>{MODES[mode].label}</span>
        </div>
      </div>
      <div style={{display:'flex', gap:12}}>
        <button className="pomo-btn" onClick={() => { setSecs(totalSecs); setRunning(false); }}>↺</button>
        <button className="pomo-btn pomo-btn--primary" style={{padding:'12px 40px', fontSize:16}}
          onClick={() => setRunning(r => !r)}>
          {running ? '⏸ Pausar' : '▶ Continuar'}
        </button>
      </div>
      <div className="pomo-sessions">
        {Array.from({length:4}, (_,i) => (
          <div key={i} className="pomo-dot" data-done={i < sessions % 4}/>
        ))}
        {sessions > 0 && <span style={{fontSize:12, color:'var(--text-3)', marginLeft:8}}>{sessions} sesiones hoy</span>}
      </div>
      <button onClick={toggleFocus}
        style={{marginTop:8, padding:'10px 28px', fontSize:13, fontWeight:600,
          color:'var(--text-2)', cursor:'pointer', background:'var(--inner)',
          border:'1.5px solid var(--line-2)', borderRadius:10, transition:'all 150ms'}}
        onMouseEnter={e=>{e.currentTarget.style.background='var(--card-2)';e.currentTarget.style.color='var(--text)';}}
        onMouseLeave={e=>{e.currentTarget.style.background='var(--inner)';e.currentTarget.style.color='var(--text-2)';}}>
        ✕ Salir del modo foco <span style={{opacity:0.45, fontSize:11, marginLeft:6}}>Esc</span>
      </button>
    </div>,
    document.body
  ) : null;

  const timerPanel = (
    <div className="pomo-widget" style={{justifyContent:'center', gap:24, padding:'40px 32px'}}>
        {/* Mode selector */}
        <div className="pomo-modes">
          {Object.entries(MODES).map(([id, m]) => (
            <button key={id} className="pomo-mode-btn" data-on={mode === id} onClick={() => switchMode(id)}>
              {m.label}
            </button>
          ))}
        </div>

        {/* Ring */}
        <div className="pomo-ring">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle className="pomo-ring__track" cx="100" cy="100" r={R} strokeWidth="10"/>
            <circle className="pomo-ring__fill" cx="100" cy="100" r={R} strokeWidth="10"
              stroke={color} strokeDasharray={CIRC} strokeDashoffset={offset}/>
          </svg>
          <div className="pomo-time">
            <span className="pomo-time__min" style={{color}}>{String(mins).padStart(2,'0')}:{String(remSecs).padStart(2,'0')}</span>
            <span className="pomo-time__label">{MODES[mode].label}</span>
          </div>
        </div>

        {/* Controls */}
        <div className="pomo-controls">
          <button className="pomo-btn" onClick={() => { setSecs(totalSecs); setRunning(false); }} title="Reiniciar">↺</button>
          <button className="pomo-btn pomo-btn--primary" style={{padding:'10px 32px', fontSize:15}}
            onClick={() => setRunning(r => !r)}>
            {running ? '⏸ Pausar' : secs === totalSecs ? '▶ Iniciar' : '▶ Continuar'}
          </button>
        </div>

        {/* Focus button */}
        <button onClick={toggleFocus} style={{
          display:'flex', alignItems:'center', gap:8, padding:'9px 20px',
          borderRadius:10, border:`1.5px solid ${focusMode ? color : 'var(--line-2)'}`,
          background: focusMode ? color + '18' : 'transparent',
          color: focusMode ? color : 'var(--text-3)',
          fontSize:13, fontWeight:600, cursor:'pointer', transition:'all 200ms'
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          {focusMode ? 'Salir del foco' : 'Modo foco — pantalla completa'}
        </button>

        {/* Session dots */}
        <div className="pomo-sessions">
          {Array.from({length:4}, (_,i) => (
            <div key={i} className="pomo-dot" data-done={i < sessions % 4}/>
          ))}
          {sessions > 0 && <span style={{fontSize:11, color:'var(--text-3)', marginLeft:6}}>{sessions} sesión{sessions!==1?'es':''} hoy</span>}
        </div>
      </div>
  );

  return (
    <>
    {focusOverlay}
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:18, flex:1}}>
      {timerPanel}

      {/* RIGHT — info y tips (oculto en modo foco, pero el overlay ya cubre todo) */}
      {!focusMode && <div style={{display:'flex', flexDirection:'column', gap:14}}>
        {/* Stats */}
        <div className="r-panel" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
          <div style={{textAlign:'center', padding:'16px 0'}}>
            <div style={{fontSize:32, fontWeight:800, color:'var(--violet)'}}>{sessions}</div>
            <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>Sesiones hoy</div>
          </div>
          <div style={{textAlign:'center', padding:'16px 0'}}>
            <div style={{fontSize:32, fontWeight:800, color:'var(--violet)'}}>{totalSessions}</div>
            <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>Ciclos completos</div>
          </div>
          <div style={{textAlign:'center', padding:'16px 0'}}>
            <div style={{fontSize:32, fontWeight:800, color:'#4ade80'}}>{sessions * 25}</div>
            <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>Min de foco</div>
          </div>
          <div style={{textAlign:'center', padding:'16px 0'}}>
            <div style={{fontSize:32, fontWeight:800, color:'#60a5fa'}}>{Math.round(sessions * 25 / 60 * 10) / 10}h</div>
            <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>Horas totales</div>
          </div>
        </div>

        {/* Técnica Pomodoro */}
        <div className="r-panel" style={{flex:1}}>
          <div style={{fontSize:13, fontWeight:700, marginBottom:14, color:'var(--text-2)'}}>Técnica Pomodoro</div>
          {[
            { num:'1', text:'Trabajá 25 min sin interrupciones (Foco)', color:'var(--violet)' },
            { num:'2', text:'Tomá 5 min de descanso', color:'#4ade80' },
            { num:'3', text:'Después de 4 sesiones, descansá 15 min', color:'#60a5fa' },
            { num:'4', text:'Repetí el ciclo para máxima productividad', color:'#fbbf24' },
          ].map(s => (
            <div key={s.num} style={{display:'flex', gap:12, alignItems:'flex-start', marginBottom:12}}>
              <div style={{width:22, height:22, borderRadius:'50%', background:s.color+'22',
                border:`1.5px solid ${s.color}`, display:'grid', placeItems:'center', flexShrink:0,
                fontSize:11, fontWeight:700, color:s.color}}>{s.num}</div>
              <span style={{fontSize:13, color:'var(--text-2)', lineHeight:1.5, paddingTop:2}}>{s.text}</span>
            </div>
          ))}

          <div style={{marginTop:16, padding:'12px 14px', background:'var(--inner-2)', borderRadius:10,
            fontSize:12, color:'var(--text-3)', lineHeight:1.6}}>
            💡 <strong style={{color:'var(--text-2)'}}>Tip:</strong> Silenciá las notificaciones durante el foco para máxima concentración.
          </div>
        </div>
      </div>}
    </div>
    </>
  );
}

// OCIO ROUTE (C1)
// ============================================================
function OcioRoute({ flash }) {
  const [items, setItems] = useState(() => loadOcio());
  const [filterType, setFilterType] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [modal, setModal] = useState(null); // null | 'new' | item
  const [form, setForm] = useState({ emoji:'🎬', title:'', type:'serie', status:'pendiente', score:0, note:'' });

  const save = (next) => { setItems(next); saveOcio(next); };

  const saveItem = () => {
    if (!form.title.trim()) return;
    if (modal === 'new') {
      save([...items, {...form, id: Date.now()}]);
      flash('Agregado al catálogo');
    } else {
      save(items.map(i => i.id === modal.id ? {...form, id: modal.id} : i));
      flash('Actualizado');
    }
    setModal(null);
  };

function CalCountdown({ subjectName }) {
  const calEvs = React.useMemo(() => {
    try { const r = AppStorage.getItem('studyhub_v3_calendar'); return r ? JSON.parse(r) : []; }
    catch(e) { return []; }
  }, []);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);
  const sname = subjectName.toLowerCase().split(' ')[0];
  const next = calEvs
    .filter(ev => ev.date >= todayStr && ev.title.toLowerCase().includes(sname))
    .sort((a,b) => a.date.localeCompare(b.date))[0];
  if (!next) return null;
  const daysLeft = Math.ceil((new Date(next.date) - today) / 86400000);
  const urgentColor = daysLeft <= 3 ? '#f87171' : daysLeft <= 7 ? '#fbbf24' : '#4ade80';
  const label = daysLeft === 0 ? 'Hoy!' : 'Faltan ' + daysLeft + ' dia' + (daysLeft !== 1 ? 's' : '');
  return (
    <div style={{marginTop:8, background:'rgba(139,92,246,0.08)', border:'1px solid rgba(139,92,246,0.2)', borderRadius:8, padding:'6px 10px', fontSize:11, color:'var(--violet-2)', display:'flex', alignItems:'center', gap:6}}>
      <span>📅</span>
      <span style={{color:urgentColor, fontWeight:700}}>{label}</span>
      <span>— {next.title}</span>
    </div>
  );
}

  const [newTask, setNewTask] = useState('');

    if (!newTask.trim()) return;
    set('tasks', [...(form.tasks||[]), {id:Date.now(), text:newTask.trim(), done:false}]);
    setNewTask('');

  const delTask   = (id) => set('tasks', (form.tasks||[]).filter(t => t.id!==id));

    <Modal title={mision ? 'Editar misión' : 'Nueva misión'} onClose={onClose} width={500}>

  const save = (m) => {
    const next = missions.find(x => x.id === m.id)
      ? missions.map(x => x.id === m.id ? m : x)
      : [...missions, { ...m, id: Date.now() }];
    setMissions(next); saveMissions(next); flash('Misión guardada');
  };
  const del = (id) => { const next = missions.filter(x => x.id !== id); setMissions(next); saveMissions(next); flash('Misión eliminada'); };
  
  const toggleDone = (id) => {
    const m = missions.find(x => x.id === id);
    if (m && !m.done) playSound('complete');
    const next = missions.map(x => x.id === id ? {...x, done:!x.done} : x);
    setMissions(next); saveMissions(next);
  };
  const toggleTask = (mId, tId) => {
    playSound('tick');
    const next = missions.map(m => {
      if (m.id !== mId) return m;
      const tasks = (m.tasks||[]).map(t => t.id===tId ? {...t, done:!t.done} : t);
      const allDone = tasks.length > 0 && tasks.every(t => t.done);
      if (allDone && !m.done) {
        setTimeout(() => { playSound('complete'); flash('¡Misión completada! 🎉'); }, 300);
        return {...m, tasks, done: true};

      return {...m, tasks};

    setMissions(next); saveMissions(next);

  const getPct = (m) => (m.tasks||[]).length ? Math.round((m.tasks||[]).filter(t=>t.done).length / (m.tasks||[]).length * 100) : (m.done ? 100 : 0);

          <span style={{fontFamily:'var(--font-mono)', fontSize:22, fontWeight:700, color:'#fbbf24'}}>+{pendingXp}</span>
        </div>
        <div style={{flex:1, minWidth:120, background:'rgba(52,211,153,0.06)', border:'1px solid rgba(52,211,153,0.18)', borderRadius:12, padding:'12px 16px', display:'flex', flexDirection:'column', gap:2}}>
          <span style={{fontSize:11, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.07em', fontWeight:600}}>Completadas</span>
          <span style={{fontFamily:'var(--font-mono)', fontSize:22, fontWeight:700, color:'#34d399'}}>{completedList.length} / {missions.length}</span>

          <button className="btn-primary" onClick={() => setModal({type:'new'})}><I.Plus size={14}/> Crear misión</button>

      {groups.map(priority => {
        const group = missions.filter(m => !m.done && (m.priority||'medium') === priority);

        return (

function CalendarioRoute({ flash }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [events, setEvents] = useState(() => loadCalEvents());
  const [modal, setModal] = useState(null);

  const saveAndSet = (next) => { setEvents(next); saveCalEvents(next); };
  const addEvent = (ev) => { saveAndSet(events.find(x=>x.id===ev.id) ? events.map(x=>x.id===ev.id?ev:x) : [...events,{...ev,id:Date.now()}]); flash('Evento guardado'); };
  const delEvent = (id) => { saveAndSet(events.filter(x=>x.id!==id)); flash('Evento eliminado'); };

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const goToday = () => { setYear(now.getFullYear()); setMonth(now.getMonth()); };

  const firstDay = new Date(year, month, 1).getDay();
  const pad = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  const upcomingEvents = events
    .filter(e => e.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0,8);

  const getEventColor = (colorId) => EVENT_COLORS.find(c=>c.id===colorId)?.css || EVENT_COLORS[0].css;

    <>
      <RouteHead title={`${MONTH_NAMES[month]} ${year}`} sub="Tu agenda del mes"

          <button className="dash-mini-btn" onClick={nextMonth} title="Mes siguiente">›</button>
          <button className="editor-toolbar__btn" onClick={goToday} style={{opacity: isCurrentMonth ? 0.5 : 1}} title="Ir al mes actual">Hoy</button>

            📥 Importar .ics
            <input type="file" accept=".ics,text/calendar" style={{display:'none'}} onChange={(e) => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = (ev) => {
                const parsed = parseICS(ev.target.result);
                if (parsed.length === 0) { flash('No se encontraron eventos en el archivo'); return; }
                const merged = [...events, ...parsed.filter(p => !events.find(ex => ex.title === p.title && ex.date === p.date))];
                saveAndSet(merged);
                flash(`✅ ${parsed.length} evento${parsed.length!==1?'s':''} importado${parsed.length!==1?'s':''}`);
              };
              reader.readAsText(file);
              e.target.value = '';
            }}/>
          </label>
          <button className="editor-toolbar__btn" title="Exportar .ics" onClick={() => {
            const ics = exportToICS(events);
            const blob = new Blob([ics], {type:'text/calendar'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'studyhub-calendario.ics'; a.click();
            URL.revokeObjectURL(url);
            flash('Calendario exportado como .ics');
          }}>📤 Exportar</button>
          <button className="btn-primary" onClick={() => setModal({type:'new', date: null})}><I.Plus size={14}/> Evento</button>
        </>}/>
      <div className="widget-grid">
        <div className="widget widget--s8">
          <div className="panel" style={{overflowX:'auto'}}>
            <div className="cal-head">
              {['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => <span key={d}>{d}</span>)}
            </div>
            <div className="cal-grid" style={{minWidth:380}}>
              {Array.from({length: pad}, (_,i) => (
                <div key={'pad'+i} className="cal-cell cal-cell--out"/>
              ))}
              {Array.from({length: daysInMonth}, (_,i) => {
                const d = i+1;
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === todayStr;
                const dayEvs = events.filter(e => e.date === dateStr);
                return (
                  <div key={d}
                    className={"cal-cell" + (isToday?' cal-cell--today':'') + (dayEvs.length?' cal-cell--has':'')}
                    title={dayEvs.map(e=>e.title).join(', ')}
                    onClick={() => setModal({type:'day', day:d, date:dateStr})}>
                    <span>{d}</span>

                const [y,m,d] = ev.date.split('-');
                return (
                  <div key={ev.id} style={{display:'flex', gap:12, padding:'10px 0', borderBottom:'1px solid var(--line)', cursor:'pointer'}}

                      <div style={{fontSize:10, color:'var(--text-3)'}}>{MONTH_NAMES[Number(m)-1].slice(0,3).toUpperCase()}</div>
                    </div>
                    <div style={{flex:1, minWidth:0, display:'flex', alignItems:'center'}}>
                      <div>
                        <span style={{fontSize:13, fontWeight:500}}>{ev.title}</span>
                        {ev.desc && <div style={{fontSize:11, color:'var(--text-3)', marginTop:2}}>{ev.desc}</div>}
                      </div>
                    </div>
                    <button className="dash-mini-btn dash-mini-btn--danger" onClick={e=>{e.stopPropagation();delEvent(ev.id)}} title="Eliminar"><I.X size={12}/></button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {modal?.type === 'day' && (
        <DayModal
          day={modal.day} year={year} month={month} events={events}
          onNewEvent={(date) => setModal({type:'new', date})}
          onEditEvent={(ev) => setModal({type:'edit', event:ev})}
          onDeleteEvent={(id) => { delEvent(id); setModal(null); }}
          onClose={() => setModal(null)}
        />
      )}
      {modal?.type === 'new'  && <EventModal defaultDate={modal.date} onSave={addEvent} onClose={() => setModal(null)}/>}
      {modal?.type === 'edit' && <EventModal event={modal.event} onSave={addEvent} onClose={() => setModal(null)}/>}
    </>
  );
}

// ─── SIMPLE MARKDOWN RENDERER ────────────────────────────────
function MdText({ src }) {
  if (!src) return null;
  const lines = src.split('\n');
  const out = [];
  let ulItems = [], olItems = [];
  const flushUl = () => { if (ulItems.length) { out.push(React.createElement('ul', {key:'ul'+out.length,style:{margin:'6px 0 6px 18px',padding:0}}, ulItems)); ulItems = []; } };
  const flushOl = () => { if (olItems.length) { out.push(React.createElement('ol', {key:'ol'+out.length,style:{margin:'6px 0 6px 18px',padding:0}}, olItems)); olItems = []; } };
  const inline = (text, key) => {
    const parts = []; let rest = text; let k = 0;
    const push = (type, content) => parts.push(React.createElement(type, {key: key+'-'+k++}, content));
    const pushText = (t) => { if (t) parts.push(t); };
    while (rest.length) {
      const bb = rest.indexOf('**');
      const b = rest.indexOf('*');
      const c = rest.indexOf('`');
      const candidates = [[bb, '**'], [b=== bb ? -1 : b, '*'], [c, '`']].filter(x=>x[0]>=0).sort((a,z)=>a[0]-z[0]);
      if (!candidates.length) { pushText(rest); break; }
      const [pos, tok] = candidates[0];
      const end = rest.indexOf(tok, pos + tok.length);
      if (end === -1) { pushText(rest); break; }
      pushText(rest.slice(0, pos));
      const inner = rest.slice(pos + tok.length, end);
      if (tok === '**') push('strong', inner);
      else if (tok === '*') push('em', inner);
      else push('code', inner);
      rest = rest.slice(end + tok.length);
    }
    return parts.length === 1 ? parts[0] : React.createElement(React.Fragment, {key}, parts);
  };
  lines.forEach((line, i) => {
    if (/^[-*] /.test(line)) {
      flushOl();
      ulItems.push(React.createElement('li', {key:i, style:{fontSize:13,lineHeight:1.6,marginBottom:2}}, inline(line.slice(2), 'li'+i)));
    } else if (/^\d+\. /.test(line)) {
      flushUl();
      olItems.push(React.createElement('li', {key:i, style:{fontSize:13,lineHeight:1.6,marginBottom:2}}, inline(line.replace(/^\d+\. /,''), 'li'+i)));
    } else if (/^### /.test(line)) {
      flushUl(); flushOl();
      out.push(React.createElement('div', {key:i, style:{fontSize:13,fontWeight:700,color:'var(--violet-2)',margin:'10px 0 4px'}}, line.slice(4)));
    } else if (/^## /.test(line)) {
      flushUl(); flushOl();
      out.push(React.createElement('div', {key:i, style:{fontSize:14,fontWeight:700,margin:'12px 0 4px'}}, line.slice(3)));
    } else if (line.trim() === '') {
      flushUl(); flushOl();
      out.push(React.createElement('div', {key:i, style:{height:6}}));
    } else {
      flushUl(); flushOl();
      out.push(React.createElement('div', {key:i, style:{fontSize:13,lineHeight:1.65}}, inline(line, 'p'+i)));
    }
  });
  flushUl(); flushOl();
  return React.createElement('div', {style:{color:'var(--text)'}}, out);
}

function ChatRoute({ tasks, energyToday }) {
  const [msgs, setMsgs] = useState(CHAT_INITIAL);
  const [draft, setDraft] = useState('');
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

  const QUICK_PROMPTS = [
    { label:'🗓 Plan del día', text:'Planificá mi día con mis tareas pendientes y dame horarios sugeridos' },
    { label:'⚡ Priorizar', text:'Ayudame a priorizar mis tareas de hoy usando la matriz de Eisenhower' },
    { label:'😴 Estoy cansado', text:'Tengo poca energía hoy, qué debería hacer primero y cómo arrancar' },
    { label:'📊 Resumen', text:'Haceme un resumen de lo que tengo pendiente y qué va a vencer próximamente' },
    { label:'🎯 Técnica Pomodoro', text:'Armame un plan de trabajo con Pomodoros para las tareas urgentes de hoy' },
    { label:'📚 Parcial mañana', text:'Tengo un parcial mañana, dame una estrategia de repaso para las últimas horas' },
  ];

  const buildContext = (userText) => {
    const pending = (tasks || []).filter(t=>!t.done);
    const high = pending.filter(t=>t.priority==='high');
    const ctx = [
      `Soy un asistente de productividad universitaria llamado EstudioIA.`,
      `El usuario tiene ${pending.length} tareas pendientes (${high.length} urgentes).`,
      high.length ? `Tareas urgentes: ${high.slice(0,3).map(t=>t.name).join(', ')}.` : '',
      energyToday ? `Hoy su energía es ${energyToday.energia}/5, durmió ${energyToday.sueno}h, humor: ${energyToday.humor}.` : 'No registró energía hoy.',
      `Hora actual: ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')}.`,
      `Respondé en español, sé directo y práctico. Máximo 3 párrafos.`,
    ].filter(Boolean).join(' ');
    return ctx + '\n\nPregunta: ' + userText;
  };

  const send = async (textOverride) => {
    const text = (textOverride || draft).trim();
    if (!text) return;
    const id = Date.now();
    setMsgs(m => [...m, { id, from: 'Vos', time: 'ahora', body: text, kind: 'me' }]);
    setDraft('');
    setMsgs(m => [...m, { id: id+1, from: 'EstudioIA', time: '…', body: '…', kind: 'ai', loading: true }]);

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: buildContext(text) }],
        })
      });
      const data = await resp.json();
      const reply = data?.content?.[0]?.text || 'No pude responder. Intentá de nuevo.';
      setMsgs(m => m.map(msg => msg.id === id+1 ? {...msg, body: reply, time: 'ahora', loading: false} : msg));
    } catch(e) {
      setMsgs(m => m.map(msg => msg.id === id+1 ? {...msg, body: 'Error de conexión. Verificá tu acceso a la API.', time: 'ahora', loading: false} : msg));
    }
  };

  return (
    <>
      <RouteHead title="Chat IA" sub="Planificá tu día, priorizá tareas, pedí ayuda."/>
      <div className="r-panel" style={{display:'flex', flexDirection:'column', minHeight:460}}>
        {/* Quick prompts */}
        <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:12}}>
          {QUICK_PROMPTS.map(p => (
            <button key={p.label}
              style={{padding:'5px 11px', background:'var(--inner-2)', borderRadius:8, fontSize:12, fontWeight:500, cursor:'pointer', border:'1px solid var(--line)', color:'var(--text-2)', transition:'all 100ms'}}
              onMouseEnter={e => e.currentTarget.style.borderColor='var(--violet)'}
              onMouseLeave={e => e.currentTarget.style.borderColor='var(--line)'}
              onClick={() => send(p.text)}>
              {p.label}
            </button>
          ))}
        </div>
        <div style={{flex:1, maxHeight: window.innerWidth < 768 ? 'calc(100dvh - 280px)' : 460, overflowY:'auto', paddingBottom:8}}>
          {msgs.map(m => (
            <div key={m.id} className={"chat-msg chat-msg--" + m.kind}>
              <div className="chat-msg__av">{m.kind === 'me' ? (() => { try { return JSON.parse(localStorage.getItem('studyhub-config')||'{}').initial || 'V'; } catch(e){ return 'V'; } })() : '✨'}</div>
              <div className="chat-msg__body">
                <div className="chat-msg__from">{m.from} <small>{m.time}</small></div>
                {m.loading
                  ? <span style={{opacity:0.5, fontStyle:'italic'}}>Pensando…</span>
                  : m.kind === 'ai' ? <MdText src={m.body}/> : m.body
                }
              </div>
            </div>
          ))}
          <div ref={bottomRef}/>
        </div>
        <div className="chat-input">
          <input placeholder="Preguntá, planificá, pedí ayuda…" value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && send()}/>
          <button onClick={() => send()} aria-label="Enviar"><I.ArrowUp size={16}/></button>
        </div>
      </div>
    </>
  );
}

const DIARY_ENTRIES_KEY = 'studyhub_v3_diary_entries';
const loadDiaryEntries = () => { try { const r = AppStorage.getItem(DIARY_ENTRIES_KEY); if(r) return JSON.parse(r); } catch(e){} return {}; };
const saveDiaryEntries = (e) => { try { AppStorage.setItem(DIARY_ENTRIES_KEY, JSON.stringify(e)); } catch(e){} };

function DiarioRoute({ flash }) {
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const [entries, setEntries] = useState(() => loadDiaryEntries());
  const [selectedDate, setSelectedDate] = useState(todayKey);
  const [showHistory, setShowHistory] = useState(false);

  // draft: persisted in sessionStorage to survive accidental refreshes
  const DRAFT_KEY = 'studyhub_diary_draft';
  const [draft, setDraft] = useState(() => { try { return sessionStorage.getItem(DRAFT_KEY) || ''; } catch(e){ return ''; } });
  const updateDraft = (v) => { setDraft(v); try { sessionStorage.setItem(DRAFT_KEY, v); } catch(e){} };
  const entryDates = Object.keys(entries).filter(k => entries[k].trim()).sort().reverse();
  const wordCount = draft.trim().split(/\s+/).filter(Boolean).length;

  const formatDateLabel = (dateKey) => {
    const [y,m,d] = dateKey.split('-');
    return `${Number(d)} de ${MONTH_NAMES[Number(m)-1]} ${y}`;
  };

  // When clicking history, load that entry into draft for reading (read-only view)
  const [viewingEntry, setViewingEntry] = useState(null); // null = writing today, string = viewing past entry

  const saveEntry = () => {
    if (!draft.trim()) { flash('Escribe algo primero'); return; }
    // Save with current datetime as key to allow multiple entries per day
    const key = `${todayKey}_${Date.now()}`;
    const displayKey = todayKey;
    // Use todayKey but append index if already exists
    let saveKey = todayKey;
    if (entries[saveKey]) {
      // Append to existing entry with separator
      const combined = entries[saveKey] + '\n\n--- Nueva entrada ---\n\n' + draft.trim();
      const next = { ...entries, [saveKey]: combined };
      setEntries(next); saveDiaryEntries(next);
    } else {
      const next = { ...entries, [saveKey]: draft.trim() };
      setEntries(next); saveDiaryEntries(next);
    }
    setDraft(''); try { sessionStorage.removeItem('studyhub_diary_draft'); } catch(e){}
    playSound('save');
    flash('Entrada guardada en el historial ✓');
  };

  const deleteEntry = (dk) => {
    const next = { ...entries };
    delete next[dk];
    setEntries(next); saveDiaryEntries(next);
    if (viewingEntry === dk) setViewingEntry(null);
    flash('Entrada eliminada');
  };

  return (
    <>
      <RouteHead title="Diario"
        sub={viewingEntry ? 'Leyendo: ' + formatDateLabel(viewingEntry) : 'Hoy · ' + formatDateLabel(todayKey)}
        actions={<>
          <span style={{fontFamily:'var(--font-mono)', fontSize:11, color: wordCount > 50 ? 'var(--violet-2)' : 'var(--text-3)', transition:'color 300ms'}}>
            {wordCount} {wordCount === 1 ? 'palabra' : 'palabras'}
            {draft && <span style={{color:'rgba(139,92,246,0.5)', marginLeft:6}}>· borrador guardado</span>}
          </span>
          <button className="editor-toolbar__btn" onClick={() => { setShowHistory(!showHistory); setViewingEntry(null); }}>
            <I.Book size={13}/> Historial ({entryDates.length})
          </button>
          {viewingEntry && (
            <button className="editor-toolbar__btn" onClick={() => setViewingEntry(null)}>← Nueva entrada</button>
          )}
        </>}/>
      <div className="widget-grid">
        <div className={`widget widget--s${showHistory ? '8' : '12'}`}>
          <div className="r-panel">
            {viewingEntry ? (
              <>
                <div style={{fontSize:12, fontWeight:600, color:'var(--violet-2)', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.08em'}}>{formatDateLabel(viewingEntry)}</div>
                <div style={{whiteSpace:'pre-wrap', fontSize:14, lineHeight:1.75, color:'var(--text-2)', minHeight:300}}>{entries[viewingEntry]}</div>
                <div style={{display:'flex', justifyContent:'space-between', marginTop:16}}>
                  <button className="dash-mini-btn dash-mini-btn--danger" onClick={() => { if(confirm('¿Eliminar esta entrada?')) deleteEntry(viewingEntry); }}>
                    <I.X size={13}/> Eliminar entrada
                  </button>
                  <button className="btn-primary" onClick={() => setViewingEntry(null)}>← Volver a escribir</button>
                </div>
              </>
            ) : (
              <>
                <textarea
                  className="diary-textarea"
                  style={{minHeight: 320}}
                  placeholder={`${formatDateLabel(todayKey)}\n\n¿Cómo fue el día? ¿Qué pensaste mientras estudiabas? Anotá lo que sea…\n\nAl guardar, esto se archiva en el historial y el diario queda en blanco.`}
                  value={draft}
                  onChange={(e) => updateDraft(e.target.value)}
                  autoFocus
                />
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:12}}>
                  <span style={{fontSize:11, color:'var(--text-3)'}}>Al guardar se archiva y el diario queda en blanco.</span>
                  <button className="btn-primary" onClick={saveEntry} disabled={!draft.trim()}>
                    Guardar y archivar
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
        {showHistory && (
          <div className="widget widget--s4">
            <div className="panel" style={{maxHeight:480, overflowY:'auto'}}>
              <h3 className="panel__title panel__title--left" style={{marginBottom:14}}>Historial</h3>
              {entryDates.length === 0 && <div style={{fontSize:12, color:'var(--text-3)', textAlign:'center', padding:'20px 0'}}>Sin entradas todavía.</div>}
              <div style={{display:'flex', flexDirection:'column', gap:6}}>
                {entryDates.map(dk => (
                  <div key={dk}
                    onClick={() => setViewingEntry(dk)}
                    style={{
                      padding:'10px 12px', borderRadius:10, cursor:'pointer',
                      background: dk === viewingEntry ? 'rgba(139,92,246,0.15)' : 'var(--inner)',
                      borderLeft: dk === viewingEntry ? '3px solid var(--violet)' : '3px solid transparent',
                      transition:'all 160ms'
                    }}>
                    <div style={{fontSize:13, fontWeight:500, color: dk === viewingEntry ? 'var(--violet-2)' : 'var(--text)'}}>{formatDateLabel(dk)}</div>
                    <div style={{fontSize:11, color:'var(--text-3)', marginTop:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      {entries[dk].slice(0,60)}{entries[dk].length > 60 ? '…' : ''}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

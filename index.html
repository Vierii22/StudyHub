function CocinaRoute({ flash }) {
  const [kitchen,  setKitchenS]  = useState(() => loadKitchen());
  const [almacen,  setAlmacenS]  = useState(() => loadAlmacen());
  const [freezer,  setFreezerS]  = useState(() => loadFreezer());
  const [groceries, setGroceries] = useState(() => loadGroceries());
  const [modal, setModal]         = useState(null);
  const [newGrocery, setNewGrocery] = useState('');
  const [addGrocerySection, setAddGrocerySection] = useState('heladera');

  const saveItem = (item) => {
    const sec = item.section || 'heladera';
    if (sec === 'heladera') {
      const next = kitchen.find(x=>x.id===item.id) ? kitchen.map(x=>x.id===item.id?item:x) : [...kitchen,{...item,id:Date.now()}];
      setKitchenS(next); saveKitchen(next);
    } else if (sec === 'almacen') {
      const next = almacen.find(x=>x.id===item.id) ? almacen.map(x=>x.id===item.id?item:x) : [...almacen,{...item,id:Date.now()}];
      setAlmacenS(next); saveAlmacen(next);
    } else {
      const next = freezer.find(x=>x.id===item.id) ? freezer.map(x=>x.id===item.id?item:x) : [...freezer,{...item,id:Date.now()}];
      setFreezerS(next); saveFreezer(next);
    }
    flash('Item guardado');
  };
  const delItem = (id, section) => {
    if (section === 'heladera') { const next = kitchen.filter(x=>x.id!==id); setKitchenS(next); saveKitchen(next); }
    else if (section === 'almacen') { const next = almacen.filter(x=>x.id!==id); setAlmacenS(next); saveAlmacen(next); }
    else { const next = freezer.filter(x=>x.id!==id); setFreezerS(next); saveFreezer(next); }
    flash('Item eliminado');
  };

  // Check grocery → adds to selected section
  const checkGrocery = (id) => {
    const it = groceries.find(x=>x.id===id);
    if (!it) return;
    const newItem = { id:Date.now(), title:it.title, sub:'Comprado hoy', tag:'COMPRA', warn:false, section: addGrocerySection };
    saveItem(newItem);
    // Remove from groceries
    const next = groceries.filter(x=>x.id!==id);
    setGroceries(next); saveGroceries(next);
    flash(`"${it.title}" agregado a ${addGrocerySection}`);
  };

  const addGrocery = () => {
    if (!newGrocery.trim()) return;
    const next = [...groceries, {id:Date.now(), title:newGrocery.trim(), done:false}];
    setGroceries(next); saveGroceries(next); setNewGrocery('');
  };
  const delGrocery = (id) => { const next = groceries.filter(x=>x.id!==id); setGroceries(next); saveGroceries(next); };

  // Drag item between sections
  const moveItemToSection = (item, targetSection) => {
    if (item.fromSection === targetSection) return;
    // Remove from source
    if (item.fromSection === 'heladera') { const n = kitchen.filter(x=>x.id!==item.id); setKitchenS(n); saveKitchen(n); }
    else if (item.fromSection === 'almacen') { const n = almacen.filter(x=>x.id!==item.id); setAlmacenS(n); saveAlmacen(n); }
    else if (item.fromSection === 'freezer') { const n = freezer.filter(x=>x.id!==item.id); setFreezerS(n); saveFreezer(n); }
    // Add to target
    const moved = {...item, section: targetSection, id: item.id};
    if (targetSection === 'heladera') { const n = [...kitchen, moved]; setKitchenS(n); saveKitchen(n); }
    else if (targetSection === 'almacen') { const n = [...almacen, moved]; setAlmacenS(n); saveAlmacen(n); }
    else if (targetSection === 'freezer') { const n = [...freezer, moved]; setFreezerS(n); saveFreezer(n); }
    flash(`"${item.title}" movido a ${targetSection}`);
  };

  const [cocinaTab, setCocinaTab] = useState('almacen');
  const [recipes, setRecipes] = useState(() => loadRecipes());
  const [recipeModal, setRecipeModal] = useState(null); // null | 'new' | recipe object
  const [newRecipe, setNewRecipe] = useState({ emoji:'🍽️', name:'', tiempo:15, costo:'bajo', ingredientes:'', pasos:'', tags:'' });

  const saveRecipe = () => {
    if (!newRecipe.name.trim()) return;
    const r = {
      id: Date.now(),
      emoji: newRecipe.emoji,
      name: newRecipe.name,
      tiempo: Number(newRecipe.tiempo) || 15,
      costo: newRecipe.costo,
      ingredientes: newRecipe.ingredientes.split(',').map(s=>s.trim()).filter(Boolean),
      pasos: newRecipe.pasos,
      tags: newRecipe.tags.split(',').map(s=>s.trim()).filter(Boolean),
    };
    const next = [...recipes, r];
    setRecipes(next); saveRecipes(next);
    setRecipeModal(null);
    setNewRecipe({ emoji:'🍽️', name:'', tiempo:15, costo:'bajo', ingredientes:'', pasos:'', tags:'' });
    flash('Receta guardada');
  };

  const delRecipe = (id) => {
    const next = recipes.filter(r=>r.id!==id);
    setRecipes(next); saveRecipes(next);
    flash('Receta eliminada');
  };

  // Smart suggestion: recipes whose ingredients match heladera/almacen items
  const allIngredients = [...kitchen.map(i=>i.title.toLowerCase()), ...almacen.map(i=>i.title.toLowerCase())];
  const suggested = recipes.filter(r =>
    r.ingredientes.some(ing => allIngredients.some(ai => ai.includes(ing.toLowerCase()) || ing.toLowerCase().includes(ai)))
  );

  return (
    <>
      <RouteHead title="Cocina" sub="Heladera · Almacén · Freezer · Recetas"
        actions={
          cocinaTab === 'almacen'
            ? <button className="btn-primary" onClick={() => setModal({type:'new', section:'heladera'})}><I.Plus size={14}/> Agregar item</button>
            : <button className="btn-primary" onClick={() => setRecipeModal('new')}><I.Plus size={14}/> Nueva receta</button>
        }/>
      <div style={{display:'flex', gap:6, marginBottom:14}}>
        {[['almacen','🧊 Almacenamiento'],['recetas','📖 Recetas']].map(([id,label]) => (
          <button key={id} onClick={() => setCocinaTab(id)}
            style={{padding:'8px 16px', borderRadius:10, border:'1.5px solid', fontSize:12, fontWeight:600, cursor:'pointer',
              borderColor: cocinaTab===id ? 'var(--violet)' : 'var(--line)',
              background: cocinaTab===id ? 'rgba(139,92,246,0.12)' : 'transparent',
              color: cocinaTab===id ? 'var(--violet-2)' : 'var(--text-3)'}}>
            {label}
          </button>
        ))}
      </div>
      {cocinaTab === 'almacen' && <div className="widget-grid">
        <div className="widget widget--s7">
          <div className="r-panel" style={{maxHeight:600, overflowY:'auto'}}>
            <StorageSection title="Heladera" emoji="🧊" sectionKey="heladera" items={kitchen}
              onEdit={(k) => setModal({type:'edit', item:k})}
              onDel={(id) => delItem(id,'heladera')}
              onDrop={moveItemToSection}/>
            <StorageSection title="Almacén" emoji="📦" sectionKey="almacen" items={almacen}
              onEdit={(k) => setModal({type:'edit', item:k})}
              onDel={(id) => delItem(id,'almacen')}
              onDrop={moveItemToSection}/>
            <StorageSection title="Freezer" emoji="❄️" sectionKey="freezer" items={freezer}
              onEdit={(k) => setModal({type:'edit', item:k})}
              onDel={(id) => delItem(id,'freezer')}
              onDrop={moveItemToSection}/>
          </div>
        </div>
        <div className="widget widget--s5">
          <div className="r-panel">
            <h3 className="panel__title panel__title--left" style={{marginBottom:8}}>Lista de compras</h3>
            <div style={{fontSize:11, color:'var(--text-3)', marginBottom:10}}>
              Al tildar ✓ un item se agrega a:
              <div style={{display:'flex', gap:6, marginTop:6}}>
                {[['heladera','🧊'],['almacen','📦'],['freezer','❄️']].map(([val,emoji]) => (
                  <button key={val} onClick={() => setAddGrocerySection(val)}
                    style={{flex:1, padding:'5px 0', borderRadius:8, border:'1.5px solid', fontSize:11, fontWeight:600, cursor:'pointer',
                      borderColor: addGrocerySection===val ? 'var(--violet)' : 'var(--line)',
                      background: addGrocerySection===val ? 'rgba(139,92,246,0.15)' : 'transparent',
                      color: addGrocerySection===val ? 'var(--violet-2)' : 'var(--text-3)'}}>
                    {emoji} {val}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:2, marginBottom:14}}>
              {groceries.map(it => (
                <div key={it.id} style={{display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:'1px solid var(--line)'}}>
                  <span className="tbl__check" data-done={it.done} onClick={() => checkGrocery(it.id)}
                    style={{cursor:'pointer', flexShrink:0, transition:'all 120ms'}} title={`Agregar a ${addGrocerySection}`}>
                    {it.done && <I.CheckSquare size={11}/>}
                  </span>
                  <span style={{fontSize:13, flex:1}}>{it.title}</span>
                  <button className="dash-mini-btn dash-mini-btn--danger" style={{opacity:0.4}} onClick={() => delGrocery(it.id)}><I.X size={12}/></button>
                </div>
              ))}
              {groceries.length === 0 && <div style={{fontSize:12, color:'var(--text-3)', textAlign:'center', padding:'16px 0'}}>Lista vacía 🎉</div>}
            </div>
            <div className="task-add" style={{borderTop:'1px solid var(--line)', paddingTop:10}}>
              <input placeholder="Agregar item y enter…" value={newGrocery}
                className="cfg-input" style={{flex:1}}
                onChange={e => setNewGrocery(e.target.value)}
                onKeyDown={e => e.key==='Enter' && addGrocery()}/>
              <button className="task-add__btn" onClick={addGrocery}><I.Plus size={16}/></button>
            </div>
          </div>
        </div>
      </div>}

      {cocinaTab === 'almacen' && <>
        {modal?.type === 'new'  && <KitchenItemModal defaultSection={modal.section||'heladera'} onSave={saveItem} onClose={() => setModal(null)}/>}
        {modal?.type === 'edit' && <KitchenItemModal item={modal.item} onSave={saveItem} onClose={() => setModal(null)}/>}
      </>}

      {cocinaTab === 'recetas' && (
        <div>
          {suggested.length > 0 && (
            <div className="recipe-suggestion">
              <div className="recipe-suggestion__head">✨ Podés hacer con lo que tenés</div>
              <div className="recipe-suggestion__items">
                {suggested.map(r => (
                  <button key={r.id} className="recipe-suggestion__pill" onClick={() => setRecipeModal(r)}>
                    {r.emoji} {r.name}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))', gap:12}}>
            {recipes.map(r => (
              <div key={r.id} className="recipe-card" onClick={() => setRecipeModal(r)}>
                <div className="recipe-card__head">
                  <span className="recipe-card__emoji">{r.emoji}</span>
                  <span className="recipe-card__name">{r.name}</span>
                  <span className="recipe-card__time">⏱ {r.tiempo}min</span>
                </div>
                <div className="recipe-card__tags">
                  <span className={"recipe-tag " + (r.costo==='bajo'?'recipe-tag--green':'recipe-tag--yellow')}>{r.costo==='bajo'?'Económico':'Moderado'}</span>
                  {r.tags.slice(0,2).map(t => <span key={t} className="recipe-tag">{t}</span>)}
                </div>
              </div>
            ))}
            {recipes.length === 0 && <div style={{fontSize:12, color:'var(--text-3)', gridColumn:'1/-1', textAlign:'center', padding:24}}>Sin recetas guardadas</div>}
          </div>
        </div>
      )}

      {recipeModal === 'new' && (
        <Modal title="Nueva receta" onClose={() => setRecipeModal(null)} width={500}>
          <div style={{display:'flex', gap:8, marginBottom:12}}>
            <input className="cfg-input" style={{width:48}} value={newRecipe.emoji} onChange={e => setNewRecipe(r=>({...r,emoji:e.target.value}))} placeholder="🍽️"/>
            <input className="cfg-input" style={{flex:1}} placeholder="Nombre de la receta" value={newRecipe.name} onChange={e => setNewRecipe(r=>({...r,name:e.target.value}))}/>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12}}>
            <div>
              <div style={{fontSize:11, color:'var(--text-3)', marginBottom:4}}>Tiempo (min)</div>
              <input type="number" className="cfg-input" style={{width:'100%'}} value={newRecipe.tiempo} onChange={e => setNewRecipe(r=>({...r,tiempo:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11, color:'var(--text-3)', marginBottom:4}}>Costo</div>
              <select className="cfg-input" style={{width:'100%'}} value={newRecipe.costo} onChange={e => setNewRecipe(r=>({...r,costo:e.target.value}))}>
                <option value="bajo">Económico</option>
                <option value="medio">Moderado</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11, color:'var(--text-3)', marginBottom:4}}>Ingredientes (separados por coma)</div>
            <input className="cfg-input" style={{width:'100%'}} placeholder="huevos, manteca, sal…" value={newRecipe.ingredientes} onChange={e => setNewRecipe(r=>({...r,ingredientes:e.target.value}))}/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11, color:'var(--text-3)', marginBottom:4}}>Pasos / preparación</div>
            <textarea className="diary-textarea" style={{minHeight:80}} placeholder="Cómo se prepara…" value={newRecipe.pasos} onChange={e => setNewRecipe(r=>({...r,pasos:e.target.value}))}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11, color:'var(--text-3)', marginBottom:4}}>Tags (separados por coma)</div>
            <input className="cfg-input" style={{width:'100%'}} placeholder="rápido, proteína, económico…" value={newRecipe.tags} onChange={e => setNewRecipe(r=>({...r,tags:e.target.value}))}/>
          </div>
          <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
            <button className="editor-toolbar__btn" onClick={() => setRecipeModal(null)}>Cancelar</button>
            <button className="btn-primary" onClick={saveRecipe}>Guardar receta</button>
          </div>
        </Modal>
      )}
      {recipeModal && recipeModal !== 'new' && (
        <Modal title={recipeModal.emoji + ' ' + recipeModal.name} onClose={() => setRecipeModal(null)} width={480}>
          <div style={{display:'flex', gap:12, marginBottom:16, flexWrap:'wrap'}}>
            <span className="recipe-tag recipe-tag--yellow">⏱ {recipeModal.tiempo} min</span>
            <span className={"recipe-tag " + (recipeModal.costo==='bajo'?'recipe-tag--green':'recipe-tag--yellow')}>{recipeModal.costo==='bajo'?'💚 Económico':'💛 Moderado'}</span>
            {recipeModal.tags.map(t=><span key={t} className="recipe-tag">{t}</span>)}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8}}>Ingredientes</div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
              {recipeModal.ingredientes.map(ing => <span key={ing} style={{background:'var(--inner-2)', borderRadius:6, padding:'3px 10px', fontSize:12}}>{ing}</span>)}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8}}>Preparación</div>
            <div style={{fontSize:13, color:'var(--text-2)', lineHeight:1.6, whiteSpace:'pre-wrap'}}>{recipeModal.pasos}</div>
          </div>
          <div style={{display:'flex', justifyContent:'space-between'}}>
            <button className="btn-danger" onClick={() => { delRecipe(recipeModal.id); setRecipeModal(null); }}>Eliminar</button>
            <button className="editor-toolbar__btn" onClick={() => setRecipeModal(null)}>Cerrar</button>
          </div>
        </Modal>
      )}
    </>
  );
}

function TaskDetailModal({ task, onSave, onClose }) {
  const [form, setForm] = useState({...task, desc: task.desc||'', priority: task.priority||'medium'});
  const set = (k,v) => setForm(f => ({...f, [k]:v}));
  const statuses = ['Pendiente','En progreso','Lista','Bloqueada'];
  const priorities = [
    { id:'high',   label:'Alta',  color:'#f87171' },
    { id:'medium', label:'Media', color:'#fbbf24' },
    { id:'low',    label:'Baja',  color:'#34d399' },
  ];
  return (
    <Modal title="Detalle de tarea" onClose={onClose} width={480}>
      <ModalField label="Nombre de la tarea" value={form.name} onChange={v => set('name',v)}/>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6}}>Descripción</div>
        <textarea className="diary-textarea" style={{minHeight:80}} value={form.desc} placeholder="Detalles, pasos, links…" onChange={e => set('desc',e.target.value)}/>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8}}>Prioridad real</div>
        <div className="priority-matrix">
          {[
            { id:'high',   label:'🔴 Urgente e importante',   hint:'Consecuencias directas si no lo hacés hoy', color:'#f87171' },
            { id:'medium', label:'🟡 Importante, no urgente',  hint:'Impacto en nota o entrega futura',           color:'#fbbf24' },
            { id:'low',    label:'🔵 Urgente, bajo impacto',   hint:'Algo que hay que hacer pero no pesa tanto',  color:'#60a5fa' },
            { id:'none',   label:'⬜ Puede esperar',           hint:'Sin consecuencias reales en el corto plazo', color:'#6b7280' },
          ].map(p => (
            <div key={p.id} className="pmatrix-cell" data-on={form.priority===p.id} onClick={() => set('priority', p.id)}>
              <div className="pmatrix-cell__label" style={{color: form.priority===p.id ? p.color : 'var(--text)'}}>{p.label}</div>
              <div className="pmatrix-cell__hint">{p.hint}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6}}>Estado</div>
          <select className="cfg-input" style={{width:'100%'}} value={form.status} onChange={e => set('status', e.target.value)}>
            {statuses.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6}}>Recompensa XP</div>
          <input type="number" min={1} max={999} className="cfg-input" style={{width:'100%'}} value={form.xp} onChange={e => set('xp', Number(e.target.value))}/>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6}}>Fecha límite (opcional)</div>
        <input type="date" className="cfg-input" style={{width:'100%'}} value={form.dueDate||''} onChange={e => set('dueDate', e.target.value)}/>
      </div>
      <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
        <button className="editor-toolbar__btn" onClick={onClose}>Cancelar</button>
        <button className="btn-primary" onClick={() => { onSave(form); onClose(); }}>Guardar cambios</button>
      </div>
    </Modal>
  );
}

const PRIORITY_COLOR = { high:'#f87171', medium:'#fbbf24', low:'#34d399' };
const PRIORITY_LABEL = { high:'Alta', medium:'Media', low:'Baja' };

function TareasRoute({ tasks, setTasks, completedCount, flash }) {
  const [modal, setModal] = useState(null);
  const [newTask, setNewTask] = useState('');
  const [viewMode, setViewMode] = useState('table'); // 'table' | 'cards'
  const [sortBy, setSortBy] = useState('creacion'); // 'creacion' | 'prioridad' | 'fecha' | 'nombre'
  const [showDone, setShowDone] = useState(true);
  const AV_PALETTE = ['v1','v2','v3','v4'];

  const PRIO_ORDER = { high:0, medium:1, low:2, none:3, undefined:2 };
  const sortedTasks = [...tasks]
    .filter(t => showDone || !t.done)
    .sort((a, b) => {
      if (sortBy === 'prioridad') return (PRIO_ORDER[a.priority]||2) - (PRIO_ORDER[b.priority]||2);
      if (sortBy === 'fecha') {
        const _far = '9999-99-99';
        const da = a.dueDate || _far, db = b.dueDate || _far;
        return da.localeCompare(db);
      }
      if (sortBy === 'nombre') return a.name.localeCompare(b.name);
      return (b.id || 0) - (a.id || 0); // creacion = newest first
    });

  const addTask = () => {
    const name = newTask.trim();
    if (!name) return;
    const next = [{
      id:Date.now(), name, avClass: AV_PALETTE[tasks.length%4],
      initials: name.slice(0,2).toUpperCase(),
      desc:'', progress:'Recién agregada', xp:10, status:'Pendiente',
      statusTone:'blue', priority:'medium', done:false
    }, ...tasks];
    setTasks(next); setNewTask(''); flash('Tarea agregada');
  };
  const toggleTask = (id) => {
    const t = tasks.find(x => x.id === id);
    if (t && !t.done) playSound('tick');
    setTasks(ts => ts.map(t => t.id===id ? {...t, done:!t.done, status:!t.done?'Lista':'En progreso', statusTone:!t.done?'ok':''} : t));
  };
  const deleteTask = (id) => { setTasks(ts => ts.filter(t => t.id!==id)); flash('Tarea eliminada'); };
  const saveTask = (updated) => {
    setTasks(ts => ts.map(t => t.id===updated.id ? {...t, ...updated} : t));
    flash('Tarea actualizada');
  };

  return (
    <>
      <RouteHead title="Tareas" sub={`${tasks.length} en total · ${completedCount} completas`}
        actions={<>
          <select className="cfg-input" style={{fontSize:12, padding:'5px 8px', width:'auto'}} value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="creacion">↕ Creación</option>
            <option value="prioridad">🔴 Prioridad</option>
            <option value="fecha">📅 Fecha límite</option>
            <option value="nombre">🔤 Nombre</option>
          </select>
          <button className={"editor-toolbar__btn" + (!showDone?' editor-toolbar__btn--active':'')} onClick={() => setShowDone(s=>!s)} title={showDone?'Ocultar completadas':'Mostrar completadas'}>
            {showDone ? '✓ Ocultar listas' : '⊘ Mostrando activas'}
          </button>
          <button className={"editor-toolbar__btn" + (viewMode==='table'?' editor-toolbar__btn--active':'')} onClick={() => setViewMode('table')} title="Vista tabla">☰ Tabla</button>
          <button className={"editor-toolbar__btn" + (viewMode==='cards'?' editor-toolbar__btn--active':'')} onClick={() => setViewMode('cards')} title="Vista cards">⊞ Cards</button>
        </>}/>

      {viewMode === 'table' && (
        <div className="table-panel">
          <table className="tbl">
            <thead>
              <tr>
                <th style={{width:24}}></th>
                <th>Nombre</th>
                <th style={{width:60}}>Prior.</th>
                <th>Descripción</th>
                <th>XP</th>
                <th style={{width:70}}>Vence</th>
                <th>Estado</th>
                <th style={{width:60}}></th>
              </tr>
            </thead>
            <tbody>
              {sortedTasks.length === 0 && (
                <tr><td colSpan={7}><div className="tbl-empty">No tenés tareas. Agregá una abajo.</div></td></tr>
              )}
              {sortedTasks.map(row => (
                <tr key={row.id} className={row.done ? 'tbl__row--done' : ''}>
                  <td>
                    <span className="tbl__check" data-done={row.done} onClick={() => toggleTask(row.id)} style={{cursor:'pointer'}}>
                      {row.done && <I.CheckSquare size={11}/>}
                    </span>
                  </td>
                  <td>
                    <div className="t-name" style={{cursor:'pointer'}} onClick={() => setModal({task:row})}>
                      <span className={"t-avatar t-avatar--" + row.avClass}>{row.initials}</span>
                      {row.name}
                    </div>
                  </td>
                  <td>
                    <span className={`priority-badge priority-badge--${row.priority||'medium'}`}>
                      {PRIORITY_LABEL[row.priority||'medium']}
                    </span>
                  </td>
                  <td style={{color:'var(--text-2)', fontSize:12, maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{row.desc||row.progress}</td>
                  <td style={{fontWeight:500}}>+{row.xp}</td>
                  <td>
                    {row.dueDate && (() => {
                      const _today = new Date().toISOString().slice(0,10);
                      const _diff = Math.round((new Date(row.dueDate+'T12:00:00') - new Date(_today+'T12:00:00')) / (1000*60*60*24));
                      const _color = row.done ? 'var(--text-4)' : _diff < 0 ? '#f87171' : _diff === 0 ? '#fbbf24' : _diff <= 2 ? '#fb923c' : 'var(--text-3)';
                      const _label = row.done ? row.dueDate : _diff < 0 ? `Vencida (${Math.abs(_diff)}d)` : _diff === 0 ? '¡Hoy!' : _diff === 1 ? 'Mañana' : `${_diff}d`;
                      return <span style={{fontSize:11, color:_color, fontFamily:'var(--font-mono)', fontWeight:_diff<=1&&!row.done?700:400}}>{_label}</span>;
                    })()}
                  </td>
                  <td><span className={"t-status" + (row.statusTone ? " t-status--"+row.statusTone : "")}>{row.status}</span></td>
                  <td style={{display:'flex', gap:4, justifyContent:'flex-end'}}>
                    <button className="dash-mini-btn" onClick={() => setModal({task:row})} title="Editar"><I.Edit size={13}/></button>
                    <button className="t-del" style={{opacity:1}} onClick={() => deleteTask(row.id)} title="Eliminar"><I.X size={14}/></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="task-add">
            <input placeholder="Agregar nueva tarea y enter…" value={newTask}
              onChange={e => setNewTask(e.target.value)}
              onKeyDown={e => e.key==='Enter' && addTask()}/>
            <button className="task-add__btn" onClick={addTask}><I.Plus size={16}/></button>
          </div>
        </div>
      )}

      {viewMode === 'cards' && (
        <div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:12, marginBottom:12}}>
            {sortedTasks.length === 0 && (
              <div style={{gridColumn:'1/-1', textAlign:'center', padding:'40px 0', color:'var(--text-3)'}}>No tenés tareas.</div>
            )}
            {sortedTasks.map(row => (
              <div key={row.id} className={"tarea-card" + (row.done?' tarea-card--done':'')}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                  <span className={"t-avatar t-avatar--" + row.avClass} style={{width:30,height:30,fontSize:11}}>{row.initials}</span>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="tarea-card__title" style={{textDecoration:row.done?'line-through':'none'}}>{row.name}</div>
                  </div>
                  <div style={{width:10,height:10,borderRadius:'50%',background:PRIORITY_COLOR[row.priority||'medium'],flexShrink:0}} title={PRIORITY_LABEL[row.priority||'medium']}/>
                </div>
                {row.desc && <div className="tarea-card__desc">{row.desc}</div>}
                {row.dueDate && (() => {
                  const _today = new Date().toISOString().slice(0,10);
                  const _diff = Math.round((new Date(row.dueDate+'T12:00:00') - new Date(_today+'T12:00:00')) / (1000*60*60*24));
                  const _col = row.done ? 'var(--text-4)' : _diff < 0 ? '#f87171' : _diff === 0 ? '#fbbf24' : _diff <= 2 ? '#fb923c' : 'var(--text-3)';
                  const _lbl = row.done ? row.dueDate : _diff < 0 ? `⚠️ Vencida (${Math.abs(_diff)}d)` : _diff === 0 ? '⏰ ¡Hoy!' : _diff === 1 ? '📅 Mañana' : `📅 ${_diff}d`;
                  return <div style={{fontSize:11, color:_col, fontWeight:_diff<=1&&!row.done?600:400, marginTop:4}}>{_lbl}</div>;
                })()}
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8}}>
                  <span className={"t-status" + (row.statusTone ? " t-status--"+row.statusTone : "")}>{row.status}</span>
                  <div style={{display:'flex', gap:4}}>
                    <span className="tbl__check" data-done={row.done} onClick={() => toggleTask(row.id)} style={{cursor:'pointer'}}>{row.done && <I.CheckSquare size={11}/>}</span>
                    <button className="dash-mini-btn" onClick={() => setModal({task:row})}><I.Edit size={12}/></button>
                    <button className="dash-mini-btn dash-mini-btn--danger" onClick={() => deleteTask(row.id)}><I.X size={12}/></button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="task-add">
            <input placeholder="Agregar nueva tarea y enter…" value={newTask}
              onChange={e => setNewTask(e.target.value)}
              onKeyDown={e => e.key==='Enter' && addTask()}/>
            <button className="task-add__btn" onClick={addTask}><I.Plus size={16}/></button>
          </div>
        </div>
      )}

      {modal && <TaskDetailModal task={modal.task} onSave={saveTask} onClose={() => setModal(null)}/>}
    </>
  );
}

function DraggableDrawer({ onClose, availableWidgets, currentWidgets, addWidget, removeWidget, exitEditor, resetWidgets }) {
  const [pos, setPos] = useState({ x: window.innerWidth - 300, y: 120 });
  const dragging = useRef(false);
  const offset = useRef({ x: 0, y: 0 });

  const onMouseDown = (e) => {
    dragging.current = true;
    offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
    document.body.style.userSelect = 'none';
  };
  useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      setPos({
        x: Math.max(0, Math.min(window.innerWidth - 280, e.clientX - offset.current.x)),
        y: Math.max(0, Math.min(window.innerHeight - 100, e.clientY - offset.current.y)),
      });
    };
    const onUp = () => { dragging.current = false; document.body.style.userSelect = ''; };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);

  return (
    <div className="edit-drawer" style={{position:'fixed', left: pos.x, top: pos.y, right:'auto', bottom:'auto', maxHeight:'80vh', display:'flex', flexDirection:'column'}}>
      <div className="edit-drawer__head" onMouseDown={onMouseDown} style={{cursor:'grab'}}>
        <div className="edit-drawer__head-main">
          <h3 className="edit-drawer__title">⠿ Widgets</h3>
          <p className="edit-drawer__sub">Arrastrá esta ventana · Click para agregar</p>
        </div>
        <button className="edit-drawer__close" onClick={onClose} title="Cerrar editor">
          <I.X size={14}/>
        </button>
      </div>

      <div className="edit-drawer__body" style={{overflowY:'auto', flex:1}}>
        {availableWidgets.length === 0 ? (
          <div className="edit-drawer__empty">
            Tenés todos los widgets en tu dashboard.<br/>
            Quitá alguno con ✕ para verlo acá.
          </div>
        ) : (
          <>
            <div className="edit-drawer__group">Disponibles · {availableWidgets.length}</div>
            {availableWidgets.map(id => {
              const w = WIDGET_CATALOG[id];
              const Ic = I[w.iconKey] || I.Home;
              return (
                <div key={id} className="edit-drawer__row" onClick={() => addWidget(id)}>
                  <div className="edit-drawer__icon"><Ic size={14}/></div>
                  <div className="edit-drawer__main">
                    <div className="edit-drawer__name">{w.title}</div>
                    <div className="edit-drawer__desc">{w.desc}</div>
                  </div>
                  <span className="edit-drawer__btn"><I.Plus size={14}/></span>
                </div>
              );
            })}
          </>
        )}
        <div className="edit-drawer__group">En tu dashboard · {currentWidgets.length}</div>
        {currentWidgets.map((w, i) => {
          const meta = WIDGET_CATALOG[w.id];
          if (!meta) return null;
          const Ic = I[meta.iconKey] || I.Home;
          return (
            <div key={w.id} className="edit-drawer__row" style={{cursor:'default', opacity:0.7}}>
              <div className="edit-drawer__icon" style={{background:'rgba(255,255,255,0.04)'}}><Ic size={14}/></div>
              <div className="edit-drawer__main">
                <div className="edit-drawer__name">{meta.title}</div>
                <div className="edit-drawer__desc">Ancho {w.span || meta.span}/12</div>
              </div>
              <button className="edit-drawer__btn"
                style={{background:'rgba(248,113,113,0.18)', color:'#fca5a5'}}
                onClick={() => removeWidget(i)} title="Quitar">
                <I.X size={14}/>
              </button>
            </div>
          );
        })}
      </div>

      <div className="edit-drawer__foot">
        <button className="btn-primary" onClick={exitEditor} style={{width:'100%', justifyContent:'center'}}>
          <I.CheckSquare size={13}/> Listo
        </button>
        <button className="edit-drawer__reset" onClick={resetWidgets}>
          ↻ Restaurar por defecto
        </button>
      </div>
    </div>
  );
}

// XP / Level helper
function calcLevel(totalXp) {
  const base = 9900;
  const xp = base + totalXp;
  // Each level requires 500*level XP to advance
  // Level 1: 0, L2: 500, L3: 1500, L4: 3000, L5: 5000, L6: 7500...
  let level = 1, threshold = 0;
  while (xp >= threshold + 500 * level) {
    threshold += 500 * level;
    level++;
  }
  const xpInLevel = xp - threshold;
  const xpForNext = 500 * level;
  const pct = Math.round(xpInLevel / xpForNext * 100);
  return { level, xpInLevel, xpForNext, pct };
}

      let newSpan = Math.round((newWidth + resizing.gap) / (resizing.colW + resizing.gap));

                      {highTasks.length > 0 && (

                          <div style={{fontSize:11,fontWeight:700,color:'#f87171',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                            <span style={{width:6,height:6,borderRadius:'50%',background:'#f87171',display:'inline-block'}}/>
                            URGENTE — {highTasks.length} {highTasks.length===1?'tarea':'tareas'}
                          </div>
                          <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            {highTasks.map(t => (
                              <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,background:'rgba(248,113,113,0.07)',border:'1px solid rgba(248,113,113,0.18)',borderRadius:12,padding:'12px 16px',cursor:'pointer',transition:'background 150ms'}}
                                onClick={()=>toggleTask(t.id)}>
                                <div style={{width:18,height:18,borderRadius:4,border:'2px solid rgba(248,113,113,0.5)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                  {t.done && <span style={{fontSize:10,color:'#f87171'}}>✓</span>}
                                </div>
                                <span style={{fontSize:13,fontWeight:500,color:'var(--text)',flex:1}}>{t.name}</span>
                                <span style={{fontSize:10,color:'#f87171',background:'rgba(248,113,113,0.12)',borderRadius:4,padding:'2px 6px',flexShrink:0}}>🔴 Alta</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Otras tareas */}
                      {otherTasks.length > 0 && (
                        <div>
                          <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--text-4)',display:'inline-block'}}/>
                            PENDIENTE — {otherTasks.length}
                          </div>
                          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:6}}>
                            {otherTasks.slice(0,6).map(t => (
                              <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--inner)',border:'1px solid var(--line)',borderRadius:10,padding:'10px 14px',cursor:'pointer',transition:'background 150ms'}}
                                onClick={()=>toggleTask(t.id)}>
                                <div style={{width:14,height:14,borderRadius:3,border:'1.5px solid var(--line-2)',flexShrink:0}}/>
                                <span style={{fontSize:12,color:'var(--text-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
                              </div>
                            ))}
                            {otherTasks.length > 6 && (
                              <div style={{display:'flex',alignItems:'center',justifyContent:'center',background:'var(--inner)',border:'1px solid var(--line)',borderRadius:10,padding:'10px 14px',color:'var(--text-4)',fontSize:12}}>
                                +{otherTasks.length-6} más
                              </div>
                            )}
                          </div>
                        </div>
                      )}

                      {tasks.filter(t=>!t.done).length === 0 && (
                        <div style={{textAlign:'center',padding:'32px 20px',color:'var(--text-3)'}}>
                          <div style={{fontSize:40,marginBottom:12}}>🏆</div>
                          <div style={{fontSize:15,fontWeight:600,color:'#4ade80',marginBottom:4}}>¡Todas las tareas listas!</div>
                          <div style={{fontSize:13}}>Podés desactivar el Modo Parciales.</div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </>
            )}

            {/* Telegram banner — si no está vinculado */}
            {showTgBanner && telegramLinked === false && (
              <div style={{display:'flex',alignItems:'center',gap:12,background:'linear-gradient(135deg,rgba(37,99,235,0.1),rgba(59,130,246,0.08))',border:'1px solid rgba(59,130,246,0.2)',borderRadius:14,padding:'12px 16px',marginBottom:8,animation:'fadeUp 300ms ease'}}>
                <div style={{fontSize:24,flexShrink:0}}>✈️</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Conectá Telegram al StudyHub</div>
                  <div style={{fontSize:11,color:'var(--text-3)'}}>Guardá tareas y notas directo desde el bot @StudyHubBot</div>
                </div>
                <button onClick={()=>setSettingsOpen(true)} style={{background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:8,padding:'7px 14px',color:'#93c5fd',fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                  Conectar
                </button>
                <button onClick={()=>{setShowTgBanner(false);localStorage.setItem('studyhub_tg_banner_dismissed','1');}} style={{background:'none',border:'none',color:'var(--text-4)',cursor:'pointer',fontSize:16,padding:'4px 6px',flexShrink:0,lineHeight:1}}>✕</button>
              </div>
            )}

            {/* PWA install banner — solo cuando el prompt está disponible */}
            {showPwaBanner && window._pwaPrompt && (
              <div style={{display:'flex',alignItems:'center',gap:12,background:'linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.12))',border:'1px solid rgba(139,92,246,0.25)',borderRadius:14,padding:'12px 16px',marginBottom:8,animation:'fadeUp 300ms ease'}}>
                <div style={{fontSize:24,flexShrink:0}}>📲</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Instalá StudyHub como app</div>
                  <div style={{fontSize:11,color:'var(--text-3)'}}>Accedé sin el navegador, más rápido y offline</div>
                </div>
                <button onClick={()=>{window._pwaPrompt.prompt();window._pwaPrompt.userChoice.then(()=>{window._pwaPrompt=null;setShowPwaBanner(false);});}} style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',border:'none',borderRadius:8,padding:'7px 14px',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                  Instalar
                </button>
                <button onClick={()=>{setShowPwaBanner(false);localStorage.setItem('studyhub_pwa_banner_dismissed','1');}} style={{background:'none',border:'none',color:'var(--text-4)',cursor:'pointer',fontSize:16,padding:'4px 6px',flexShrink:0,lineHeight:1}}>✕</button>
              </div>
            )}

            <div className="widget-grid stagger" ref={gridRef}>
              {currentWidgets.map((w, i) => {
                const span = w.span || (WIDGET_CATALOG[w.id]?.span) || 6;
                const meta = WIDGET_CATALOG[w.id];
                if (!meta) return null;
                const customHeight = w.height ? { minHeight: w.height + 'px' } : undefined;
                if (!editMode) {
                  return (
                    <div key={w.id} className={"widget widget--s" + span} style={customHeight}>
                      {renderWidgetContent(w.id, widgetCtx)}
                    </div>
                  );
                }
                const isResizing = resizing?.idx === i;
                return (
                  <div
                    key={w.id}
                    className={"widget editable widget--s" + span +
                      (draggedIdx === i ? " dragging" : "") +
                      (dragOverIdx === i && draggedIdx !== i ? " drag-over" : "") +
                      (isResizing ? " resizing" : "")
                    }
                    style={customHeight}
                    draggable={!isResizing}
                    onDragStart={(e) => {
                      if (isResizing) { e.preventDefault(); return; }
                      e.dataTransfer.effectAllowed = 'move';
                      e.dataTransfer.setData('text/plain', String(i));
                      setDraggedIdx(i);
                    }}
                    onDragOver={(e) => {
                      e.preventDefault();
                      e.dataTransfer.dropEffect = 'move';
                      if (dragOverIdx !== i) setDragOverIdx(i);
                    }}
                    onDragLeave={() => { if (dragOverIdx === i) setDragOverIdx(null); }}
                    onDrop={(e) => {
                      e.preventDefault();
                      moveWidget(draggedIdx, i);
                      setDraggedIdx(null); setDragOverIdx(null);
                    }}
                    onDragEnd={() => { setDraggedIdx(null); setDragOverIdx(null); }}
                  >
                    <div className="widget__edit-bar" onMouseDown={(e) => e.stopPropagation()}>
                      <span className="widget__edit-handle" title="Arrastrar">⋮⋮</span>
                      <span className="widget__edit-name">{meta.title}</span>
                      <div className="widget__edit-sizes">
                        {[4, 6, 8, 12].map(s => (
                          <button
                            key={s}
                            data-on={span === s}
                            draggable={false}
                            onClick={(e) => { e.stopPropagation(); resizeWidget(i, s); }}
                            title={`Ancho ${s}/12`}
                          >{s}</button>
                        ))}
                      </div>
                      <button
                        className="widget__edit-remove"
                        draggable={false}
                        onClick={(e) => { e.stopPropagation(); removeWidget(i); }}
                        title="Quitar widget"
                      >
                        <I.X size={14}/>
                      </button>
                    </div>

                    {renderWidgetContent(w.id, widgetCtx)}

                    {/* Live size badge while dragging the corner */}
                    {isResizing && (
                      <div className="widget__size-badge">
                        {resizing.currentSpan}/12 · {Math.round(resizing.currentHeight)}px
                      </div>
                    )}

                    {/* Corner resize handle */}
                    <div
                      className="widget__resize-handle"
                      draggable={false}
                      onDragStart={(e) => e.preventDefault()}
                      onMouseDown={(e) => startResize(e, i)}
                      onPointerDown={(e) => { /* mouseDown does the work */ }}
                      title="Arrastrar para cambiar tamaño"
                    >
                      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
                        <path d="M13 6 L6 13"/>
                        <path d="M13 10 L10 13"/>
                      </svg>
                    </div>
                  </div>
                );
              })}
              {currentWidgets.length === 0 && (
                <div className="widget widget--s12">
                  <div className="r-panel" style={{textAlign:'center', padding: 48}}>
                    <div style={{fontSize:14, color:'var(--text-3)', marginBottom: 12}}>Tu dashboard está vacío</div>
                    <button className="btn-primary" onClick={() => setEditMode(true)}>
                      <I.Edit size={14}/> Abrir editor
                    </button>
                  </div>
                </div>
              )}
              {/* Final drop zone — drop here to append at end */}
              {editMode && draggedIdx !== null && (
                <div
                  className="widget--drop-end"
                  onDragOver={(e) => { e.preventDefault(); }}
                  onDrop={(e) => {
                    e.preventDefault();
                    moveWidget(draggedIdx, currentWidgets.length - 1);
                    setDraggedIdx(null); setDragOverIdx(null);
                  }}
                >
                  Soltá acá para mover al final
                </div>
              )}
            </div>
          </>
        );
      case 'pomodoro': return <PomodoroRoute/>;
      case 'historial': return <HistorialDiarioRoute/>;
      case 'facu':     return <FacultadRoute flash={flash}/>;
      case 'misiones': return <MisionesRoute flash={flash}/>;
      case 'cal':      return <CalendarioRoute flash={flash}/>;
      case 'tareas':   return <TareasRoute tasks={tasks} setTasks={(next) => { setTasks(next); saveTasks(next); }} completedCount={completedCount} flash={flash}/>;
      case 'chat':     return <ChatRoute tasks={tasks} energyToday={energyToday}/>;
      case 'diario':   return <DiarioRoute flash={flash}/>;
      case 'cocina':    return <CocinaRoute flash={flash}/>;
      case 'finanzas':  return <FinanzasRoute flash={flash}/>;
      case 'casa':      return <CasaRoute flash={flash}/>;
      case 'ocio':      return <OcioRoute flash={flash}/>;
      default:          return null;
    }
  };

  return (
    <div className="page">
      {cfg.bgDeco && <div className="bg-deco"/>}

      {/* DAILY MORNING MODAL */}
      {showDailyModal && (
        <DailyMorningModal
          onClose={handleDailyClose}
          onSave={handleDailySave}
        />
      )}

      {/* SHELL */}
      <div className={"shell" + (editMode ? " shell--editing" : "") + (route !== 'dashboard' ? " shell--no-right" : "")}>
        {/* LEFT NAV */}
        <nav className="rail">
          {[
            { id: 'dashboard', icon: I.Home,        label: 'Dashboard' },
            { id: 'facu',      icon: I.Book,        label: 'Facultad' },
            { id: 'misiones',  icon: I.Zap,         label: 'Misiones' },
            { id: 'cal',       icon: I.Calendar,    label: 'Calendario' },
            { id: 'tareas',    icon: I.CheckSquare, label: 'Tareas' },
            { id: 'pomodoro',  icon: I.Clock,       label: 'Pomodoro' },
          ].map(item => (
            <div key={item.id}
              className={"r-item" + (route===item.id ? " r-item--active" : "")}
              onClick={() => navigate(item.id)}
              title={cfg.sidebar === 'collapsed' ? item.label : ''}>
              <span className="r-item__icon"><item.icon size={17}/></span>
              <span>{item.label}</span>
            </div>
          ))}

          <hr className="rail__sep"/>

          {[
            { id: 'chat',     icon: I.Chat,       label: 'Chat IA' },
            { id: 'diario',   icon: I.Edit,       label: 'Diario' },
            { id: 'historial',icon: I.Calendar,   label: 'Historial diario' },
            { id: 'cocina',   icon: I.Coffee,     label: 'Cocina' },
            { id: 'finanzas', icon: I.Sparkles,   label: 'Finanzas' },
            { id: 'casa',     icon: I.Home,       label: 'Casa' },
            { id: 'ocio',     icon: I.Sparkles,   label: 'Ocio' },
          ].map(item => (
            <div key={item.id}
              className={"r-item" + (route===item.id ? " r-item--active" : "")}
              onClick={() => navigate(item.id)}
              title={cfg.sidebar === 'collapsed' ? item.label : ''}>
              <span className="r-item__icon"><item.icon size={17}/></span>
              <span>{item.label}</span>
            </div>
          ))}

          <div className="rail__spacer"/>

          <div className="rail__bottom">
            <div className="quick-toggle">
              <button className="quick-toggle__btn" data-on={cfg.sidebar === 'collapsed'}
                onClick={() => setCfg({...cfg, sidebar: cfg.sidebar === 'expanded' ? 'collapsed' : 'expanded'})}
                title={cfg.sidebar === 'collapsed' ? 'Expandir sidebar' : 'Colapsar sidebar'}>
                <I.ArrowRight size={14} style={{transform: cfg.sidebar === 'collapsed' ? 'rotate(0)' : 'rotate(180deg)', transition: 'transform 240ms'}}/>
              </button>
            </div>
            <div className="r-item" onClick={() => setSettingsOpen(true)} title="Configuración">
              <span className="r-item__icon"><I.Settings size={17}/></span>
              <span>Configuración</span>
              <span className="r-item__chev"><I.ArrowRight size={12}/></span>
            </div>
            <div className="r-item"
              onClick={() => window._supabase && window._supabase.auth.signOut()}
              title="Cerrar sesión"
              style={{color:'#f87171', marginTop:4}}>
              <span className="r-item__icon"><I.ArrowRight size={17} style={{transform:'rotate(180deg)'}}/></span>
              <span>Cerrar sesión</span>
            </div>
          </div>
        </nav>

        {/* CENTER */}
        <div className="center">
          {/* SUMMARY STRIP — solo en Dashboard */}
          {route === 'dashboard' && <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap', marginBottom:4}}>
            {/* Task summary */}
            <div className="topbar-summary" onClick={() => navigate('tareas')} title="Ver tareas">
              <div className="tbs-item">
                <div>
                  <div className={"tbs-item__num" + (tasks.filter(t=>!t.done && t.priority==='high').length > 0 ? ' tbs-item__num--warn' : '')}>
                    {tasks.filter(t=>!t.done).length}
                  </div>
                  <div className="tbs-item__label">pendientes</div>
                </div>
              </div>
              <div className="tbs-item">
                <div>
                  <div className="tbs-item__num tbs-item__num--ok">{tasks.filter(t=>t.done).length}</div>
                  <div className="tbs-item__label">completadas</div>
                </div>
              </div>
              {tasks.filter(t=>!t.done && t.priority==='high').length > 0 && (
                <div className="tbs-item">
                  <div>
                    <div className="tbs-item__num tbs-item__num--warn">{tasks.filter(t=>!t.done && t.priority==='high').length}</div>
                    <div className="tbs-item__label">urgentes</div>
                  </div>
                </div>
              )}
            </div>

            {/* Energy pill */}
            <div className="energy-pill" title="Energía de hoy" onClick={() => navigate('dashboard')}>
              {energyToday ? (
                <>
                  <span style={{fontSize:14}}>{energyToday.humor || '⚡'}</span>
                  <div>
                    <div className="energy-pill__bar">
                      <div className="energy-pill__fill" style={{width:(energyToday.energia/5*100)+'%', background: energyToday.energia <= 2 ? '#f87171' : energyToday.energia === 3 ? '#fbbf24' : '#4ade80'}}/>
                    </div>
                    <div style={{fontSize:10, color:'var(--text-4)', marginTop:2}}>{energyToday.sueno || '?'}h sueño</div>
                  </div>
                </>
              ) : (
                <>
                  <span style={{fontSize:12}}>⚡</span>
                  <span style={{fontSize:11, color:'var(--text-3)'}}>Sin check-in</span>
                </>
              )}
            </div>

            {/* Dashboard mode selector */}
            <div style={{display:'flex', gap:2, background:'var(--inner)', borderRadius:10, padding:'3px'}}>
              {[['manana','🌅'],['tarde','☀️'],['noche','🌙']].map(([id,emoji]) => (
                <button key={id} onClick={() => setDashMode(id)}
                  style={{padding:'5px 10px', borderRadius:7, fontSize:12, background: dashMode===id ? 'var(--card-2)' : 'transparent',
                    color: dashMode===id ? 'var(--text)' : 'var(--text-3)', fontWeight: dashMode===id ? 600 : 400, transition:'all 120ms', cursor:'pointer'}}>
                  {emoji}
                </button>
              ))}
            </div>

            {/* Parciales / Emergency toggle */}
            <button className="parciales-toggle" data-on={parcialesMode}
              onClick={() => setParcialesMode(!parcialesMode)}
              title={parcialesMode ? 'Desactivar modo parciales' : 'Activar modo parciales — simplifica el dashboard'}>
              <span className="parciales-toggle__dot"/>
              {parcialesMode ? '🎯 PARCIALES — ON' : 'Modo Parciales'}
            </button>
          </div>}

          {parcialesMode && (
            <div className="parciales-banner">
              <span className="parciales-banner__dot"/>
              <strong>Modo Parciales activo</strong> — Solo ves lo crítico. Enfocate.
              <button style={{marginLeft:'auto', fontSize:11, color:'#fca5a5', cursor:'pointer'}} onClick={() => setParcialesMode(false)}>Desactivar</button>
            </div>
          )}
          {!parcialesMode && tasks.filter(t=>!t.done && t.priority==='high').length >= 5 && (
            <div style={{background:'rgba(248,113,113,0.06)', border:'1px solid rgba(248,113,113,0.2)', borderRadius:'var(--r-sm)', padding:'8px 16px', display:'flex', alignItems:'center', gap:10, fontSize:12, color:'#fca5a5', marginBottom:4}}>
              🚨 <strong>Semana de emergencia:</strong> tenés {tasks.filter(t=>!t.done && t.priority==='high').length} tareas urgentes.
              <button style={{marginLeft:'auto', fontSize:11, cursor:'pointer', color:'#f87171', fontWeight:600}}
                onClick={() => setParcialesMode(true)}>Activar Modo Parciales →</button>
            </div>
          )}

          {/* TOP ROW (search + chat + bell) — always visible */}
          <div className="top-row">
            <div style={{position:'relative', flex:1}}>
              <label className="search" style={{width:'100%'}}>
                <span className="search__icon"><I.Search size={15}/></span>
                <input
                  placeholder="Buscar sección o función…"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  onKeyDown={(e) => { if(e.key==='Escape') setSearch(''); }}/>
                {search && (
                  <button onClick={() => setSearch('')} aria-label="Limpiar" style={{color:'var(--text-3)', display:'flex'}}>
                    <I.X size={14}/>
                  </button>
                )}
                {!search && (
                  <button className="search-cmd-hint" onClick={() => setCmdOpen(true)} title="Abrir Command Palette">⌘K</button>
                )}
              </label>
              {search.length >= 1 && (() => {
                const ALL_SECTIONS = [
                  {route:'dashboard', label:'Dashboard',  hint:'Inicio y resumen general', emoji:'🏠'},
                  {route:'facu',      label:'Facultad',   hint:'Materias, progreso, profesores', emoji:'📚'},
                  {route:'misiones',  label:'Misiones',   hint:'Objetivos, XP, progreso', emoji:'⚡'},
                  {route:'cal',       label:'Calendario', hint:'Eventos, parciales, agenda', emoji:'📅'},
                  {route:'tareas',    label:'Tareas',     hint:'Tareas pendientes y completadas', emoji:'✅'},
                  {route:'chat',      label:'Chat IA',    hint:'Preguntarle algo a la IA', emoji:'🤖'},
                  {route:'diario',    label:'Diario',     hint:'Entradas personales y reflexiones', emoji:'📖'},
                  {route:'cocina',    label:'Cocina',     hint:'Heladera, almacén, lista de compras, recetas', emoji:'🍳'},
                  {route:'finanzas',  label:'Finanzas',   hint:'Presupuesto, gastos, metas de ahorro', emoji:'💰'},
                  {route:'casa',      label:'Casa',       hint:'Limpieza, basura, ropa, checklist semanal', emoji:'🏠'},
                  {route:'ocio',      label:'Ocio',       hint:'Series, películas, juegos, libros, anime', emoji:'🎮'},
                ];
                const q = search.toLowerCase();
                const results = ALL_SECTIONS.filter(s =>
                  s.label.toLowerCase().includes(q) ||
                  s.hint.toLowerCase().includes(q) ||
                  s.route.toLowerCase().includes(q)
                );
                return (
                  <div style={{position:'absolute', top:'calc(100% + 6px)', left:0, right:0, background:'var(--card)', border:'1px solid var(--line)', borderRadius:12, boxShadow:'0 20px 48px rgba(0,0,0,0.6)', zIndex:500, overflow:'hidden', minWidth:280}}>
                    {results.length === 0 ? (
                      <div style={{padding:'14px 16px', fontSize:13, color:'var(--text-3)', textAlign:'center'}}>Sin resultados para "{search}"</div>
                    ) : results.map(item => (
                      <div key={item.route}
                        style={{display:'flex', alignItems:'center', gap:12, padding:'10px 14px', cursor:'pointer', borderBottom:'1px solid var(--line)', transition:'background 120ms'}}
                        onMouseEnter={e => e.currentTarget.style.background='var(--inner)'}
                        onMouseLeave={e => e.currentTarget.style.background=''}
                        onClick={() => { navigate(item.route); setSearch(''); }}>
                        <span style={{fontSize:18}}>{item.emoji}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13, fontWeight:600}}>{item.label}</div>
                          <div style={{fontSize:11, color:'var(--text-3)', marginTop:1}}>{item.hint}</div>
                        </div>
                        <I.ArrowRight size={12} style={{color:'var(--violet-2)'}}/>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>

            <div className="top-row__icon-wrap" ref={chatsRef}>
              <button className="icon-btn" aria-label="Chat" onClick={() => setOpenMenu(openMenu === 'chats' ? null : 'chats')}>
                <I.Chat size={18}/>
                {unreadChats > 0 && <span className="icon-btn__badge">{unreadChats}</span>}
              </button>
              {openMenu === 'chats' && (
                <div className="dropdown">
                  <div className="dropdown__head">
                    <h4 className="dropdown__title">Mensajes</h4>
                    <button className="dropdown__action" onClick={markAllChats}>Marcar todos leídos</button>
                  </div>
                  <div className="dropdown__body">
                    {chats.length === 0 ? <div className="dropdown__empty">Sin mensajes</div> :
                      chats.map(c => (
                        <div key={c.id} className="dropdown__row" data-unread={c.unread}
                          onClick={() => setChats(cs => cs.map(x => x.id === c.id ? {...x, unread: false} : x))}>
                          <div className={"dropdown__dot dropdown__dot--" + c.dot}><I.Chat size={14}/></div>
                          <div style={{flex:1, minWidth:0}}>
                            <div className="dropdown__text" dangerouslySetInnerHTML={{__html: c.text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}}/>
                            <div className="dropdown__time">{c.time}</div>
                          </div>
                        </div>
                      ))}
                  </div>
                </div>
              )}
            </div>

            <div className="top-row__icon-wrap" ref={notisRef}>
              <button className="icon-btn" aria-label="Notificaciones" onClick={() => setOpenMenu(openMenu === 'notis' ? null : 'notis')}>
                <I.Bell size={18}/>
                {unreadNotis > 0 && <span className="icon-btn__badge icon-btn__badge--pink">{unreadNotis}</span>}
              </button>
              {openMenu === 'notis' && (
                <div className="dropdown">
                  <div className="dropdown__head">
                    <h4 className="dropdown__title">Notificaciones</h4>
                    <button className="dropdown__action" onClick={markAllNotis}>Marcar todas leídas</button>
                  </div>
                  <div className="dropdown__body">
                    {notis.length === 0 ? <div className="dropdown__empty">Estás al día</div> :
                      notis.map(n => (
                        <div key={n.id} className="dropdown__row" data-unread={n.unread}
                          onClick={() => setNotis(ns => ns.map(x => x.id === n.id ? {...x, unread: false} : x))}>
                          <div className={"dropdown__dot dropdown__dot--" + n.dot}><I.Bell size={14}/></div>
                          <div style={{flex:1, minWidth:0}}>
                            <div className="dropdown__text" dangerouslySetInnerHTML={{__html: n.text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}}/>
                            <div className="dropdown__time">{n.time}</div>
                          </div>
                        </div>
                      ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ROUTE CONTENT */}
          <div key={route} className="page-enter">
            {renderRoute()}
          </div>
        </div>

        {/* RIGHT — solo en Dashboard */}
        {route === 'dashboard' && <aside className="right">
          <div className="profile">
            <div className={"profile__avatar" + (cfg.photo?' profile__avatar--photo':'')}
              onClick={() => setSettingsOpen(true)} title="Editar perfil" style={{cursor:'pointer'}}>
              {cfg.photo ? <img src={cfg.photo} alt="foto" style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}}/> : (cfg.initial || '?')}
            </div>
            <h3 className="profile__name" style={{cursor:'pointer'}} onClick={() => setSettingsOpen(true)}>{cfg.name || 'Tu nombre'}</h3>
            <p className="profile__role" style={{cursor: cfg.career ? 'default' : 'pointer', color: cfg.career ? '' : 'var(--violet-2)', fontSize:12}}
              onClick={() => !cfg.career && setSettingsOpen(true)}>
              {cfg.career || '+ Completar perfil'}
            </p>
            <div className="profile__actions">
              <button className="profile__btn" onClick={() => navigate('chat')} aria-label="Chat"><I.Chat size={16}/></button>
              <button className="profile__btn" onClick={() => navigate('cal')} aria-label="Calendario"><I.Calendar size={16}/></button>
              <button className="profile__btn" onClick={() => navigate('diario')} aria-label="Diario"><I.Edit size={16}/></button>
            </div>
          </div>

          <div className="about">
            <h4 className="about__title">Mis materias</h4>
            {cfg.facultad && <p className="about__desc" style={{marginBottom:8}}>📍 {cfg.facultad}</p>}
            <div style={{display:'flex', flexDirection:'column', gap:10, marginTop:4}}>
              {(() => {
                const avClasses = ['v1','v2','v3','v4','v1'];
                const rawMaterias = (cfg.materias || '').split(',').map(m => m.trim()).filter(Boolean);
                if (rawMaterias.length === 0) return (
                  <div style={{fontSize:13,color:'var(--text-3)',padding:'8px 0'}}>
                    Agregá tus materias en <b style={{color:'var(--violet-2)',cursor:'pointer'}} onClick={() => setSettingsOpen(true)}>Configuración → Perfil</b>
                  </div>
                );
                return rawMaterias.map((m, i) => {
                  const initials = m.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
                  return (
                    <div key={i} className="p-row" onClick={() => { navigate('facu'); flash('Abriendo ' + m); }}>
                      <div className={"p-row__av t-avatar--" + avClasses[i % avClasses.length]}>{initials}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="p-row__name">{m}</div>
                        <div className="p-row__role">Ver en Facultad →</div>
                      </div>
                    </div>
                  );
                });
              })()}
            </div>
          </div>

          <div className="send">
            <div className="send__left">
              <p className="send__label">Total XP · {(9900 + totalXp).toLocaleString()}</p>
              <p className="send__sub">Nivel {String(calcLevel(totalXp).level).padStart(2,'0')} · {calcLevel(totalXp).xpForNext - calcLevel(totalXp).xpInLevel} XP para subir</p>
            </div>
            <div className="send__value" style={{fontSize:22, fontWeight:800}}>{calcLevel(totalXp).level}</div>
          </div>
          <div style={{height:4, background:'var(--inner-2)', borderRadius:2, marginTop:-8, overflow:'hidden'}}>
            <div style={{height:'100%', width:calcLevel(totalXp).pct+'%', background:'linear-gradient(90deg,#6366f1,#8b5cf6)', borderRadius:2, transition:'width 800ms cubic-bezier(0.22,1,0.36,1)'}}/>
          </div>
        </aside>}
      </div>

      {/* SETTINGS MODAL */}
      {settingsOpen && (
        <SettingsModal
          cfg={cfg}
          onChange={setCfg}
          onClose={() => setSettingsOpen(false)}
          onReset={() => { setCfg(defaultConfig); flash('Preferencias restablecidas'); }}
          onEditDashboard={() => { setSettingsOpen(false); openEditor(); }}
        />
      )}

      {/* EDIT DRAWER */}
      {editMode && (
        <DraggableDrawer onClose={exitEditor} availableWidgets={availableWidgets} currentWidgets={currentWidgets} addWidget={addWidget} removeWidget={removeWidget} exitEditor={exitEditor} resetWidgets={() => { setWidgets(DEFAULT_WIDGETS); flash('Dashboard restaurado'); }}/>
      )}



      {/* COMMAND PALETTE */}
      {cmdOpen && <CommandPalette onClose={() => setCmdOpen(false)} cmdCtx={cmdCtx}/>}

      {/* TOAST */}
      {toast && <div className="toast"><I.Sparkles size={14}/> {toast}</div>}

      {/* MOBILE BOTTOM NAV */}
      <nav className="mobile-nav">
        {[
          { id: 'dashboard', icon: I.Home,        label: 'Inicio' },
          { id: 'tareas',    icon: I.CheckSquare, label: 'Tareas' },
          { id: 'pomodoro',  icon: I.Clock,       label: 'Foco' },
          { id: 'cal',       icon: I.Calendar,    label: 'Agenda' },
          { id: 'misiones',  icon: I.Zap,         label: 'Misiones' },
        ].map(item => (
          <button key={item.id}
            className={'mobile-nav__item' + (route === item.id ? ' mobile-nav__item--active' : '')}
            onClick={() => navigate(item.id)}>
            <item.icon size={20}/>
            <span className="mobile-nav__label">{item.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthWrapper/>);

</script>
</body>
</html>
